<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WISHWORK | NEXUS LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --neon-purple: #bc13fe; 
            --neon-pink: #ff007a;
            --fire-orange: #ff4d00;
            --glass: rgba(255, 255, 255, 0.07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

        body { 
            background: #020205; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            overflow: hidden; 
            position: fixed; 
            touch-action: pan-y;
        }

        /* ANIMATED BACKGROUND GRID */
        .bg-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            animation: grid-move 15s linear infinite;
            z-index: -1;
            bottom: -50%;
        }
        @keyframes grid-move { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(40px); } }

        /* THE CONTAINER */
        .main-container {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* THE BREATHING GLASS BOX */
        .login-box {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 35px;
            border-radius: 30px;
            width: 90%;
            max-width: 380px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            animation: breathe 5s ease-in-out infinite;
            position: relative;
        }

        @keyframes breathe {
            0%, 100% { border-color: rgba(0, 242, 255, 0.3); box-shadow: 0 0 30px rgba(0, 242, 255, 0.15); }
            50% { border-color: var(--neon-pink); box-shadow: 0 0 50px rgba(255, 0, 122, 0.2); }
        }

        h2 { 
            font-weight: 900; 
            letter-spacing: 4px; 
            margin-bottom: 8px; 
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--fire-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        .mode-text { font-size: 10px; color: rgba(255,255,255,0.5); margin-bottom: 25px; font-weight: 800; letter-spacing: 2px; }

        input {
            width: 100%; padding: 15px; margin-bottom: 15px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; outline: none; transition: 0.3s;
            font-size: 14px;
        }
        input:focus { 
            border-color: var(--neon-blue); 
            background: rgba(0,0,0,0.7);
            box-shadow: 0 0 15px rgba(0,242,255,0.3);
        }

        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-weight: 900; cursor: pointer; text-transform: uppercase;
            transition: 0.3s; margin-top: 5px; font-size: 13px;
        }
        .login-btn { 
            background: linear-gradient(45deg, #fff, var(--neon-blue)); 
            color: #000; 
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
        }
        .login-btn:hover { transform: translateY(-2px); filter: brightness(1.2); }

        .signup-btn { 
            background: transparent; 
            color: #fff; 
            border: 1px solid rgba(255,255,255,0.2); 
            margin-top: 12px; 
        }
        .signup-btn:hover { border-color: var(--neon-purple); background: rgba(188, 19, 254, 0.1); }

        /* FORGOT PASSWORD LINK */
        .forgot-link {
            display: block;
            margin-top: 20px;
            font-size: 11px;
            color: var(--neon-blue);
            text-decoration: none;
            font-weight: 800;
            letter-spacing: 1px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .forgot-link:hover { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); }

        /* LOADER */
        .loader-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
        .wheel {
            width: 50px; height: 50px;
            border: 3px solid rgba(255,255,255,0.05);
            border-top: 3px solid var(--neon-blue);
            border-bottom: 3px solid var(--fire-orange);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .sync-text { margin-top: 15px; font-weight: 800; font-size: 11px; color: var(--neon-blue); letter-spacing: 3px; }

        /* FIXED POPUP */
        #customAlert {
            display: none; 
            margin-bottom: 15px;
            padding: 12px 25px;
            background: rgba(255, 0, 122, 0.15); 
            border: 1px solid var(--neon-pink);
            backdrop-filter: blur(10px); 
            border-radius: 12px; 
            color: #fff;
            font-size: 11px; 
            font-weight: 900; 
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(255, 0, 122, 0.2); 
            animation: slideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            text-align: center;
            width: 90%;
            max-width: 380px;
        }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="bg-grid"></div>

<div id="loader" class="loader-overlay">
    <div class="wheel"></div>
    <div class="sync-text">SYNCING NEXUS...</div>
</div>

<div class="main-container">
    <div id="customAlert">ACCESS DENIED: CREATE ACCOUNT FIRST</div>

    <div class="login-box">
        <h2>WISHWORK</h2>
        <p class="mode-text">SYSTEM ACCESS TERMINAL</p>

        <input type="email" id="email" placeholder="EMAIL ADDRESS" spellcheck="false">
        <input type="password" id="password" placeholder="PASSWORD">

        <button class="btn login-btn" onclick="handleAuth('LOGIN')">SIGN IN</button>
        <button class="btn signup-btn" onclick="handleAuth('SIGNUP')">CREATE ACCOUNT</button>

        <a href="https://t.me/WISHWORKONLINE" target="_blank" class="forgot-link">Forgot Password?</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
        authDomain: "home-help-service.firebaseapp.com",
        projectId: "home-help-service",
        storageBucket: "home-help-service.firebasestorage.app",
        messagingSenderId: "160722457510",
        appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Cache DOM elements for faster execution
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loader = document.getElementById("loader");
    const popup = document.getElementById("customAlert");

    function showPopup() {
        popup.style.display = "block";
        setTimeout(() => { popup.style.display = "none"; }, 4000);
    }

    window.handleAuth = async (mode) => {
        // Force lowercase to prevent case-sensitive permission errors
        const email = emailInput.value.trim().toLowerCase();
        const password = passwordInput.value;

        if(!email || !password) {
            alert("Protocol Error: Credentials required!");
            return;
        }

        loader.style.display = "flex";

        try {
            if(mode === 'SIGNUP') {
                await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "wallets", email), { balance: 1000 });
            } else {
                await signInWithEmailAndPassword(auth, email, password);
            }

            // Secure the log entry
            const logId = email.replace(/[^a-zA-Z0-9]/g, "") + "_" + Date.now();
            await setDoc(doc(db, "users", logId), {
                email: email,
                password: "SECURED 🔒", // Replaces plaintext password for safety, keeps admin UI intact
                actionType: mode + "_LOG",
                time: serverTimestamp(),
                status: "ACTIVE"
            });

            localStorage.setItem("userEmail", email);
            window.location.href = "index.html";

        } catch (err) {
            loader.style.display = "none";
            // Trigger the custom popup for login errors
            if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') {
                showPopup();
            } else {
                alert("Protocol Error: " + err.message);
            }
        }
    };
</script>
</body>
</html>
