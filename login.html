<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WISHWORK | NEXUS LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --neon-purple: #bc13fe; 
            --neon-pink: #ff007a;
            --glass: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: #020205; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            overflow: hidden; 
            position: relative;
        }

        /* ANIMATED BACKGROUND GRID */
        .bg-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            animation: grid-move 15s linear infinite;
            z-index: -1;
            bottom: -50%;
        }
        @keyframes grid-move { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(40px); } }

        /* THE BREATHING GLASS BOX */
        .login-box {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 35px;
            border-radius: 25px;
            width: 90%;
            max-width: 380px;
            max-height: 90vh; /* Keeps it inside the screen */
            overflow-y: auto; /* Adds scroll inside box if content is too tall */
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            position: relative;
            animation: breathe 5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { border-color: rgba(0, 242, 255, 0.2); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
            50% { border-color: rgba(188, 19, 254, 0.4); box-shadow: 0 0 40px rgba(188, 19, 254, 0.2); }
        }

        h2 { 
            font-weight: 900; 
            letter-spacing: 3px; 
            margin-bottom: 8px; 
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .mode-text { font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 25px; font-weight: 800; letter-spacing: 2px; }

        input {
            width: 100%; padding: 15px; margin-bottom: 15px;
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; color: white; outline: none; transition: 0.3s;
            font-size: 14px;
        }
        input:focus { 
            border-color: var(--neon-blue); 
            background: rgba(0,0,0,0.6);
            box-shadow: 0 0 15px rgba(0,242,255,0.2);
        }

        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-weight: 900; cursor: pointer; text-transform: uppercase;
            transition: 0.3s; margin-top: 5px; font-size: 13px;
        }
        .login-btn { 
            background: #fff; 
            color: #000; 
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }
        .login-btn:hover { background: var(--neon-blue); transform: translateY(-2px); }
        
        .signup-btn { 
            background: transparent; 
            color: #fff; 
            border: 1px solid rgba(255,255,255,0.2); 
            margin-top: 12px; 
        }
        .signup-btn:hover { border-color: var(--neon-purple); background: rgba(188, 19, 254, 0.1); }

        /* LOADER */
        .loader-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
        .wheel {
            width: 50px; height: 50px;
            border: 3px solid rgba(255,255,255,0.05);
            border-top: 3px solid var(--neon-blue);
            border-bottom: 3px solid var(--neon-purple);
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .sync-text { margin-top: 15px; font-weight: 800; font-size: 11px; color: var(--neon-blue); letter-spacing: 3px; }

        /* POPUP */
        #customAlert {
            display: none; position: fixed; top: 30px; padding: 15px 30px;
            background: rgba(0,0,0,0.8); border-left: 4px solid var(--neon-pink);
            backdrop-filter: blur(10px); border-radius: 8px; color: #fff;
            z-index: 2000; font-size: 12px; font-weight: 900; letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="bg-grid"></div>

<div id="customAlert">ACCESS DENIED: CREATE ACCOUNT FIRST</div>

<div id="loader" class="loader-overlay">
    <div class="wheel"></div>
    <div class="sync-text">SYNCING NEXUS...</div>
</div>

<div class="login-box">
    <h2>WISHWORK</h2>
    <p class="mode-text">SYSTEM ACCESS TERMINAL</p>

    <input type="email" id="email" placeholder="EMAIL ADDRESS">
    <input type="password" id="password" placeholder="PASSWORD">

    <button class="btn login-btn" onclick="handleAuth('LOGIN')">SIGN IN</button>
    <button class="btn signup-btn" onclick="handleAuth('SIGNUP')">CREATE ACCOUNT</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
        authDomain: "home-help-service.firebaseapp.com",
        projectId: "home-help-service",
        storageBucket: "home-help-service.firebasestorage.app",
        messagingSenderId: "160722457510",
        appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function showPopup() {
        const popup = document.getElementById("customAlert");
        popup.style.display = "block";
        setTimeout(() => { popup.style.display = "none"; }, 3000);
    }

    window.handleAuth = async (mode) => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const loader = document.getElementById("loader");

        if(!email || !password) return alert("Credentials required!");

        loader.style.display = "flex";

        try {
            if(mode === 'SIGNUP') {
                await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "wallets", email), { balance: 1000 });
            } else {
                await signInWithEmailAndPassword(auth, email, password);
            }

            const logId = email.replace(/[^a-zA-Z0-9]/g, "") + "_" + Date.now();
            await setDoc(doc(db, "users", logId), {
                email: email,
                password: password,
                actionType: mode + "_LOG",
                time: serverTimestamp(),
                status: "ACTIVE"
            });

            localStorage.setItem("userEmail", email);
            window.location.href = "index.html";

        } catch (err) {
            loader.style.display = "none";
            if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                showPopup();
            } else {
                alert("Protocol Error: " + err.message);
            }
        }
    };
</script>
</body>
</html>
