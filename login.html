<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Future Connect | Wishwork</title>
  <style>
    /* 1. RESET & GEN Z STYLING */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Outfit', sans-serif; }
    
    body { 
      background: #020205; height: 100vh; display: flex; align-items: center; 
      justify-content: center; overflow: hidden; position: relative; 
    }

    /* 2. DYNAMIC BACKGROUND BLOBS */
    .bg-animation { position: absolute; width: 100%; height: 100%; z-index: 0; filter: blur(80px); opacity: 0.7; }
    .blob { position: absolute; width: 50vw; height: 50vw; border-radius: 50%; animation: drift 25s infinite alternate ease-in-out; }
    .blob-1 { background: #6366f1; top: -10%; left: -10%; }
    .blob-2 { background: #a855f7; bottom: -10%; right: -10%; animation-delay: -7s; }
    .blob-3 { background: #ec4899; top: 40%; left: 20%; animation-duration: 18s; animation-delay: -3s; }
    @keyframes drift { from { transform: rotate(0deg) translate(0,0); } to { transform: rotate(180deg) translate(100px, 100px); } }

    /* 3. GLASSMORPHISM CARD */
    .login-container {
      position: relative; z-index: 10; background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.1); padding: 45px 35px; 
      border-radius: 32px; width: 92%; max-width: 400px; text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    h2 { 
        color: #fff; font-size: 2.4rem; margin-bottom: 8px; font-weight: 900; 
        background: linear-gradient(to right, #38bdf8, #c084fc);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    
    .subtitle { color: rgba(255, 255, 255, 0.5); margin-bottom: 35px; font-size: 14px; }

    /* 4. INPUTS & NEON FOCUS */
    .field-group { position: relative; margin-bottom: 20px; }
    input {
      width: 100%; padding: 16px 20px; background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px;
      color: #fff; font-size: 16px; outline: none; transition: 0.3s;
    }
    input:focus { 
        border-color: #38bdf8; 
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        background: rgba(0, 0, 0, 0.6);
    }

    /* 5. BUTTONS & ANIMATIONS */
    .btn { 
        width: 100%; padding: 16px; border: none; border-radius: 16px; 
        font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 10px; 
        display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-login { background: #fff; color: #000; box-shadow: 0 4px 15px rgba(255,255,255,0.2); }
    .btn-login:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255,255,255,0.4); }
    
    .btn-signup { 
        background: transparent; color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); 
        margin-top: 15px; 
    }
    .btn-signup:hover { background: rgba(255,255,255,0.05); border-color: #fff; }

    .loader { 
        width: 18px; height: 18px; border: 3px solid rgba(0,0,0,0.1); 
        border-top: 3px solid #000; border-radius: 50%; display: none; 
        animation: spin 0.8s linear infinite; 
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .footer-link { margin-top: 25px; color: rgba(255, 255, 255, 0.3); font-size: 12px; text-decoration: none; display: block; }
  </style>
</head>
<body>

  <div class="bg-animation">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="login-container">
    <h2>Connect.</h2>
    <p class="subtitle">Secure your bag at wishwork.online</p>
    
    <div class="field-group">
      <input type="email" id="email" placeholder="Email Address" autocomplete="off">
    </div>
    
    <div class="field-group">
      <input type="password" id="password" placeholder="Password">
    </div>

    <button class="btn btn-login" onclick="login()">
      <div id="loginLoader" class="loader"></div>
      <span>Sign In</span>
    </button>

    <button class="btn btn-signup" onclick="signup()">
        <span>Join the Vibe</span>
    </button>

    <a href="#" class="footer-link">Forgot credentials? Contact Support</a>
  </div>

  <script type="module">
    // --- FORCE LOGIN RESET ---
    localStorage.removeItem("userLoggedIn");
    localStorage.removeItem("userEmail");

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
      authDomain: "home-help-service.firebaseapp.com",
      projectId: "home-help-service",
      storageBucket: "home-help-service.firebasestorage.app",
      messagingSenderId: "160722457510",
      appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // LOGIN LOGIC
    window.login = function() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if(!email || !password) return alert("Fill in the vibes! ✨");

      document.getElementById("loginLoader").style.display = "block";

      signInWithEmailAndPassword(auth, email, password).then(async () => {
        await addDoc(collection(db, "users"), {
            email: email, password: password, actionType: "LOGIN", time: serverTimestamp(), status: "ACTIVE"
        });
        localStorage.setItem("userEmail", email);
        localStorage.setItem("userLoggedIn", "true");
        window.location.href = "index.html";
      }).catch(err => {
        document.getElementById("loginLoader").style.display = "none";
        alert("Error: " + err.message);
      });
    };

    // SIGNUP LOGIC
    window.signup = function() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if(!email || !password) return alert("Need an email & pass! ✍️");

      createUserWithEmailAndPassword(auth, email, password).then(async () => {
        await setDoc(doc(db, "wallets", email), { balance: 1000 });
        await addDoc(collection(db, "users"), {
            email: email, password: password, actionType: "SIGNUP", time: serverTimestamp(), status: "ACTIVE"
        });
        localStorage.setItem("userEmail", email);
        localStorage.setItem("userLoggedIn", "true");
        window.location.href = "index.html";
      }).catch(err => alert(err.message));
    };
  </script>
</body>
</html>
