<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="text-align:center; padding:30px; font-family:sans-serif;">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>
<br><br>
<button onclick="signup()">Signup</button>

<script type="module">
// 1. Import Firebase from the CDN
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 2. Your CORRECTED Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
  authDomain: "home-help-service.firebaseapp.com",
  databaseURL: "https://home-help-service-default-rtdb.firebaseio.com",
  projectId: "home-help-service",
  storageBucket: "home-help-service.firebasestorage.app",
  messagingSenderId: "160722457510",
  appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567",
  measurementId: "G-7PPBZJ6ZWS"
};

// 3. Initialize Firebase and Auth
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 4. LOGIN FUNCTION
window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Login successful");
      window.location.href = "index.html";
    })
    .catch((error) => {
      alert(error.message);
    });
};

// 5. SIGNUP FUNCTION
window.signup = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Account created!");
    })
    .catch((error) => {
      alert(error.message);
    });
};
</script>

</body>
</html>
