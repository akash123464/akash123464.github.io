<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDvku-LXDpxjm_8mwsUJr5nUthwsA3MSf8",
  authDomain: "home-help-service.firebaseapp.com",
  projectId: "home-help-service",
  storageBucket: "home-help-service.appspot.com",
  messagingSenderId: "160722457510",
  appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Login successful");
      window.location.href = "index.html";
    })
    .catch((error) => {
      alert(error.message);
    });
};

</script>
