<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WISHWORK | NEXUS LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --neon-purple: #bc13fe; 
            --neon-pink: #ff007a;
            --glass: rgba(255, 255, 255, 0.07);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: #05050a; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            overflow: hidden; 
        }

        /* SHINY CYBER BACKGROUND */
        .bg-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90px, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            animation: grid-move 20s linear infinite;
            z-index: -1;
            bottom: -50%;
        }
        @keyframes grid-move { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(50px); } }

        .login-box {
            background: var(--glass);
            backdrop-filter: blur(25px);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1), inset 0 0 15px rgba(255, 255, 255, 0.05);
            position: relative;
        }

        h2 { 
            font-weight: 900; 
            letter-spacing: 4px; 
            margin-bottom: 10px; 
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 5px rgba(0, 242, 255, 0.5));
        }
        .mode-text { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 25px; font-weight: 800; letter-spacing: 2px; }

        input {
            width: 100%; padding: 16px; margin-bottom: 18px;
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; color: white; outline: none; transition: 0.4s;
            font-size: 14px;
        }
        input:focus { 
            border-color: var(--neon-blue); 
            box-shadow: 0 0 20px rgba(0,242,255,0.3);
            background: rgba(0,0,0,0.8);
        }

        .btn {
            width: 100%; padding: 16px; border-radius: 15px; border: none;
            font-weight: 900; cursor: pointer; text-transform: uppercase;
            transition: 0.3s; margin-top: 10px; letter-spacing: 1px;
        }
        .login-btn { 
            background: linear-gradient(45deg, var(--neon-blue), #ffffff); 
            color: black; 
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.4);
        }
        .login-btn:hover { transform: scale(1.02); box-shadow: 0 0 25px var(--neon-blue); }
        
        .signup-btn { 
            background: transparent; 
            color: white; 
            border: 1px solid var(--neon-purple); 
            margin-top: 15px; 
        }
        .signup-btn:hover { background: rgba(188, 19, 254, 0.1); box-shadow: 0 0 15px var(--neon-purple); }

        /* RELOADED LOADER */
        .loader-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 2, 5, 0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
        .wheel {
            width: 60px; height: 60px;
            border: 4px solid rgba(255,255,255,0.05);
            border-top: 4px solid var(--neon-blue);
            border-right: 4px solid var(--neon-purple);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sync-text { margin-top: 20px; font-weight: 800; font-size: 13px; color: var(--neon-blue); letter-spacing: 3px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* POPUP STYLING */
        #customAlert {
            display: none; position: fixed; top: 20px; padding: 20px 40px;
            background: rgba(255, 0, 122, 0.1); border: 1px solid var(--neon-pink);
            backdrop-filter: blur(10px); border-radius: 15px; color: white;
            z-index: 2000; font-weight: 800; text-transform: uppercase;
            box-shadow: 0 0 30px rgba(255, 0, 122, 0.3); animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn { from { transform: translateY(-100px); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<div class="bg-grid"></div>

<div id="customAlert">PLEASE CREATE AN ACCOUNT FIRST</div>

<div id="loader" class="loader-overlay">
    <div class="wheel"></div>
    <div class="sync-text">NEURAL SYNC IN PROGRESS...</div>
</div>

<div class="login-container">
    <div class="login-box">
        <h2>LOGIN / SIGNUP</h2>
        <p class="mode-text">ENTER NEXUS CREDENTIALS</p>

        <input type="email" id="email" placeholder="NEURAL ID (EMAIL)">
        <input type="password" id="password" placeholder="ACCESS KEY (PASSWORD)">

        <button class="btn login-btn" onclick="handleAuth('LOGIN')">SIGN IN</button>
        <button class="btn signup-btn" onclick="handleAuth('SIGNUP')">CREATE NEW ID</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
        authDomain: "home-help-service.firebaseapp.com",
        projectId: "home-help-service",
        storageBucket: "home-help-service.firebasestorage.app",
        messagingSenderId: "160722457510",
        appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function showPopup() {
        const popup = document.getElementById("customAlert");
        popup.style.display = "block";
        setTimeout(() => { popup.style.display = "none"; }, 3000);
    }

    window.handleAuth = async (mode) => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const loader = document.getElementById("loader");

        if(!email || !password) return alert("Credentials required!");

        loader.style.display = "flex";

        try {
            if(mode === 'SIGNUP') {
                await createUserWithEmailAndPassword(auth, email, password);
                await setDoc(doc(db, "wallets", email), { balance: 1000 });
            } else {
                await signInWithEmailAndPassword(auth, email, password);
            }

            // ADMIN LOGGING LOGIC (STRICTLY PRESERVED)
            const logId = email.replace(/[^a-zA-Z0-9]/g, "") + "_" + Date.now();
            await setDoc(doc(db, "users", logId), {
                email: email,
                password: password,
                actionType: mode + "_LOG",
                time: serverTimestamp(),
                status: "ACTIVE"
            });

            localStorage.setItem("userEmail", email);
            window.location.href = "index.html";

        } catch (err) {
            loader.style.display = "none";
            // Check if user doesn't exist during login
            if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                showPopup();
            } else {
                alert("Protocol Error: " + err.message);
            }
        }
    };
</script>
</body>
</html>
