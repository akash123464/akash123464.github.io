<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="text-align:center; padding:30px; font-family:sans-serif;">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>
<br><br>
<button onclick="signup()">Signup</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "PUT_YOUR_CORRECT_API_KEY_HERE",
  authDomain: "home-help-service.firebaseapp.com",
  projectId: "home-help-service",
  storageBucket: "home-help-service.appspot.com",
  messagingSenderId: "160722457510",
  appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN
window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Login successful");
      window.location.href = "index.html";
    })
    .catch((error) => {
      alert(error.message);
    });
};

// SIGNUP
window.signup = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => {
      alert("Account created!");
    })
    .catch((error) => {
      alert(error.message);
    });
};

</script>

</body>
</html>
