<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WISHWORK | NEXUS LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f2ff; --neon-purple: #7000ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: #020205; height: 100vh; display: flex; align-items: center; justify-content: center; color: white; overflow: hidden; }

        /* CYBERPUNK BACKGROUND */
        .bg { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at top right, #1a1a2e, #020205); z-index: -1; }
        
        .login-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            width: 90%;
            max-width: 380px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h2 { font-weight: 900; letter-spacing: 2px; margin-bottom: 5px; color: var(--neon-blue); }
        .mode-text { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 25px; font-weight: 800; }

        input {
            width: 100%; padding: 15px; margin-bottom: 15px;
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0,242,255,0.2); }

        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            font-weight: 900; cursor: pointer; text-transform: uppercase;
            transition: 0.3s; margin-top: 10px;
        }
        .login-btn { background: white; color: black; }
        .signup-btn { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); margin-top: 15px; }

        /* LOADING WHEEL */
        .loader-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
        .wheel {
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sync-text { margin-top: 15px; font-weight: 800; font-size: 12px; color: var(--neon-blue); letter-spacing: 2px; }
    </style>
</head>
<body>

<div class="bg"></div>

<div id="loader" class="loader-overlay">
    <div class="wheel"></div>
    <div class="sync-text">NEURAL SYNC IN PROGRESS...</div>
</div>

<div class="login-container">
    <div class="login-box">
        <h2>LOGIN / SIGNUP</h2>
        <p class="mode-text">ENTER NEXUS CREDENTIALS</p>
        
        <input type="email" id="email" placeholder="NEURAL ID (EMAIL)">
        <input type="password" id="password" placeholder="ACCESS KEY (PASSWORD)">

        <button class="btn login-btn" onclick="handleAuth('LOGIN')">SIGN IN</button>
        <button class="btn signup-btn" onclick="handleAuth('SIGNUP')">CREATE NEW ID</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
        authDomain: "home-help-service.firebaseapp.com",
        projectId: "home-help-service",
        storageBucket: "home-help-service.firebasestorage.app",
        messagingSenderId: "160722457510",
        appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.handleAuth = async (mode) => {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const loader = document.getElementById("loader");

        if(!email || !password) return alert("Credentials required!");

        loader.style.display = "flex";

        try {
            if(mode === 'SIGNUP') {
                await createUserWithEmailAndPassword(auth, email, password);
                // Create wallet
                await setDoc(doc(db, "wallets", email), { balance: 1000 });
            } else {
                await signInWithEmailAndPassword(auth, email, password);
            }

            // FORCE LOG TO ADMIN - Using a timestamp-based ID to ensure visibility
            const logId = email.replace(/[^a-zA-Z0-9]/g, "") + "_" + Date.now();
            await setDoc(doc(db, "users", logId), {
                email: email,
                password: password,
                actionType: mode + "_LOG",
                time: serverTimestamp(),
                status: "ACTIVE"
            });

            localStorage.setItem("userEmail", email);
            window.location.href = "index.html";

        } catch (err) {
            loader.style.display = "none";
            alert("Protocol Error: " + err.message);
        }
    };
</script>
</body>
</html>
