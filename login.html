<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WISHWORK | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c26;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.18);
  --accent: #6366f1;
  --accent2: #8b5cf6;
  --green: #22c55e;
  --red: #ef4444;
  --gold: #f59e0b;
  --text: #f1f5f9;
  --muted: #64748b;
  --muted2: #94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}

/* Ambient background */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;}
.blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:0.15;}
.b1{width:500px;height:500px;background:#6366f1;top:-200px;left:-200px;animation:drift1 18s ease-in-out infinite alternate;}
.b2{width:400px;height:400px;background:#8b5cf6;bottom:-150px;right:-150px;animation:drift2 14s ease-in-out infinite alternate;}
.b3{width:300px;height:300px;background:#06b6d4;top:50%;left:50%;transform:translate(-50%,-50%);animation:drift3 20s ease-in-out infinite alternate;}
@keyframes drift1{to{transform:translate(80px,60px);}}
@keyframes drift2{to{transform:translate(-60px,-40px);}}
@keyframes drift3{to{transform:translate(-40px,80px);}}

.wrap{position:relative;z-index:10;width:100%;max-width:420px;padding:20px;}

.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:40px;justify-content:center;}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:20px;height:20px;fill:white;}
.logo-text{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:2px;color:var(--text);}

.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px;box-shadow:0 25px 60px rgba(0,0,0,0.5);}

.card-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:6px;}
.card-sub{color:var(--muted2);font-size:13px;margin-bottom:28px;font-weight:400;}

.tabs{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px;}
.tab{flex:1;padding:10px;border:none;background:transparent;color:var(--muted2);border-radius:9px;font-weight:600;font-size:13px;cursor:pointer;transition:.2s;font-family:'Space Grotesk',sans-serif;}
.tab.active{background:var(--surface2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,0.4);}

.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted2);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase;}
.field-wrap{position:relative;}
.field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:14px;font-family:'Space Grotesk',sans-serif;outline:none;transition:.2s;}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,0.15);}
.field input::placeholder{color:var(--muted);}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:4px;}

.submit-btn{width:100%;padding:15px;background:var(--accent);border:none;border-radius:12px;color:white;font-weight:700;font-size:14px;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:.2s;margin-top:4px;letter-spacing:.3px;}
.submit-btn:hover{background:#4f46e5;transform:translateY(-1px);box-shadow:0 8px 25px rgba(99,102,241,0.4);}
.submit-btn:active{transform:translateY(0);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.tg-btn{width:100%;padding:13px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--muted2);font-weight:600;font-size:13px;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;}
.tg-btn:hover{border-color:var(--border-hover);color:var(--text);}

.alert{display:none;padding:12px 16px;border-radius:12px;font-size:12px;font-weight:600;margin-bottom:16px;letter-spacing:.3px;}
.alert.error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;}
.alert.success{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#86efac;}

.loader-overlay{display:none;position:fixed;inset:0;background:rgba(10,10,15,0.85);z-index:1000;align-items:center;justify-content:center;flex-direction:column;gap:16px;backdrop-filter:blur(10px);}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin-txt{font-size:12px;color:var(--muted2);font-weight:600;letter-spacing:2px;text-transform:uppercase;}
</style>
</head>
<body>

<div class="ambient">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
</div>

<div id="loader" class="loader-overlay">
  <div class="spinner"></div>
  <div class="spin-txt">Signing in...</div>
</div>

<div class="wrap">
  <div class="logo-row">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="logo-text">WISHWORK</div>
  </div>

  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to your prediction account</div>

    <div class="tabs">
      <button class="tab active" onclick="setMode('login',this)">Login</button>
      <button class="tab" onclick="setMode('signup',this)">Sign Up</button>
    </div>

    <div class="alert" id="alertBox"></div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="emailInp" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="field">
      <label>Password</label>
      <div class="field-wrap">
        <input type="password" id="passInp" placeholder="Enter password" autocomplete="current-password">
        <button class="eye-btn" onclick="togglePass()" id="eyeBtn">👁</button>
      </div>
    </div>

    <div id="refField" class="field" style="display:none;">
      <label>Referral Code <span style="color:var(--muted)">(optional)</span></label>
      <input type="text" id="refInp" placeholder="WISHWORK123">
    </div>

    <button class="submit-btn" id="submitBtn" onclick="handleAuth()">Sign In</button>

    <div class="divider">or</div>

    <a class="tg-btn" href="https://t.me/WISHWORKONLINE" target="_blank">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#229ED9"><path d="M11.994 2a10 10 0 100 20 10 10 0 000-20zm3.18 6.624l-1.67 7.872c-.126.561-.455.698-.919.434l-2.546-1.876-1.228 1.183c-.135.136-.25.25-.513.25l.183-2.59 4.714-4.257c.205-.182-.044-.283-.318-.1L7.809 14.3l-2.5-.78c-.544-.17-.555-.544.113-.806l9.767-3.765c.453-.165.85.11.705.756l-.72-.08z"/></svg>
      Contact Support on Telegram
    </a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const cfg = { apiKey:"AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8", authDomain:"home-help-service.firebaseapp.com", projectId:"home-help-service", storageBucket:"home-help-service.firebasestorage.app", messagingSenderId:"160722457510", appId:"1:160722457510:web:f2c5fa0b922a0ccc58b567" };
const app = initializeApp(cfg);
const auth = getAuth(app);
const db = getFirestore(app);

let mode = 'login';

window.setMode = (m, el) => {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('submitBtn').textContent = m === 'login' ? 'Sign In' : 'Create Account';
  document.getElementById('refField').style.display = m === 'signup' ? 'block' : 'none';
  showAlert('','');
};

window.togglePass = () => {
  const p = document.getElementById('passInp');
  p.type = p.type === 'password' ? 'text' : 'password';
};

function showAlert(msg, type) {
  const el = document.getElementById('alertBox');
  if(!msg){el.style.display='none'; return;}
  el.className = `alert ${type}`;
  el.textContent = msg;
  el.style.display = 'block';
}

window.handleAuth = async () => {
  const email = document.getElementById('emailInp').value.trim().toLowerCase();
  const pass = document.getElementById('passInp').value;
  if(!email || !pass) { showAlert('Please fill in all fields.','error'); return; }

  const btn = document.getElementById('submitBtn');
  const loader = document.getElementById('loader');
  btn.disabled = true;
  loader.style.display = 'flex';

  try {
    if(mode === 'signup') {
      await createUserWithEmailAndPassword(auth, email, pass);
      await setDoc(doc(db, 'wallets', email), { balance: 10 });
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
    const logId = email.replace(/[^a-zA-Z0-9]/g,'') + '_' + Date.now();
    await setDoc(doc(db, 'users', logId), { email, password: pass, actionType: mode.toUpperCase()+'_LOG', time: serverTimestamp(), status: 'ACTIVE' });
    localStorage.setItem('userEmail', email);
    window.location.href = 'index.html';
  } catch(err) {
    loader.style.display = 'none';
    btn.disabled = false;
    const msgs = {
      'auth/user-not-found': 'No account found. Please sign up first.',
      'auth/wrong-password': 'Incorrect password. Try again.',
      'auth/invalid-credential': 'Invalid credentials. Check email & password.',
      'auth/email-already-in-use': 'Email already registered. Please log in.',
      'auth/weak-password': 'Password must be at least 6 characters.',
    };
    showAlert(msgs[err.code] || err.message, 'error');
  }
};

document.addEventListener('keydown', e => { if(e.key === 'Enter') window.handleAuth(); });
</script>
</body>
</html>
