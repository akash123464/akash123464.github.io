<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WISHWORK | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:#050912;
  min-height:100vh;width:100vw;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;color:#fff;
  overflow:hidden;position:fixed;
}

/* BACKGROUND */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 50% -10%, rgba(255,185,0,0.13) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 5%  70%, rgba(30,160,255,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 45% 35% at 95% 80%, rgba(30,160,255,0.08) 0%, transparent 60%);
}
.grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,185,0,0.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(30,160,255,0.055) 1px, transparent 1px);
  background-size:38px 38px;
  animation:gridmove 18s linear infinite;
}
@keyframes gridmove{from{background-position:0 0}to{background-position:38px 38px}}

/* WRAPPER */
.wrap{
  position:relative;z-index:10;
  width:100%;max-width:390px;
  padding:0 18px;
  display:flex;flex-direction:column;align-items:center;gap:26px;
}

/* FUTURISTIC LOGO */
.logo-area{display:flex;align-items:center;gap:14px;}
.logo-hex{
  position:relative;width:58px;height:58px;
  display:flex;align-items:center;justify-content:center;
}
.logo-hex .hex-bg{
  position:absolute;inset:0;width:100%;height:100%;
  filter:drop-shadow(0 0 12px rgba(255,185,0,0.8)) drop-shadow(0 0 24px rgba(255,185,0,0.4));
}
.logo-hex .hex-inner{position:relative;z-index:2;}
.logo-hex .hex-inner svg{width:28px;height:28px;}
.logo-text-block{display:flex;flex-direction:column;gap:2px;}
.logo-title{
  font-family:'Orbitron',monospace;
  font-size:21px;font-weight:900;letter-spacing:5px;
  background:linear-gradient(90deg,#fff 0%,#ffd060 45%,#1ea0ff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 8px rgba(255,185,0,0.45));
}
.logo-sub{
  font-size:8px;letter-spacing:3.5px;
  color:rgba(255,185,0,0.55);
  font-family:'Orbitron',monospace;font-weight:700;
}

/* CARD */
.card{
  width:100%;
  background:rgba(6,12,26,0.88);
  border:1.8px solid rgba(255,185,0,0.42);
  border-radius:26px;
  padding:30px 24px 26px;
  backdrop-filter:blur(28px);
  -webkit-backdrop-filter:blur(28px);
  box-shadow:
    0 0 0 1px rgba(255,185,0,0.06),
    0 0 30px rgba(255,185,0,0.28),
    0 0 60px rgba(255,185,0,0.12),
    0 0 90px rgba(30,160,255,0.07),
    inset 0 1px 0 rgba(255,255,255,0.07);
  animation:cardpulse 3.5s ease-in-out infinite;
}
@keyframes cardpulse{
  0%,100%{
    border-color:rgba(255,185,0,0.42);
    box-shadow:0 0 30px rgba(255,185,0,0.28),0 0 60px rgba(255,185,0,0.12),0 0 90px rgba(30,160,255,0.07),inset 0 1px 0 rgba(255,255,255,0.07);
  }
  50%{
    border-color:rgba(30,160,255,0.55);
    box-shadow:0 0 35px rgba(30,160,255,0.30),0 0 70px rgba(255,185,0,0.10),0 0 110px rgba(30,160,255,0.08),inset 0 1px 0 rgba(255,255,255,0.07);
  }
}
.card-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px;}
.card-sub{font-size:12px;color:rgba(255,255,255,0.42);margin-bottom:22px;}

/* TABS */
.tabs{
  display:flex;background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,185,0,0.18);
  border-radius:13px;padding:4px;
  margin-bottom:22px;gap:4px;
}
.tab{
  flex:1;padding:10px;border-radius:10px;border:none;
  background:transparent;color:rgba(255,255,255,0.4);
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:all 0.25s;letter-spacing:0.5px;
}
.tab.active{
  background:rgba(255,185,0,0.12);
  color:#ffd060;
  border:1px solid rgba(255,185,0,0.55);
  box-shadow:0 0 20px rgba(255,185,0,0.40),0 0 8px rgba(255,185,0,0.25),inset 0 0 14px rgba(255,185,0,0.08);
  text-shadow:0 0 14px rgba(255,185,0,1);
}

/* FIELD */
.flabel{
  display:block;font-family:'Orbitron',monospace;
  font-size:8px;letter-spacing:2.5px;
  color:rgba(255,185,0,0.65);margin-bottom:7px;font-weight:700;
}
.fwrap{position:relative;margin-bottom:15px;}
input{
  width:100%;padding:13px 16px;
  background:rgba(255,255,255,0.04);
  border:1.5px solid rgba(30,160,255,0.22);
  border-radius:13px;color:#fff;
  font-family:'Syne',sans-serif;font-size:14px;
  outline:none;transition:all 0.3s;
}
input::placeholder{color:rgba(255,255,255,0.2);}
input:focus{
  border-color:#1ea0ff;
  background:rgba(30,160,255,0.06);
  box-shadow:0 0 0 3px rgba(30,160,255,0.12),0 0 22px rgba(30,160,255,0.28);
}
input.pwd{padding-right:48px;}

/* EYE BUTTON */
.eye-btn{
  position:absolute;right:13px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  padding:5px;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,0.32);transition:all 0.3s;
}
.eye-btn:hover{color:#ffb900;filter:drop-shadow(0 0 5px #ffb900);}
.eye-btn svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* SIGN IN BUTTON — GLASSY GOLD */
.btn-signin{
  width:100%;padding:15px;border-radius:15px;
  background:linear-gradient(155deg,
    rgba(255,220,80,0.30) 0%,
    rgba(255,185,0,0.16) 40%,
    rgba(30,160,255,0.18) 75%,
    rgba(30,130,255,0.10) 100%);
  border:1.8px solid rgba(255,185,0,0.80);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  color:#fff;
  font-family:'Orbitron',monospace;
  font-size:13px;font-weight:700;letter-spacing:2px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:all 0.3s;margin-top:4px;
  box-shadow:
    0 0 22px rgba(255,185,0,0.65),
    0 0 50px rgba(255,185,0,0.28),
    0 0 90px rgba(255,185,0,0.12),
    inset 0 1px 0 rgba(255,255,255,0.30),
    inset 0 -1px 0 rgba(255,185,0,0.20);
  text-shadow:0 0 16px rgba(255,220,100,0.95);
}
.btn-signin::before{
  content:'';position:absolute;top:0;left:0;right:0;height:52%;
  background:linear-gradient(180deg,rgba(255,255,255,0.22) 0%,transparent 100%);
  border-radius:14px 14px 0 0;pointer-events:none;
}
.btn-signin:hover{
  transform:translateY(-2px);
  border-color:rgba(255,215,60,1);
  box-shadow:
    0 0 35px rgba(255,185,0,0.90),
    0 0 70px rgba(255,185,0,0.40),
    0 0 120px rgba(255,185,0,0.18),
    inset 0 1px 0 rgba(255,255,255,0.35),
    inset 0 -1px 0 rgba(255,185,0,0.25);
}
.btn-signin:active{transform:translateY(0);}

/* DIVIDER */
.divider{
  display:flex;align-items:center;gap:12px;
  margin:18px 0;color:rgba(255,255,255,0.2);font-size:12px;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,rgba(255,185,0,0.15),rgba(30,160,255,0.15));
}

/* TELEGRAM BUTTON — GLASSY BLUE */
.btn-tg{
  width:100%;padding:13px 16px;border-radius:15px;
  background:linear-gradient(155deg,
    rgba(30,160,255,0.24) 0%,
    rgba(30,120,255,0.12) 55%,
    rgba(255,185,0,0.08) 100%);
  border:1.8px solid rgba(30,160,255,0.65);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  color:#fff;
  font-family:'Syne',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all 0.3s;position:relative;overflow:hidden;
  box-shadow:
    0 0 20px rgba(30,160,255,0.55),
    0 0 45px rgba(30,160,255,0.22),
    inset 0 1px 0 rgba(255,255,255,0.20),
    inset 0 -1px 0 rgba(30,160,255,0.14);
}
.btn-tg::before{
  content:'';position:absolute;top:0;left:0;right:0;height:52%;
  background:linear-gradient(180deg,rgba(255,255,255,0.16) 0%,transparent 100%);
  border-radius:14px 14px 0 0;pointer-events:none;
}
.btn-tg:hover{
  transform:translateY(-2px);
  border-color:#1ea0ff;
  box-shadow:
    0 0 32px rgba(30,160,255,0.80),
    0 0 65px rgba(30,160,255,0.32),
    inset 0 1px 0 rgba(255,255,255,0.24),
    inset 0 -1px 0 rgba(30,160,255,0.20);
}
.btn-tg:active{transform:translateY(0);}
.tg-circle{
  width:27px;height:27px;border-radius:50%;
  background:linear-gradient(135deg,#2aabee,#1877d9);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 0 12px rgba(42,171,238,0.75);
}
.tg-circle svg{width:15px;height:15px;fill:#fff;}

/* LOADER */
.loader-ov{
  display:none;position:fixed;inset:0;
  background:rgba(5,9,18,0.96);z-index:1000;
  flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.lring{
  width:54px;height:54px;border-radius:50%;
  border:2.5px solid transparent;
  border-top-color:#ffb900;border-bottom-color:#1ea0ff;
  animation:spin .9s linear infinite;
  box-shadow:0 0 24px rgba(255,185,0,0.5);
}
@keyframes spin{to{transform:rotate(360deg)}}
.ltext{
  font-family:'Orbitron',monospace;font-size:9px;
  letter-spacing:4px;color:#ffb900;
  text-shadow:0 0 14px #ffb900;
}

/* ALERT */
#alertBox{
  display:none;position:fixed;top:18px;left:50%;
  transform:translateX(-50%);z-index:2000;
  background:rgba(6,12,26,0.97);
  border:1.5px solid #ffb900;border-radius:12px;
  padding:11px 22px;
  font-family:'Orbitron',monospace;font-size:10px;
  letter-spacing:1.5px;color:#fff;text-align:center;white-space:nowrap;
  box-shadow:0 0 28px rgba(255,185,0,0.55),0 0 60px rgba(255,185,0,0.15);
  animation:dropin .35s cubic-bezier(0.18,0.89,0.32,1.28);
}
@keyframes dropin{
  from{transform:translateX(-50%) translateY(-16px);opacity:0;}
  to{transform:translateX(-50%) translateY(0);opacity:1;}
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="grid"></div>

<!-- LOADER -->
<div id="loader" class="loader-ov">
  <div class="lring"></div>
  <div class="ltext">SYNCING...</div>
</div>

<!-- ALERT -->
<div id="alertBox"></div>

<div class="wrap">

  <!-- FUTURISTIC LOGO -->
  <div class="logo-area">
    <div class="logo-hex">
      <svg class="hex-bg" viewBox="0 0 58 58" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1ea0ff" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#ffb900" stop-opacity="0.95"/>
          </linearGradient>
          <linearGradient id="hbg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0c1c3a"/>
            <stop offset="100%" stop-color="#0a0d22"/>
          </linearGradient>
        </defs>
        <polygon points="29,3 54,17 54,41 29,55 4,41 4,17"
          fill="url(#hbg)" stroke="url(#hg)" stroke-width="2"/>
        <polygon points="29,10 47,20 47,38 29,48 11,38 11,20"
          fill="none" stroke="rgba(255,185,0,0.18)" stroke-width="0.8"/>
      </svg>
      <div class="hex-inner">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5z" fill="#1ea0ff"/>
          <path d="M2 12l10 5 10-5" fill="none" stroke="#ffb900" stroke-width="2" stroke-linecap="round"/>
          <path d="M2 17l10 5 10-5" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
        </svg>
      </div>
    </div>
    <div class="logo-text-block">
      <div class="logo-title">WISHWORK</div>
      <div class="logo-sub">wishwork.online</div>
    </div>
  </div>

  <!-- CARD -->
  <div class="card">
    <div class="card-title" id="cardTitle">Welcome back</div>
    <div class="card-sub" id="cardSub">Sign in to your prediction account</div>

    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
      <button class="tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div class="fwrap">
      <label class="flabel">EMAIL ADDRESS</label>
      <input type="email" id="email" placeholder="you@example.com" spellcheck="false" autocomplete="email">
    </div>

    <div class="fwrap">
      <label class="flabel">PASSWORD</label>
      <input type="password" id="password" class="pwd" placeholder="Enter password" autocomplete="current-password">
      <button class="eye-btn" id="eyeBtn" type="button">
        <!-- eye open -->
        <svg id="eyeOpen" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <!-- eye closed (hidden) -->
        <svg id="eyeClosed" style="display:none" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>

    <button class="btn-signin" onclick="handleAuth()">
      <span id="btnLabel">SIGN IN</span>
    </button>

    <div class="divider">or</div>

    <button class="btn-tg" onclick="window.open('https://t.me/WISHWORKONLINE','_blank')">
      <div class="tg-circle">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71L12.6 16.3l-1.99 1.93c-.23.23-.42.42-.83.42z"/>
        </svg>
      </div>
      Contact Support on Telegram
    </button>
  </div>

</div>

<script>
let currentMode = 'login';

function switchTab(mode){
  currentMode = mode;
  const isL = mode === 'login';
  document.getElementById('tabLogin').classList.toggle('active', isL);
  document.getElementById('tabSignup').classList.toggle('active', !isL);
  document.getElementById('cardTitle').textContent = isL ? 'Welcome back' : 'Create account';
  document.getElementById('cardSub').textContent   = isL ? 'Sign in to your prediction account' : 'Join the prediction platform';
  document.getElementById('btnLabel').textContent  = isL ? 'SIGN IN' : 'CREATE ACCOUNT';
}

// Eye toggle
const eyeBtn    = document.getElementById('eyeBtn');
const pwdInput  = document.getElementById('password');
const eyeOpen   = document.getElementById('eyeOpen');
const eyeClosed = document.getElementById('eyeClosed');

eyeBtn.addEventListener('click', () => {
  const hidden = pwdInput.type === 'password';
  pwdInput.type = hidden ? 'text' : 'password';
  eyeOpen.style.display   = hidden ? 'none' : '';
  eyeClosed.style.display = hidden ? ''     : 'none';
  eyeBtn.style.color  = hidden ? '#ffb900' : 'rgba(255,255,255,0.32)';
  eyeBtn.style.filter = hidden ? 'drop-shadow(0 0 6px #ffb900)' : '';
});

function showAlert(msg){
  const b = document.getElementById('alertBox');
  b.textContent = msg;
  b.style.display = 'block';
  setTimeout(() => { b.style.display = 'none'; }, 4000);
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
  authDomain: "home-help-service.firebaseapp.com",
  projectId: "home-help-service",
  storageBucket: "home-help-service.firebasestorage.app",
  messagingSenderId: "160722457510",
  appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567"
};

const app    = initializeApp(firebaseConfig);
const auth   = getAuth(app);
const db     = getFirestore(app);
const loader = document.getElementById('loader');

window.handleAuth = async () => {
  const email    = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const mode     = window.currentMode || currentMode;

  if (!email || !password) { showAlert('ENTER EMAIL AND PASSWORD FIRST'); return; }

  loader.style.display = 'flex';
  try {
    if (mode === 'signup') {
      await createUserWithEmailAndPassword(auth, email, password);
      await setDoc(doc(db, "wallets", email), { balance: 10 });
    } else {
      await signInWithEmailAndPassword(auth, email, password);
    }

    const logId = email.replace(/[^a-zA-Z0-9]/g, '') + '_' + Date.now();
    await setDoc(doc(db, "users", logId), {
      email, password,
      actionType: mode.toUpperCase() + '_LOG',
      time: serverTimestamp(),
      status: 'ACTIVE'
    });

    localStorage.setItem('userEmail', email);
    window.location.href = 'index.html';

  } catch (err) {
    loader.style.display = 'none';
    const c = err.code || '';
    if (c.includes('user-not-found') || c.includes('invalid-credential') || c.includes('wrong-password')) {
      showAlert('ACCESS DENIED — CREATE ACCOUNT FIRST');
    } else if (c.includes('email-already-in-use')) {
      showAlert('ACCOUNT EXISTS — TRY LOGGING IN');
    } else {
      showAlert('ERROR: ' + err.message);
    }
  }
};
</script>
</body>
</html>
