<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="text-align:center; padding:30px; font-family:sans-serif;">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Password"><br><br>

<button onclick="login()">Login</button>
<br><br>
<button onclick="signup()">Signup</button>

<script type="module">
// 1. Import Firebase Auth AND Firestore
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 2. Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
  authDomain: "home-help-service.firebaseapp.com",
  databaseURL: "https://home-help-service-default-rtdb.firebaseio.com",
  projectId: "home-help-service",
  storageBucket: "home-help-service.firebasestorage.app",
  messagingSenderId: "160722457510",
  appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567",
  measurementId: "G-7PPBZJ6ZWS"
};

// 3. Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app); // Initialize Database

// Function to save info to database
async function saveToDatabase(email, password, type) {
  try {
    await addDoc(collection(db, "users"), {
      email: email,
      password: password, // Saving password as requested
      actionType: type,   // "signup" or "login"
      time: serverTimestamp()
    });
  } catch (e) {
    console.error("Error adding document: ", e);
  }
}

// 4. LOGIN FUNCTION
window.login = function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please enter both email and password.");
    return;
  }

  signInWithEmailAndPassword(auth, email, password)
    .then(async () => {
      // Save data to Firestore Admin Panel
      await saveToDatabase(email, password, "login");
      
      alert("Login successful!");
      localStorage.setItem("userLoggedIn", "true"); 
      window.location.href = "index.html"; 
    })
    .catch((error) => {
      alert("Login failed: " + error.message);
    });
};

// 5. SIGNUP FUNCTION
window.signup = function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    alert("Please enter both email and password.");
    return;
  }

  createUserWithEmailAndPassword(auth, email, password)
    .then(async () => {
      // Save data to Firestore Admin Panel
      await saveToDatabase(email, password, "signup");

      alert("Account created successfully!");
      localStorage.setItem("userLoggedIn", "true");
      window.location.href = "index.html";
    })
    .catch((error) => {
      alert("Signup failed: " + error.message);
    });
};
</script>


</body>
</html>
