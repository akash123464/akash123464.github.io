<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control | Wishwork</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Outfit', sans-serif; background: #030712; color: white; padding: 20px; }
        .header { text-align: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        h1 { font-weight: 900; color: #38bdf8; margin: 0; }
        
        /* SEARCH BAR */
        .search-container { margin-bottom: 20px; }
        #adminSearch {
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #334155;
            background: rgba(30, 41, 59, 0.5); color: white; font-size: 14px; outline: none;
        }
        #adminSearch:focus { border-color: #38bdf8; }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: rgba(30, 41, 59, 0.5); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card h2 { margin: 0; font-size: 24px; color: #22c55e; }
        .stat-card p { margin: 5px 0 0; color: #94a3b8; font-size: 10px; text-transform: uppercase; }

        .table-wrapper { background: rgba(30, 41, 59, 0.3); border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: rgba(255,255,255,0.05); text-align: left; padding: 12px; color: #94a3b8; text-transform: uppercase; font-size: 10px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #e2e8f0; vertical-align: middle; }
        
        .email-cell { font-weight: 600; color: #38bdf8; cursor: pointer; }
        .win-btn { background: #22c55e; color: white; border: none; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-weight: 800; margin-right: 5px; }
        .loss-btn { background: #ef4444; color: white; border: none; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-weight: 800; }
        .del-btn { background: none; color: #64748b; border: 1px solid #334155; padding: 6px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>🛠 Admin Control</h1>
    <p style="color: #64748b; font-size: 12px;">Tap Email to add Money | Win = Auto Pay (2x)</p>
</div>

<div class="search-container">
    <input type="text" id="adminSearch" placeholder="🔍 Search user email..." onkeyup="filterTable()">
</div>

<div class="stats-container">
    <div class="stat-card"><h2 id="totalEntries">0</h2><p>Total Logs</p></div>
    <div class="stat-card"><h2 id="totalUsers" style="color: #c084fc;">0</h2><p>Active Users</p></div>
</div>

<div class="table-wrapper">
    <table id="userTable">
        <thead>
            <tr>
                <th>User</th>
                <th>Amt/Pass</th>
                <th>Type</th>
                <th>Result</th>
                <th>Del</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, setDoc, getDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
        authDomain: "home-help-service.firebaseapp.com",
        projectId: "home-help-service",
        storageBucket: "home-help-service.firebasestorage.app",
        messagingSenderId: "160722457510",
        appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.updateBalance = async (email) => {
        const newBal = prompt(`Set wallet for ${email}:`, "1000");
        if (newBal) {
            await setDoc(doc(db, "wallets", email), { balance: parseInt(newBal) }, { merge: true });
            alert("Money Added! 💸");
        }
    };

    window.setResult = async (docId, result, email, betAmount) => {
        try {
            await updateDoc(doc(db, "users", docId), { status: result });
            if (result.includes("WIN")) {
                const walletRef = doc(db, "wallets", email);
                const walletSnap = await getDoc(walletRef);
                const amtString = betAmount.replace(/[^\d]/g, ''); // Extract numbers only
                const winAmt = parseInt(amtString) * 2;
                
                if (walletSnap.exists()) {
                    const currentBal = walletSnap.data().balance;
                    await updateDoc(walletRef, { balance: currentBal + winAmt });
                    alert(`WINNER! Added ₹${winAmt} 🏆`);
                }
            } else { alert("Marked Loss 💀"); }
        } catch (e) { console.error(e); }
    };

    window.deleteLog = async (docId) => {
        if (confirm("Delete this log?")) await deleteDoc(doc(db, "users", docId));
    };

    window.filterTable = () => {
        const input = document.getElementById("adminSearch").value.toLowerCase();
        const rows = document.getElementById("tableBody").getElementsByTagName("tr");
        for (let row of rows) {
            const emailText = row.getElementsByTagName("td")[0].textContent.toLowerCase();
            row.style.display = emailText.includes(input) ? "" : "none";
        }
    };

    const q = query(collection(db, "users"), orderBy("time", "desc"));
    onSnapshot(q, (snapshot) => {
        const tableBody = document.getElementById("tableBody");
        let html = "";
        let uniqueUsers = new Set();

        snapshot.forEach((userDoc) => {
            const data = userDoc.data();
            const id = userDoc.id;
            uniqueUsers.add(data.email);
            
            const currentStatus = data.status || "PENDING";
            const isBet = data.actionType.includes("Bet") && currentStatus === "PENDING";

            html += `
                <tr>
                    <td class="email-cell" onclick="updateBalance('${data.email}')">${data.email.split('@')[0]}</td>
                    <td style="color:#94a3b8;">${data.password}</td>
                    <td>${data.actionType.split(':')[0]}</td>
                    <td>
                        ${isBet ? `
                            <div class="action-btns">
                                <button class="win-btn" onclick="setResult('${id}', 'WIN 🏆', '${data.email}', '${data.password}')">W</button>
                                <button class="loss-btn" onclick="setResult('${id}', 'LOST 💀', '${data.email}', '${data.password}')">L</button>
                            </div>
                        ` : `<span style="font-weight:bold; font-size:9px;">${currentStatus}</span>`}
                    </td>
                    <td><button class="del-btn" onclick="deleteLog('${id}')">🗑</button></td>
                </tr>`;
        });
        tableBody.innerHTML = html;
        document.getElementById("totalEntries").innerText = snapshot.size;
        document.getElementById("totalUsers").innerText = uniqueUsers.size;
    });
</script>
</body>
</html>
