<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control | Wishwork</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Outfit', sans-serif; background: #030712; color: white; padding: 20px; }
        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }
        h1 { font-weight: 900; letter-spacing: 1px; color: #38bdf8; }
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-card { background: rgba(30, 41, 59, 0.5); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card h2 { margin: 0; font-size: 28px; color: #22c55e; }
        .stat-card p { margin: 5px 0 0; color: #94a3b8; font-size: 12px; text-transform: uppercase; }
        .table-wrapper { background: rgba(30, 41, 59, 0.3); border-radius: 24px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: rgba(255,255,255,0.05); text-align: left; padding: 15px; color: #94a3b8; font-size: 10px; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #e2e8f0; }
        .email-cell { font-weight: 600; cursor: pointer; color: #38bdf8; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .action-btns { display: flex; gap: 5px; }
        .win-btn { background: #22c55e; color: white; border: none; padding: 5px 8px; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: 800; }
        .loss-btn { background: #ef4444; color: white; border: none; padding: 5px 8px; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: 800; }
        .del-btn { background: none; color: #64748b; border: 1px solid #334155; padding: 5px 8px; border-radius: 6px; cursor: pointer; font-size: 10px; }
        .loading { text-align: center; padding: 50px; color: #64748b; }
    </style>
</head>
<body>

<div class="header">
    <h1>🛠 Admin Control</h1>
    <p style="color: #64748b;">Tap Email for Money | Win = Auto Pay (2x)</p>
</div>

<div class="stats-container">
    <div class="stat-card"><h2 id="totalEntries">0</h2><p>Total Logs</p></div>
    <div class="stat-card"><h2 id="totalUsers" style="color: #c084fc;">0</h2><p>Active Users</p></div>
</div>

<div class="table-wrapper">
    <table id="userTable">
        <thead>
            <tr>
                <th>User</th>
                <th>Amt/Info</th>
                <th>Type</th>
                <th>Result</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <div id="loader" class="loading">Syncing...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, doc, setDoc, getDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
        authDomain: "home-help-service.firebaseapp.com",
        projectId: "home-help-service",
        storageBucket: "home-help-service.firebasestorage.app",
        messagingSenderId: "160722457510",
        appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.updateBalance = async (email) => {
        const newBal = prompt(`Set wallet for ${email}:`, "1000");
        if (newBal) {
            await setDoc(doc(db, "wallets", email), { balance: parseInt(newBal) }, { merge: true });
            alert("Balance Set! 💸");
        }
    };

    window.setResult = async (docId, result, email, betAmount) => {
        try {
            // 1. Update the bet status
            await updateDoc(doc(db, "users", docId), { status: result });

            // 2. If it's a WIN, auto-credit 2x amount
            if (result.includes("WIN")) {
                const walletRef = doc(db, "wallets", email);
                const walletSnap = await getDoc(walletRef);
                const winAmt = parseInt(betAmount.replace('₹', '')) * 2;
                
                if (walletSnap.exists()) {
                    const currentBal = walletSnap.data().balance;
                    await updateDoc(walletRef, { balance: currentBal + winAmt });
                    alert(`Bet Won! ₹${winAmt} added to user wallet. 🏆`);
                }
            } else {
                alert("Marked as LOSS! 💀");
            }
        } catch (e) { console.error(e); }
    };

    window.deleteLog = async (docId) => {
        if (confirm("Delete permanently?")) await deleteDoc(doc(db, "users", docId));
    };

    const q = query(collection(db, "users"), orderBy("time", "desc"));
    onSnapshot(q, (snapshot) => {
        const tableBody = document.getElementById("tableBody");
        document.getElementById("loader").style.display = "none";
        let html = "";
        let uniqueUsers = new Set();

        snapshot.forEach((userDoc) => {
            const data = userDoc.data();
            const id = userDoc.id;
            uniqueUsers.add(data.email);
            const isBet = data.actionType.includes("Bet") && !data.status.includes("WIN") && !data.status.includes("LOST");

            html += `
                <tr>
                    <td class="email-cell" onclick="updateBalance('${data.email}')">${data.email.split('@')[0]}</td>
                    <td style="color:#94a3b8;">${data.password}</td>
                    <td><span class="badge" style="color:#38bdf8;">${data.actionType.split(':')[0]}</span></td>
                    <td>
                        ${isBet ? `
                            <div class="action-btns">
                                <button class="win-btn" onclick="setResult('${id}', 'WIN 🏆', '${data.email}', '${data.password}')">W</button>
                                <button class="loss-btn" onclick="setResult('${id}', 'LOST 💀', '${data.email}', '${data.password}')">L</button>
                            </div>
                        ` : `<span style="font-size:10px; font-weight:bold;">${data.status || '--'}</span>`}
                    </td>
                    <td><button class="del-btn" onclick="deleteLog('${id}')">🗑</button></td>
                </tr>`;
        });
        tableBody.innerHTML = html;
        document.getElementById("totalEntries").innerText = snapshot.size;
        document.getElementById("totalUsers").innerText = uniqueUsers.size;
    });
</script>
</body>
</html>
