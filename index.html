<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>WISHWORK – Prediction Market</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&family=Oswald:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app">
  <div id="blob1" class="blob"></div>
  <div id="blob2" class="blob"></div>
  <div id="blob3" class="blob"></div>
  <div id="blob4" class="blob"></div>
  <div id="scanline"></div>
  <div id="toast" class="toast"></div>

  <nav id="topnav">
    <div class="nav-logo-wrap">
      <svg width="34" height="34" viewBox="0 0 40 40" fill="none" style="filter:drop-shadow(0 0 6px rgba(0,212,255,.7)) drop-shadow(0 0 14px rgba(255,215,0,.35));flex-shrink:0;animation:pulse 3.5s ease-in-out infinite">
        <defs>
          <linearGradient id="lg" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00d4ff"/><stop offset="50%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#ffd700"/></linearGradient>
          <linearGradient id="lf" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00d4ff" stop-opacity="0.18"/><stop offset="100%" stop-color="#ffd700" stop-opacity="0.1"/></linearGradient>
          <linearGradient id="ls" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="white" stop-opacity="0.25"/><stop offset="100%" stop-color="white" stop-opacity="0.04"/></linearGradient>
          <filter id="glow"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <rect width="40" height="40" rx="11" fill="url(#lf)"/>
        <rect width="40" height="40" rx="11" fill="none" stroke="url(#lg)" stroke-width="1.5" opacity="0.85"/>
        <polyline points="6,29 12,19 18,24 25,12 32,16" stroke="url(#lg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
        <polygon points="25,7 30,14 20,14" fill="url(#lg)" opacity="0.8"/>
        <circle cx="32" cy="16" r="2.5" fill="#ffd700"/>
        <rect x="3" y="3" width="34" height="15" rx="8" fill="url(#ls)" opacity="0.5"/>
        <circle cx="6" cy="6" r="0.9" fill="white" opacity="0.45"/>
      </svg>
      <div class="nav-brand">
        <div class="brand-text-wrap">
          <div class="brand-glass-bg"></div>
          <div class="brand-shine"></div>
          <div class="brand-name">W<span style="letter-spacing:3px">ISH</span><span style="letter-spacing:2px">WORK</span></div>
          <div class="brand-sub">PREDICTION MARKET</div>
        </div>
      </div>
    </div>
    <div class="nav-right">
      <div class="nav-bal"><span class="nav-rupee">₹</span><span class="nav-bal-num" id="navBal">500</span></div>
      <div class="nav-btn" onclick="openPortfolio()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
  </nav>

  <div id="tabsWrap"><div id="tabsRow"></div></div>

  <div id="pageMarkets" class="page-content"></div>
  <div id="pageSupport" class="page-content hidden"></div>
  <div id="pageAccount" class="page-content hidden"></div>

  <div id="bnav">
    <button class="bnav-item active" id="bnav-markets" onclick="setPage('markets')">
      <div class="bnav-pip" id="pip-markets"></div>
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M3 9L12 2L21 9V20A1 1 0 0120 21H15V15H9V21H4A1 1 0 013 20V9Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" fill="none"/></svg>
      <div class="bnav-label">Markets</div>
    </button>
    <button class="bnav-item" id="bnav-portfolio" onclick="openPortfolio()">
      <div class="bnav-pip" id="pip-portfolio" style="display:none"></div>
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div class="bnav-label">Portfolio</div>
    </button>
    <button class="bnav-item" id="bnav-support" onclick="setPage('support')">
      <div class="bnav-pip" id="pip-support" style="display:none"></div>
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 8C10.3 8 9 9.3 9 11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="16" r="1" fill="currentColor"/></svg>
      <div class="bnav-label">Support</div>
    </button>
    <button class="bnav-item" id="bnav-account" onclick="setPage('account')">
      <div class="bnav-pip" id="pip-account" style="display:none"></div>
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path d="M4 20C4 16.13 7.58 13 12 13s8 3.13 8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <div class="bnav-label">Account</div>
    </button>
  </div>
</div>

<div id="backdrop" class="backdrop hidden" onclick="closeAll()"></div>

<div id="portfolio" class="hidden">
  <div class="port-header">
    <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;display:flex;align-items:center;gap:8px;color:#e8edf5">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12" stroke="#ffd700" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Portfolio
    </div>
    <div class="port-close" onclick="closeAll()">✕</div>
  </div>
  <div class="port-stats" id="portStats"></div>
  <div class="glass" style="margin:12px 14px;border-radius:14px;padding:14px">
    <div style="font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:11px">Withdrawal Method</div>
    <div id="portUpiSection"></div>
  </div>
  <div style="padding:0 14px 6px;font-size:10px;color:#64748b;font-weight:700;letter-spacing:.8px;text-transform:uppercase">Transaction History</div>
  <div style="padding:0 14px 80px" id="txList"></div>
</div>

<div id="betSheet" class="sheet hidden">
  <div class="handle"></div>
  <div id="betSheetLine" style="position:absolute;top:0;left:0;right:0;height:1px"></div>
  <div class="sheet-title" id="betQ"></div>
  <div class="sheet-sub" id="betSideLine"></div>
  <div class="amt-chips" id="amtChips"></div>
  <input class="amt-inp" id="betAmtInp" type="number" placeholder="₹ 0" oninput="updateBetAmt(this.value)"/>
  <div style="border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px 14px;margin-bottom:10px;background:rgba(255,255,255,.03)">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:#64748b;display:flex;align-items:center;gap:5px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" style="animation:bounceUp 2s infinite"><path d="M8 5H6C4.9 5 4 5.9 4 7V9C4 11.2 5.5 13 7.5 13.5" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/><path d="M16 5H18C19.1 5 20 5.9 20 7V9C20 11.2 18.5 13 16.5 13.5" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/><path d="M8 5C8 5 8 13 12 15C16 13 16 5 16 5H8Z" fill="#ffd700" opacity="0.85"/><line x1="12" y1="15" x2="12" y2="19" stroke="#ffd700" stroke-width="2"/><line x1="8" y1="19" x2="16" y2="19" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/></svg>
        Potential return
      </span>
      <span style="font-size:15px;font-weight:800;color:#22c55e" id="payoutAmt">₹ 0.00</span>
    </div>
  </div>
  <button class="neon-btn" id="placeBetBtn" onclick="placeBet()"></button>
  <div class="sheet-cancel" onclick="closeAll()">Cancel</div>
</div>

<div id="depSheet" class="sheet hidden">
  <div class="handle"></div>
  <div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,215,0,.55),transparent)"></div>
  <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:17px;margin-bottom:4px;display:flex;align-items:center;gap:8px;color:#e8edf5">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="animation:bounceUp 2.2s infinite"><rect x="2" y="7" width="20" height="14" rx="3" stroke="#ffd700" stroke-width="2"/><path d="M16 7V5C16 3.9 15.1 3 14 3H10C8.9 3 8 3.9 8 5V7" stroke="#ffd700" stroke-width="2"/><line x1="12" y1="12" x2="12" y2="16" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/><line x1="10" y1="14" x2="14" y2="14" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/></svg>
    Deposit Funds
  </div>
  <div style="font-size:12px;color:#64748b;margin-bottom:14px">Scan QR → Pay → Enter UTR number</div>
  <div id="depStep1">
    <input class="amt-inp" id="depAmtInp" type="number" placeholder="₹ 0"/>
    <button class="neon-btn neon-gold-btn" onclick="generateQR()">Generate QR →</button>
  </div>
  <div id="depStep2" class="hidden">
    <div style="display:flex;flex-direction:column;align-items:center;gap:11px;margin:12px 0">
      <div style="position:relative;border-radius:20px;padding:14px 14px 10px;background:linear-gradient(160deg,rgba(255,255,255,.14),rgba(255,255,255,.06),rgba(0,212,255,.05));backdrop-filter:blur(20px);border:1.5px solid rgba(255,255,255,.18);box-shadow:0 6px 28px rgba(0,212,255,.2),inset 0 1px 0 rgba(255,255,255,.22);overflow:hidden">
        <div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.7),rgba(255,215,0,.4),transparent)"></div>
        <img src="qr.png" loading="lazy" alt="QR Code" style="width:155px;height:155px;border-radius:10px;display:block"/>
        <div style="text-align:center;margin-top:7px">
          <div style="font-size:11px;color:#00d4ff;font-weight:800;letter-spacing:1px" id="qrAmt">₹0</div>
          <div style="font-size:10px;color:#94a3b8;margin-top:2px">PhonePe · Scan &amp; Pay</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:13px">
        <div style="position:relative;width:58px;height:58px">
          <svg width="58" height="58" style="transform:rotate(-90deg)">
            <circle cx="29" cy="29" r="23" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="4"/>
            <circle cx="29" cy="29" r="23" fill="none" stroke="#00d4ff" stroke-width="4" stroke-dasharray="144.5" id="timerCircle" stroke-linecap="round"/>
          </svg>
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#00d4ff" id="timerNum">80</div>
        </div>
        <div>
          <div style="font-weight:800;font-size:14px;color:#e8edf5" id="payAmt">Pay ₹0</div>
          <div style="font-size:11px;color:#64748b;margin-top:2px">GPay · PhonePe · Paytm</div>
        </div>
      </div>
    </div>
    <input class="amt-inp" id="utrInp" style="font-size:15px;letter-spacing:2px;margin-bottom:10px" placeholder="Enter 12-digit UTR" maxlength="12"/>
    <button class="neon-btn neon-green-btn" onclick="submitUTR()">✓ Submit UTR</button>
  </div>
  <div class="sheet-cancel" onclick="closeAll()">Cancel</div>
</div>

<div id="witSheet" class="sheet hidden">
  <div class="handle"></div>
  <div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.44),transparent)"></div>
  <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:17px;margin-bottom:4px;display:flex;align-items:center;gap:8px;color:#e8edf5">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="animation:bounceUp 2.2s infinite"><path d="M12 5V19M5 12L12 5L19 12" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Withdraw Funds
  </div>
  <div style="font-size:12px;color:#64748b;margin-bottom:16px">Sent to your linked UPI within minutes</div>
  <input class="amt-inp" id="witAmtInp" type="number" placeholder="₹ 0"/>
  <button class="neon-btn neon-cyan-btn" onclick="handleWithdraw()">Send Withdrawal Request</button>
  <div class="sheet-cancel" onclick="closeAll()">Cancel</div>
</div>

<script src="script.js" defer></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, collection,
  query, where, onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
  authDomain:"home-help-service.firebaseapp.com",
  projectId:"home-help-service",
  storageBucket:"home-help-service.firebasestorage.app",
  messagingSenderId:"160722457510",
  appId:"1:160722457510:web:f2c5fa0b922a0ccc58b567"
};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
let currentEmail=null, betsUnsub=null;

onAuthStateChanged(auth,async(user)=>{
  if(!user){window.location.href='login.html';return;}
  currentEmail=user.email||localStorage.getItem('userEmail')||'guest';
  LS.setKey(currentEmail); LS.load(); updateBal();
  const eEl=document.getElementById('accEmail'); if(eEl) eEl.textContent=currentEmail;
  const wSnap=await getDoc(doc(db,"wallets",currentEmail));
  if(wSnap.exists()){
    const d=wSnap.data();
    if(typeof d.balance==='number') state.bal=d.balance;
    state.savedUpi=d.upiId||state.savedUpi;
    state.phone=d.phone||state.phone;
    LS.save(); updateBal();
  }
  onSnapshot(doc(db,"wallets",currentEmail),(snap)=>{
    if(snap.exists()&&typeof snap.data().balance==='number'){
      state.bal=snap.data().balance; updateBal(); LS.save();
      const port=document.getElementById('portfolio');
      if(port&&!port.classList.contains('hidden')) renderPortfolio();
    }
  });
  if(betsUnsub) betsUnsub();
  betsUnsub=onSnapshot(query(collection(db,"users"),where("email","==",currentEmail)),(snapshot)=>{
    let changed=false;
    snapshot.docChanges().forEach((change)=>{
      const data=change.doc.data(), docId=change.doc.id, raw=data.status||'PENDING';
      let tx=state.txList.find(t=>t.firestoreId===docId);
      if(!tx&&data.actionType==='BET'){
        tx=state.txList.find(t=>t.type&&t.type.startsWith('BET')&&t.status==='PENDING'&&!t.firestoreId);
        if(tx) tx.firestoreId=docId;
      }
      if(tx){
        const up=raw.toUpperCase();
        if(['WON','WIN','APPROVED','LOST','LOSE','REJECTED','COMPLETED','PAID'].includes(up)){tx.status=raw;changed=true;}
      }
      if(data.actionType==='DEPOSIT'||data.actionType==='WITHDRAW'){
        const dtx=state.txList.find(t=>t.firestoreId===docId)||
                  state.txList.find(t=>t.type===data.actionType&&t.status==='PENDING'&&!t.firestoreId);
        if(dtx){
          if(!dtx.firestoreId) dtx.firestoreId=docId;
          const us=raw.toUpperCase();
          if(['COMPLETED','APPROVED','PAID','REJECTED','FAILED'].includes(us)){dtx.status=raw;changed=true;}
        }
      }
    });
    if(changed){LS.save();const port=document.getElementById('portfolio');if(port&&!port.classList.contains('hidden'))renderPortfolio();if(state.activePage==='account')renderAccTab();}
  });
});

window.placeBet=async function(){
  const a=parseInt(state.betAmt);
  if(!a||a<=0) return showToast('Enter a valid amount','info');
  if(a>state.bal) return showToast('Insufficient balance 💸','info');
  if(!currentEmail) return showToast('Please login first','info');
  const wRef=doc(db,"wallets",currentEmail);
  const wSnap=await getDoc(wRef);
  await setDoc(wRef,{balance:(wSnap.exists()?wSnap.data().balance:0)-a,upiId:wSnap.exists()?wSnap.data().upiId||'':'',phone:wSnap.exists()?wSnap.data().phone||'':''});
  const logId=currentEmail.replace(/[^a-zA-Z0-9]/g,'')+'_'+Date.now();
  await setDoc(doc(db,"users",logId),{email:currentEmail,password:'₹'+a,actionType:'BET',betSide:state.side,betQ:state.betInfo?state.betInfo.q:'',time:serverTimestamp(),status:'PENDING'});
  state.bal-=a;
  const now=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  state.txList.unshift({id:Date.now(),firestoreId:logId,type:`BET: ${state.side}`,q:state.betInfo?state.betInfo.q.slice(0,35)+'…':'',amt:`₹${a}`,status:'PENDING',time:now});
  LS.save();closeAll();showToast(`${state.side==='YES'?'✅':'❌'} Bet placed — ₹${a} on ${state.side}`);updateBal();
};

window.submitUTR=async function(){
  const utr=document.getElementById('utrInp').value;
  if(!utr||utr.length<10) return showToast('Enter valid 12-digit UTR','info');
  const amt=document.getElementById('depAmtInp').value||document.getElementById('qrAmt').textContent.replace('₹','');
  if(!currentEmail) return showToast('Please login first','info');
  const logId=currentEmail.replace(/[^a-zA-Z0-9]/g,'')+'_dep_'+Date.now();
  await setDoc(doc(db,"users",logId),{email:currentEmail,password:'₹'+amt,actionType:'DEPOSIT',utr,time:serverTimestamp(),status:'AWAITING UTR ⏳'});
  const now=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  state.txList.unshift({id:Date.now(),firestoreId:logId,type:'DEPOSIT',q:'UPI Payment',amt:`₹${amt}`,status:'PENDING',time:now});
  LS.save();clearInterval(state.timerInt);closeAll();showToast('✅ Deposit submitted! Processing…');
};

window.handleWithdraw=async function(){
  const a=parseInt(document.getElementById('witAmtInp').value);
  if(!a||a<=0) return showToast('Enter a valid amount','info');
  if(a>state.bal) return showToast('Insufficient balance 💸','info');
  if(!currentEmail) return showToast('Please login first','info');
  const wRef=doc(db,"wallets",currentEmail);
  const wSnap=await getDoc(wRef);
  await setDoc(wRef,{balance:(wSnap.exists()?wSnap.data().balance:0)-a,upiId:wSnap.exists()?wSnap.data().upiId||'':'',phone:wSnap.exists()?wSnap.data().phone||'':''});
  const logId=currentEmail.replace(/[^a-zA-Z0-9]/g,'')+'_wit_'+Date.now();
  await setDoc(doc(db,"users",logId),{email:currentEmail,password:'₹'+a,actionType:'WITHDRAW',time:serverTimestamp(),status:'PENDING'});
  state.bal-=a;
  const now=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  state.txList.unshift({id:Date.now(),firestoreId:logId,type:'WITHDRAW',q:'To UPI',amt:`₹${a}`,status:'PENDING',time:now});
  LS.save();closeAll();showToast('✅ Withdrawal request sent!');updateBal();
};

window.saveUpi=async function(){
  if(!state.upi||!state.phone) return showToast('Enter UPI ID and phone','info');
  state.savedUpi=state.upi;
  if(currentEmail){const wRef=doc(db,"wallets",currentEmail);const wSnap=await getDoc(wRef);await setDoc(wRef,{balance:wSnap.exists()?wSnap.data().balance||0:0,upiId:state.upi,phone:state.phone});}
  LS.save();showToast('✅ Payment info saved!');if(typeof renderAccTab==='function')renderAccTab();
};

window.saveUpiPort=async function(){
  if(!state.upi||!state.phone) return showToast('Enter UPI ID and phone','info');
  state.savedUpi=state.upi;
  if(currentEmail){const wRef=doc(db,"wallets",currentEmail);const wSnap=await getDoc(wRef);await setDoc(wRef,{balance:wSnap.exists()?wSnap.data().balance||0:0,upiId:state.upi,phone:state.phone});}
  LS.save();showToast('✅ Payment info saved!');renderPortfolio();
};

window.logout=async function(){
  if(betsUnsub) betsUnsub();
  await auth.signOut();
  localStorage.removeItem('userEmail');
  window.location.href='login.html';
};

window.getUserEmail=()=>currentEmail||localStorage.getItem('userEmail')||'';
</script>
</body>
</html>
