<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WISHWORK | NEXUS</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff007a;
            --neon-blue: #00f2ff;
            --neon-purple: #7000ff;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        /* FUTURISTIC MOVING MESH BACKGROUND */
        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(45deg, #0f172a, #581c87, #9d174d, #1e1b4b);
            background-size: 400% 400%;
            animation: meshGradient 15s ease infinite;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        @keyframes meshGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* BENT LOGO WITH INTERACTIVE ANIMATION */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            background: rgba(0, 0, 0, 0.3);
            position: sticky; top: 0; z-index: 2000;
            border-bottom: 1px solid var(--glass-border);
        }

        .brand-logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink), var(--neon-purple));
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flow 3s linear infinite;
            transform: skewX(-15deg);
            cursor: pointer;
            filter: drop-shadow(0 0 10px rgba(0,242,255,0.5));
            transition: 0.3s;
        }

        .brand-logo:active { transform: skewX(-15deg) scale(0.9); }

        @keyframes flow { to { background-position: 200% center; } }

        /* GLASSMORPHIC WALLET */
        .balance-card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            margin: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-amount {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* CATEGORY PILLS */
        .categories {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px;
            scrollbar-width: none;
        }
        .cat-btn {
            padding: 12px 22px; border-radius: 50px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            color: #fff; font-weight: 600; font-size: 12px;
            white-space: nowrap; cursor: pointer; backdrop-filter: blur(10px);
        }
        .cat-btn.active {
            background: #fff; color: #000; box-shadow: 0 0 20px #fff;
        }

        /* FUTURISTIC BET CARDS */
        .bet-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 25px;
            margin: 15px 20px;
            transition: 0.4s;
        }
        
        .card-tag {
            font-size: 10px; font-weight: 900; letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 10px; color: var(--neon-blue);
        }

        .question { font-size: 19px; font-weight: 600; line-height: 1.4; margin-bottom: 20px; }

        /* ACTION BUTTONS */
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt-btn {
            padding: 16px; border-radius: 20px; border: none; font-weight: 900;
            font-size: 14px; cursor: pointer; transition: 0.2s;
            text-transform: uppercase;
        }
        .yes-btn { background: #22c55e; color: #fff; box-shadow: 0 5px 15px rgba(34,197,94,0.4); }
        .no-btn { background: #ef4444; color: #fff; box-shadow: 0 5px 15px rgba(239,68,68,0.4); }

        /* TELEGRAM FAB */
        .tele-fab {
            position: fixed; bottom: 30px; right: 25px;
            width: 70px; height: 70px; background: #0088cc;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 136, 204, 0.5); z-index: 5000;
            text-decoration: none; border: 3px solid rgba(255,255,255,0.2);
        }
        .tele-fab img { width: 35px; }

        /* CASH RAIN ANIMATION */
        .cash-note {
            position: fixed; top: -100px; font-size: 40px; z-index: 10000;
            user-select: none; pointer-events: none;
            animation: fall 2.5s linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) scale(1.2); opacity: 0; }
        }

        /* POPUP UI */
        .popup {
            position: fixed; bottom: -110%; left: 0; width: 100%;
            background: rgba(10, 10, 20, 0.95); backdrop-filter: blur(30px);
            padding: 40px 30px; border-radius: 40px 40px 0 0;
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); z-index: 6000;
            border-top: 2px solid var(--neon-pink);
        }
        .popup.active { bottom: 0; }
        .input-nexus {
            width: 100%; background: rgba(255,255,255,0.1); border: 2px solid var(--glass-border);
            padding: 20px; border-radius: 20px; color: #fff; font-size: 28px;
            text-align: center; font-weight: 900; margin: 20px 0;
        }
    </style>
</head>
<body>

<div id="rain-zone"></div>

<div class="header">
    <div class="brand-logo" onclick="triggerCashRain()">WISHWORK</div>
    <div onclick="location.href='login.html'" style="font-weight:900; font-size:12px; color:var(--neon-pink); cursor:pointer;">LOGOUT</div>
</div>

<div class="balance-card">
    <div>
        <div style="font-size:10px; color:rgba(255,255,255,0.6); font-weight:800; letter-spacing:2px;">LIQUID VAULT</div>
        <div class="balance-amount">₹<span id="displayBalance">885</span></div>
    </div>
    <button class="cat-btn active" onclick="openPopup('Deposit', true)">TOP UP</button>
</div>

<div class="categories">
    <button class="cat-btn active">All Nodes</button>
    <button class="cat-btn">Instagram</button>
    <button class="cat-btn">Crypto</button>
    <button class="cat-btn">Commodity</button>
</div>

<div id="feedsContainer">
    <div class="bet-card">
        <div class="card-tag">Social Nexus</div>
        <div class="question">Will Karan Aujla post more than 5 stories today?</div>
        <div class="options">
            <button class="opt-btn yes-btn" onclick="openPopup('Karan Aujla: YES')">YES</button>
            <button class="opt-btn no-btn" onclick="openPopup('Karan Aujla: NO')">NO</button>
        </div>
    </div>

    <div class="bet-card">
        <div class="card-tag">Bullion Node</div>
        <div class="question">Will Gold price break resistance tomorrow?</div>
        <div class="options">
            <button class="opt-btn yes-btn" onclick="openPopup('Gold: HIGH')">RISE</button>
            <button class="opt-btn no-btn" onclick="openPopup('Gold: LOW')">DROP</button>
        </div>
    </div>
</div>

<a href="https://t.me/WISHWORKONLINE" class="tele-fab" target="_blank">
    <svg width="35" height="35" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/></svg>
</a>

<div class="popup" id="masterPopup">
    <h2 id="modalTitle" style="text-align:center; font-weight:900;">NODE ACCESS</h2>
    <input type="number" id="userAmt" class="input-nexus" placeholder="0.00">
    <button class="opt-btn" style="width:100%; background: #fff; color: #000;" onclick="executeAction()">CONFIRM LINK</button>
    <div onclick="closePopup()" style="text-align:center; margin-top:25px; color:rgba(255,255,255,0.4); cursor:pointer; font-weight:800; font-size:12px; letter-spacing:2px;">ABORT SYNC</div>
</div>

<script>
    // GEN Z CASH RAIN ANIMATION
    function triggerCashRain() {
        const zone = document.getElementById('rain-zone');
        const currency = ['💸', '💵', '💎', '🔥', '✨'];
        
        for (let i = 0; i < 50; i++) {
            setTimeout(() => {
                const note = document.createElement('div');
                note.className = 'cash-note';
                note.innerText = currency[Math.floor(Math.random() * currency.length)];
                note.style.left = Math.random() * 100 + 'vw';
                zone.appendChild(note);
                
                // Cleanup
                setTimeout(() => note.remove(), 2500);
            }, i * 50);
        }
        
        if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
    }

    // POPUP LOGIC
    function openPopup(title) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('masterPopup').classList.add('active');
    }

    function closePopup() {
        document.getElementById('masterPopup').classList.remove('active');
    }

    function executeAction() {
        // Here you would integrate your Firebase Logic
        alert("Syncing with Nexus...");
        closePopup();
    }
</script>

</body>
</html>
