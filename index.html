<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>WISHWORK – Prediction Market</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  body{font-family:'Space Grotesk',sans-serif;background:#060810;color:#f1f5f9;min-height:100vh;overscroll-behavior:none}
  .hidden { display: none; }
  .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
  .neon-text { text-shadow: 0 0 10px rgba(34, 211, 238, 0.5); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader { border: 3px solid rgba(255,255,255,0.1); border-top-color: #22d3ee; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; }
</style>
</head>

<body class="pb-24">

  <nav class="flex justify-between items-center px-6 py-5 sticky top-0 z-40 glass">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(6,182,212,0.4)]">
        <i class="fa-solid fa-bolt text-black text-xl"></i>
      </div>
      <span class="font-bold tracking-tighter text-xl italic uppercase">Wishwork</span>
    </div>
    <div class="flex items-center gap-4 bg-white/5 px-4 py-2 rounded-full border border-white/10">
      <i class="fa-solid fa-wallet text-cyan-400"></i>
      <span class="font-bold text-sm" id="navBal">0</span>
    </div>
  </nav>

  <main class="p-6 max-w-md mx-auto space-y-8">
    <div class="relative overflow-hidden p-8 rounded-[2rem] bg-gradient-to-br from-cyan-600 to-blue-700 shadow-2xl shadow-cyan-900/20">
      <div class="relative z-10">
        <p class="text-cyan-100/70 text-xs font-bold uppercase tracking-widest mb-1">Available Credits</p>
        <h1 class="text-5xl font-black mb-6 tracking-tighter">₹<span id="balNum">0</span></h1>
        <div class="flex gap-3">
          <button onclick="openDeposit()" class="flex-1 bg-white text-black font-bold py-4 rounded-2xl active:scale-95 transition-all flex items-center justify-center gap-2">
            <i class="fa-solid fa-plus-circle"></i> DEPOSIT
          </button>
          <button onclick="openWithdraw()" class="flex-1 bg-black/20 hover:bg-black/30 backdrop-blur-md text-white font-bold py-4 rounded-2xl active:scale-95 transition-all flex items-center justify-center gap-2 border border-white/10">
            <i class="fa-solid fa-arrow-up-from-bracket"></i> WITHDRAW
          </button>
        </div>
      </div>
    </div>

    <div class="glass p-6 rounded-3xl border border-white/10">
        <h3 class="font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-chart-line text-cyan-400"></i> ACTIVE SIGNALS</h3>
        <p class="text-gray-400 text-sm italic">Connect to Telegram for live trade signals...</p>
        <button onclick="window.open('https://t.me/WISHWORKONLINE','_blank')" class="w-full mt-4 bg-[#24A1DE] py-3 rounded-xl font-bold flex items-center justify-center gap-2">
            <i class="fa-brands fa-telegram"></i> JOIN TELEGRAM
        </button>
    </div>
  </main>

  <div id="backdrop" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden" onclick="closeAll()"></div>
  <div id="depSheet" class="fixed bottom-0 left-0 right-0 glass rounded-t-[3rem] z-[60] p-8 transform translate-y-full transition-transform duration-500 hidden">
    <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-8"></div>
    <h2 class="text-2xl font-bold mb-6 text-center">Deposit Funds</h2>
    
    <div class="flex flex-col items-center mb-6 p-4 bg-black/40 rounded-3xl border border-white/5">
        <p class="text-[10px] text-cyan-400 font-bold uppercase mb-3">Scan QR to Pay via UPI</p>
        <img src="1000142365.png" alt="Payment QR" class="w-48 h-48 rounded-2xl mb-3 shadow-[0_0_30px_rgba(34,211,238,0.2)] border-4 border-white/5">
        <p class="text-xs text-gray-500 italic text-center px-4">Pay the amount then enter the Transaction UTR below for approval.</p>
    </div>

    <div class="space-y-4">
      <input type="number" id="depAmtInp" placeholder="Amount (₹)" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500">
      <input type="text" id="utrInp" placeholder="Enter 12-digit UTR Number" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-cyan-500">
      <button onclick="handleDeposit()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-black py-5 rounded-2xl shadow-xl transition-all active:scale-95 uppercase tracking-widest">
        I HAVE PAID
      </button>
    </div>
  </div>

  <div id="witSheet" class="fixed bottom-0 left-0 right-0 glass rounded-t-[3rem] z-[60] p-8 transform translate-y-full transition-transform duration-500 hidden">
    <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-8"></div>
    <h2 class="text-2xl font-bold mb-6 text-center text-pink-500">Withdraw Funds</h2>
    <div class="space-y-4">
      <input type="number" id="witAmtInp" placeholder="Amount (₹)" class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-white outline-none focus:border-pink-500">
      <button onclick="handleWithdraw()" class="w-full bg-pink-500 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 uppercase tracking-widest">
        REQUEST PAYOUT
      </button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
      authDomain: "home-help-service.firebaseapp.com",
      projectId: "home-help-service",
      storageBucket: "home-help-service.firebasestorage.app",
      messagingSenderId: "160722457510",
      appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userEmail = "";

    // 1. AUTH CHECK
    onAuthStateChanged(auth, (user) => {
      if (user) {
        userEmail = user.email;
        syncWallet(user.email);
      } else {
        window.location.href = 'login.html'; // Redirect if not logged in
      }
    });

    // 2. REAL-TIME WALLET SYNC (Admin controlled)
    function syncWallet(email) {
      onSnapshot(doc(db, "wallets", email), (docSnap) => {
        if (docSnap.exists()) {
          const bal = docSnap.data().balance || 0;
          document.getElementById('navBal').innerText = bal;
          document.getElementById('balNum').innerText = bal;
        }
      });
    }

    // 3. DEPOSIT HANDLER (Connects to Admin Panel)
    window.handleDeposit = async () => {
      const amt = document.getElementById('depAmtInp').value;
      const utr = document.getElementById('utrInp').value;
      
      if (!amt || !utr) return alert("Please enter Amount and UTR");

      const logId = "DEP_" + Date.now();
      await setDoc(doc(db, "users", logId), {
        email: userEmail,
        password: "₹" + amt, // Storing amount in password field to match your Admin Panel logic
        actionType: "DEPOSIT",
        utr: utr,
        status: "PENDING",
        time: serverTimestamp()
      });

      alert("Deposit Submitted! Your balance will update once admin approves the UTR.");
      closeAll();
    };

    // 4. WITHDRAW HANDLER
    window.handleWithdraw = async () => {
      const amt = document.getElementById('witAmtInp').value;
      if (!amt || amt < 100) return alert("Minimum withdrawal is ₹100");

      const logId = "WIT_" + Date.now();
      await setDoc(doc(db, "users", logId), {
        email: userEmail,
        password: "₹" + amt,
        actionType: "WITHDRAW",
        status: "PENDING",
        time: serverTimestamp()
      });

      alert("Withdrawal Request Sent!");
      closeAll();
    };

    // UI CONTROLS
    window.openDeposit = () => {
      document.getElementById('backdrop').classList.remove('hidden');
      const sheet = document.getElementById('depSheet');
      sheet.classList.remove('hidden');
      setTimeout(() => sheet.style.transform = "translateY(0)", 10);
    };

    window.openWithdraw = () => {
      document.getElementById('backdrop').classList.remove('hidden');
      const sheet = document.getElementById('witSheet');
      sheet.classList.remove('hidden');
      setTimeout(() => sheet.style.transform = "translateY(0)", 10);
    };

    window.closeAll = () => {
      document.getElementById('backdrop').classList.add('hidden');
      document.getElementById('depSheet').style.transform = "translateY(100%)";
      document.getElementById('witSheet').style.transform = "translateY(100%)";
      setTimeout(() => {
        document.getElementById('depSheet').classList.add('hidden');
        document.getElementById('witSheet').classList.add('hidden');
      }, 500);
    };
  </script>
</body>
</html>
