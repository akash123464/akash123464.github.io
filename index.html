<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WISHWORK | NEXUS PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon-pink: #ff007a; --neon-blue: #00f2ff; --neon-purple: #7000ff; --neon-green: #38ef7d; 
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            margin: 0; font-family: 'Outfit', sans-serif; background: #020205; 
            color: #fff; min-height: 100vh; padding-bottom: 120px; overflow-x: hidden;
            position: relative;
        }

        /* 🌌 FLOATING PLASMA LIGHTS */
        .plasma-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .light-orb { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(120px); opacity: 0.5; animation: float-orb 12s infinite alternate ease-in-out; }
        .orb-1 { background: var(--neon-purple); top: -10%; left: -10%; }
        .orb-2 { background: var(--neon-blue); bottom: 10%; right: -5%; animation-delay: -3s; }
        .orb-3 { background: var(--neon-pink); top: 30%; left: 30%; animation-duration: 8s; }
        @keyframes float-orb { from { transform: translate(0, 0); } to { transform: translate(150px, 100px); } }

        /* 🚀 NEON HEADER */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(30px); background: rgba(0, 0, 0, 0.6); position: sticky; top: 0; z-index: 2000; border-bottom: 1px solid var(--glass-border); }
        .brand-logo { font-family: 'Syncopate', sans-serif; font-size: 22px; font-weight: 700; background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink), var(--neon-purple), var(--neon-blue)); background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: flow 4s linear infinite; transform: skewX(-15deg); cursor: pointer; }
        @keyframes flow { to { background-position: 300% center; } }

        /* 💎 BALANCE CARD */
        .balance-card { background: var(--glass); backdrop-filter: blur(40px); border: 1px solid var(--glass-border); border-radius: 35px; padding: 25px; margin: 20px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .balance-amount { font-size: 42px; font-weight: 900; color: var(--neon-green); text-shadow: 0 0 20px rgba(56, 239, 125, 0.4); }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-main { background: linear-gradient(135deg, var(--neon-purple), #4158D0); color: #fff; border: none; padding: 15px; border-radius: 18px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-withdraw { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); }

        .section-label { padding: 10px 25px; font-size: 11px; font-weight: 900; color: var(--neon-blue); letter-spacing: 2px; text-transform: uppercase; }
        .bet-grid { display: grid; gap: 15px; padding: 0 20px; }
        .bet-card { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--glass-border); border-radius: 30px; padding: 20px; }
        
        .history-card { background: rgba(255, 255, 255, 0.02); margin: 10px 20px; padding: 18px; border-radius: 20px; display: flex; justify-content: space-between; border-left: 5px solid #333; }
        .history-card.WIN { border-left-color: var(--neon-green); background: rgba(56, 239, 125, 0.05); }

        /* 🌑 POPUP & COOL SCANNER QR */
        .popup { position: fixed; bottom: -110%; left: 0; width: 100%; background: #050508; padding: 40px 30px; border-radius: 45px 45px 0 0; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); z-index: 6000; border-top: 4px solid var(--neon-pink); }
        .popup.active { bottom: 0; }
        .input-nexus { width: 100%; background: rgba(255,255,255,0.03); border: 2px solid var(--glass-border); padding: 20px; border-radius: 20px; color: #fff; font-size: 32px; text-align: center; font-weight: 900; margin-bottom: 20px; }

        .qr-area { display: none; flex-direction: column; align-items: center; }
        .qr-box { 
            background: #fff; padding: 10px; border-radius: 25px; width: 220px; height: 220px; 
            border: 5px solid var(--neon-blue); position: relative; overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
        }
        .qr-box::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue);
            animation: scan-line 2s infinite linear;
        }
        @keyframes scan-line { 0% { top: 0; } 100% { top: 100%; } }
        .qr-box img { width: 100%; height: 100%; object-fit: contain; }

        .timer-wrap { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 25px 0; overflow: hidden; }
        #timerFill { width: 100%; height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink)); transition: 1s linear; }

        .support-fab { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: #0088cc; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 5000; box-shadow: 0 10px 30px rgba(0, 136, 204, 0.6); }
        .support-card { position: fixed; bottom: -100%; right: 25px; width: 300px; background: rgba(5,5,8,0.98); backdrop-filter: blur(25px); border: 2px solid var(--neon-blue); border-radius: 30px; padding: 25px; transition: 0.5s; z-index: 4999; text-align: center; }
        .support-card.active { bottom: 110px; }
        
        .cash-particle { position: fixed; pointer-events: none; z-index: 10000; font-size: 30px; animation: fall 3s linear forwards; }
        @keyframes fall { 0% { transform: translateY(-50px); opacity: 1; } 100% { transform: translateY(100vh); opacity: 0; } }
    </style>
</head>
<body>

<div class="plasma-bg">
    <div class="light-orb orb-1"></div>
    <div class="light-orb orb-2"></div>
    <div class="light-orb orb-3"></div>
</div>

<div id="rain-zone"></div>
<div id="winNotif" class="win-notif" style="position:fixed; top:-100px; left:50%; transform:translateX(-50%); background:var(--neon-green); color:black; padding:18px 40px; border-radius:50px; font-weight:900; z-index:9999; transition:0.5s;">YOU WON! 🏆</div>

<div class="support-fab" onclick="toggleSupport()"><i class="fa-brands fa-telegram" style="font-size: 30px; color: white;"></i></div>
<div class="support-card" id="supportCard">
    <div style="font-weight: 900; color: var(--neon-blue); font-size: 16px;">NEURAL SUPPORT</div>
    <img src="https://raw.githubusercontent.com/akash123464/akash123464.github.io/main/qr.png" style="width:100%; border-radius:15px; margin:20px 0; border: 2px solid var(--neon-blue);">
    <a href="https://t.me/WISHWORKONLINE" target="_blank" class="btn-main" style="display: block; text-decoration: none;">CONNECT TELEGRAM</a>
</div>

<div class="header">
    <div class="brand-logo" onclick="logoTrigger()">WISHWORK.ONLINE</div>
    <div onclick="logout()" style="color: var(--neon-pink); font-weight: 900; font-size: 11px; cursor:pointer;">TERMINATE</div>
</div>

<div class="balance-card">
    <div>
        <div style="font-size:10px; opacity:0.5; font-weight:900; letter-spacing:2px;">LIQUID CREDITS</div>
        <div class="balance-amount">₹<span id="displayBalance">0</span></div>
    </div>
    <div class="action-btns">
        <button class="btn-main" onclick="openPopup('DEPOSIT')">Deposit</button>
        <button class="btn-main btn-withdraw" onclick="openPopup('WITHDRAW')">Withdraw</button>
    </div>
</div>

<div class="section-label">LIVE PROTOCOLS</div>
<div class="bet-grid" id="betGrid"></div>

<div class="section-label" style="margin-top:30px;">NEURAL HISTORY</div>
<div id="historyList"></div>

<div class="popup" id="masterPopup">
    <h2 id="modalTitle" style="text-align:center; font-weight:900;">NODE SYNC</h2>
    <div id="inputPhase">
        <input type="number" id="userAmt" class="input-nexus" placeholder="₹ 0.00" oninput="updatePayout()">
        <div id="payoutBox" style="display:none; text-align:center; color:var(--neon-green); font-weight:900; margin-bottom:20px;">EST. PAYOUT: ₹<span id="payoutAmt">0</span></div>
        <button class="btn-main" style="width:100%; padding:20px;" onclick="handleAction()">INITIALIZE LINK</button>
    </div>
    <div id="qrPhase" class="qr-area">
        <div class="qr-box">
            <img src="https://raw.githubusercontent.com/akash123464/akash123464.github.io/main/qr.png" alt="PAYMENT QR">
        </div>
        <div style="font-weight:900; color:var(--neon-pink); margin-top:15px;">SYNCING: <span id="timer">60</span>s</div>
        <div class="timer-wrap"><div id="timerFill"></div></div>
    </div>
    <div id="statusPhase" style="display:none; text-align:center; color:var(--neon-blue); font-weight:900;">VALIDATING TRANSACTION...</div>
    <div onclick="closePopup()" style="text-align:center; margin-top:30px; opacity:0.3; cursor:pointer; font-size:12px;">CLOSE CONNECTION</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, serverTimestamp, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8", authDomain: "home-help-service.firebaseapp.com", projectId: "home-help-service", storageBucket: "home-help-service.firebasestorage.app", messagingSenderId: "160722457510", appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const uEmail = localStorage.getItem("userEmail");

    if(!uEmail) window.location.href = "login.html";

    let timerInt;
    let winTracker = {};

    onSnapshot(doc(db, "wallets", uEmail), (s) => { if(s.exists()) document.getElementById("displayBalance").innerText = s.data().balance; });

    onSnapshot(query(collection(db, "users"), where("email", "==", uEmail), orderBy("time", "desc")), (snap) => {
        const list = document.getElementById("historyList");
        list.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            const id = d.id;
            let status = data.status || "PENDING";
            if (status === "WIN 🏆" && !winTracker[id]) { triggerNeuralWin(); winTracker[id] = true; }
            list.innerHTML += `<div class="history-card ${status.split(' ')[0]}">
                <div><div style="font-size:9px; opacity:0.5;">${data.actionType}</div><div style="font-weight:800;">${data.password}</div></div>
                <div style="font-weight:900; font-size:12px;">${status}</div>
            </div>`;
        });
    });

    window.logoTrigger = () => { cashExplosion(); if(navigator.vibrate) navigator.vibrate(200); (new Audio('https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3')).play(); };
    function triggerNeuralWin() { document.getElementById("winNotif").classList.add("active"); cashExplosion(); (new Audio('https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3')).play(); setTimeout(() => document.getElementById("winNotif").classList.remove("active"), 6000); }
    
    window.cashExplosion = () => {
        const zone = document.getElementById('rain-zone');
        for(let i=0; i<45; i++) {
            const p = document.createElement('div'); p.className = 'cash-particle'; p.innerText = ['💸', '💰', '💎'][Math.floor(Math.random()*3)];
            p.style.left = Math.random() * 100 + 'vw'; p.style.animationDelay = (Math.random() * 2) + 's';
            zone.appendChild(p); setTimeout(() => p.remove(), 3000);
        }
    };

    window.toggleSupport = () => document.getElementById("supportCard").classList.toggle("active");

    const nodes = [{c:"INSTA-NEXUS", q:"Karan Aujla story in next 30m?"}, {c:"CRYPTO-PULSE", q:"BTC price stays above resistance?"}];
    nodes.forEach(n => {
        document.getElementById('betGrid').innerHTML += `<div class="bet-card">
            <div style="font-size:10px; color:var(--neon-blue); font-weight:900;">${n.c}</div>
            <div style="margin:12px 0; font-weight:600; font-size:16px;">${n.q}</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <button class="btn-main" style="background:#22c55e" onclick="openPopup('BET: YES - ${n.c}')">YES</button>
                <button class="btn-main" style="background:#ef4444" onclick="openPopup('BET: NO - ${n.c}')">NO</button>
            </div>
        </div>`;
    });

    window.updatePayout = () => {
        const v = document.getElementById("userAmt").value;
        const t = document.getElementById("modalTitle").innerText;
        if(v > 0 && t.includes("BET")) { document.getElementById("payoutBox").style.display = "block"; document.getElementById("payoutAmt").innerText = v * 2; }
        else document.getElementById("payoutBox").style.display = "none";
    };

    window.openPopup = (t) => {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('inputPhase').style.display = "block";
        document.getElementById('qrPhase').style.display = "none";
        document.getElementById('statusPhase').style.display = "none";
        document.getElementById('masterPopup').classList.add('active');
    };

    window.handleAction = async () => {
        const amt = document.getElementById("userAmt").value;
        const bal = parseInt(document.getElementById("displayBalance").innerText);
        const title = document.getElementById("modalTitle").innerText;
        if(!amt || amt <= 0) return alert("Credits required!");

        if(title === "DEPOSIT") {
            document.getElementById("inputPhase").style.display = "none";
            document.getElementById("qrPhase").style.display = "flex";
            let left = 60;
            timerInt = setInterval(async () => {
                left--; document.getElementById("timer").innerText = left;
                document.getElementById("timerFill").style.width = (left/60)*100 + "%";
                if(left <= 0) {
                    clearInterval(timerInt);
                    await addDoc(collection(db, "users"), { email: uEmail, password: `₹${amt}`, actionType: "DEPOSIT", time: serverTimestamp(), status: "PENDING" });
                    document.getElementById("qrPhase").style.display = "none";
                    document.getElementById("statusPhase").style.display = "block";
                    setTimeout(() => closePopup(), 3000);
                }
            }, 1000);
        } else if(title === "WITHDRAW") {
            if(parseInt(amt) > bal) return alert("Insufficient Credits!");
            await addDoc(collection(db, "users"), { email: uEmail, password: `₹${amt}`, actionType: "WITHDRAW", time: serverTimestamp(), status: "PENDING" });
            document.getElementById("inputPhase").style.display = "none";
            document.getElementById("statusPhase").style.display = "block";
            document.getElementById("statusPhase").innerText = "WITHDRAWAL SYNCED WITH AUTHORITY";
            setTimeout(() => closePopup(), 3000);
        } else {
            if(parseInt(amt) > bal) return alert("Insufficient Credits!");
            await addDoc(collection(db, "users"), { email: uEmail, password: `₹${amt}`, actionType: title, time: serverTimestamp(), status: "PENDING" });
            await updateDoc(doc(db, "wallets", uEmail), { balance: bal - parseInt(amt) });
            closePopup();
        }
    };

    window.closePopup = () => { clearInterval(timerInt); document.getElementById('masterPopup').classList.remove('active'); };
    window.logout = () => { localStorage.clear(); window.location.href="login.html"; };
</script>
</body>
</html>
