<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WISHWORK | NEXUS PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --neon-pink: #ff007a;
            --neon-blue: #00f2ff;
            --neon-purple: #7000ff;
            --neon-green: #38ef7d;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        /* ULTRA FUTURISTIC MESH BACKGROUND */
        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: #020205;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%),
                radial-gradient(at 0% 100%, hsla(321,50%,20%,1) 0, transparent 50%),
                radial-gradient(at 100% 100%, hsla(262,50%,20%,1) 0, transparent 50%);
            background-attachment: fixed;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 120px;
        }

        /* BENDED GLOWING LOGO */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(25px);
            background: rgba(0, 0, 0, 0.4);
            position: sticky; top: 0; z-index: 2000;
            border-bottom: 1px solid var(--glass-border);
        }

        .brand-logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink), var(--neon-purple), var(--neon-blue));
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flow 4s linear infinite;
            transform: skewX(-15deg) rotate(-2deg); /* Bended effect */
            cursor: pointer;
            filter: drop-shadow(0 0 12px rgba(0,242,255,0.6));
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .brand-logo:active { transform: skewX(-15deg) rotate(-2deg) scale(0.9); }

        @keyframes flow { to { background-position: 300% center; } }

        /* NEURAL BALANCE CARD */
        .balance-card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            margin: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .balance-amount {
            font-size: 38px;
            font-weight: 900;
            color: var(--neon-green);
            text-shadow: 0 0 15px rgba(56, 239, 125, 0.4);
        }

        .deposit-btn {
            background: linear-gradient(135deg, var(--neon-purple), #4158D0);
            color: #fff; border: none; padding: 12px 24px; border-radius: 15px;
            font-weight: 800; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(112, 0, 255, 0.4);
        }

        /* NODE GRID */
        .categories {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px;
            scrollbar-width: none;
        }
        .cat-btn {
            padding: 10px 20px; border-radius: 50px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: #fff; font-weight: 600; font-size: 12px; white-space: nowrap;
        }
        .cat-btn.active { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }

        /* BET NODES */
        .bet-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 20px; }
        
        .bet-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 35px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }
        .bet-card:hover { border-color: #fff; transform: translateY(-5px); }

        .node-tag { font-size: 10px; font-weight: 900; letter-spacing: 2px; color: var(--neon-blue); text-transform: uppercase; margin-bottom: 8px; }
        .question { font-size: 18px; font-weight: 600; margin-bottom: 20px; line-height: 1.4; }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn {
            padding: 16px; border-radius: 18px; border: none; font-weight: 900;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        .yes-btn { background: #22c55e; color: #fff; }
        .no-btn { background: #ef4444; color: #fff; }

        /* TELEGRAM FAB */
        .tele-fab {
            position: fixed; bottom: 30px; right: 25px;
            width: 65px; height: 65px; background: #0088cc;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 136, 204, 0.6); z-index: 5000;
            text-decoration: none; border: 2px solid rgba(255,255,255,0.2);
            animation: pulse 2s infinite;
        }
        .tele-fab i { font-size: 30px; color: white; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* CASH ANIMATION */
        .cash-particle {
            position: fixed; pointer-events: none; z-index: 10000;
            font-size: 30px; animation: fall 3s linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* POPUP */
        .popup {
            position: fixed; bottom: -110%; left: 0; width: 100%;
            background: #050508; padding: 40px 30px; border-radius: 40px 40px 0 0;
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 6000;
            border-top: 2px solid var(--neon-pink);
        }
        .popup.active { bottom: 0; }
        .input-nexus {
            width: 100%; background: rgba(255,255,255,0.05); border: 2px solid var(--glass-border);
            padding: 20px; border-radius: 20px; color: #fff; font-size: 28px;
            text-align: center; font-weight: 900; margin: 20px 0;
        }
    </style>
</head>
<body>

<div id="rain-zone"></div>

<div class="header">
    <div class="brand-logo" onclick="cashExplosion()">WISHWORK.ONLINE</div>
    <div onclick="logout()" style="color: var(--neon-red); font-weight: 900; font-size: 12px; cursor:pointer;">TERMINATE</div>
</div>

<div class="balance-card">
    <div>
        <div style="font-size:10px; color:rgba(255,255,255,0.5); font-weight:800; letter-spacing:2px;">LIQUID CREDITS</div>
        <div class="balance-amount">₹<span id="displayBalance">0</span></div>
    </div>
    <button class="deposit-btn" onclick="openPopup('DEPOSIT')">Deposit</button>
</div>

<div class="categories">
    <button class="cat-btn active">All Nodes</button>
    <button class="cat-btn">Instagram</button>
    <button class="cat-btn">Crypto</button>
    <button class="cat-btn">Gold</button>
    <button class="cat-btn">Oil</button>
</div>

<div class="bet-grid" id="betGrid">
    </div>

<div id="historyBody"></div>

<a href="https://t.me/WISHWORKONLINE" class="tele-fab" target="_blank">
    <i class="fa-brands fa-telegram"></i>
</a>

<div class="popup" id="masterPopup">
    <h2 id="modalTitle" style="text-align:center; font-weight:900;">NODE SYNC</h2>
    <input type="number" id="userAmt" class="input-nexus" placeholder="₹ 0.00">
    <button class="opt-btn" style="width:100%; background: #fff; color: #000;" onclick="placeBet()">PLACE TRANSACTION</button>
    <div onclick="closePopup()" style="text-align:center; margin-top:25px; color:rgba(255,255,255,0.3); cursor:pointer; font-weight:800;">CANCEL LINK</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, serverTimestamp, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8", authDomain: "home-help-service.firebaseapp.com", projectId: "home-help-service", storageBucket: "home-help-service.firebasestorage.app", messagingSenderId: "160722457510", appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const uEmail = localStorage.getItem("userEmail");

    if(!uEmail) window.location.href = "login.html";

    // 1. DATA SYNC
    onSnapshot(doc(db, "wallets", uEmail), (s) => {
        if (s.exists()) document.getElementById("displayBalance").innerText = s.data().balance;
    });

    // 2. GENERATE 10 DYNAMIC NODES
    const questions = [
        { cat: "Insta-Nexus", q: "Will Karan Aujla post more than 5 stories tonight?" },
        { cat: "Bullion-Market", q: "Will Gold price break ₹74,500 resistance?" },
        { cat: "Energy-Index", q: "Will Petrol prices fall below ₹107.50 in MP?" },
        { cat: "Crypto-Pulse", q: "Will Bitcoin hit $70k in the next 4 hours?" },
        { cat: "Sports-Neural", q: "Will India win the toss in today's match?" },
        { cat: "Global-Trade", q: "Will US Dollar rise against INR tomorrow?" },
        { cat: "Nifty-50", q: "Will Nifty open in green tomorrow morning?" },
        { cat: "Oil-Protocol", q: "Will Crude Oil prices stay high today?" },
        { cat: "Insta-Nexus", q: "Will Elvish Yadav post a new YouTube video today?" },
        { cat: "Tech-Sector", q: "Will Apple stock price increase after market close?" }
    ];

    const grid = document.getElementById('betGrid');
    questions.forEach((item, index) => {
        grid.innerHTML += `
            <div class="bet-card">
                <div class="node-tag">${item.cat}</div>
                <div class="question">${item.q}</div>
                <div class="options">
                    <button class="opt-btn yes-btn" onclick="openPopup('BET: YES - ${index}')">YES</button>
                    <button class="opt-btn no-btn" onclick="openPopup('BET: NO - ${index}')">NO</button>
                </div>
            </div>
        `;
    });

    // 3. ACTION LOGIC
    window.placeBet = async () => {
        const amt = document.getElementById("userAmt").value;
        const bal = parseInt(document.getElementById("displayBalance").innerText);
        const title = document.getElementById("modalTitle").innerText;

        if(!amt || amt <= 0) return alert("Enter valid amount!");
        if(amt > bal && !title.includes("DEPOSIT")) return alert("Low Balance!");

        await addDoc(collection(db, "users"), {
            email: uEmail,
            password: `₹${amt}`,
            actionType: title,
            time: serverTimestamp(),
            status: "PENDING"
        });

        if(!title.includes("DEPOSIT")) {
            await updateDoc(doc(db, "wallets", uEmail), { balance: bal - parseInt(amt) });
        }

        alert("Transaction Link Sent to Admin!");
        closePopup();
    };

    // 4. CASH ANIMATION
    window.cashExplosion = () => {
        const zone = document.getElementById('rain-zone');
        const emojis = ['💸', '💵', '💰', '💎', '🔥'];
        for(let i=0; i<40; i++) {
            const p = document.createElement('div');
            p.className = 'cash-particle';
            p.innerText = emojis[Math.floor(Math.random()*emojis.length)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDelay = (Math.random() * 2) + 's';
            zone.appendChild(p);
            setTimeout(() => p.remove(), 3000);
        }
        if (navigator.vibrate) navigator.vibrate(200);
    };

    window.openPopup = (t) => {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('masterPopup').classList.add('active');
    };
    window.closePopup = () => document.getElementById('masterPopup').classList.remove('active');
    window.logout = () => { localStorage.clear(); window.location.href="login.html"; };

</script>
</body>
</html>
