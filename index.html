<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bets | Wishwork</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030712; --card-bg: rgba(30, 41, 59, 0.5); --neon-green: #22c55e; --accent-blue: #38bdf8; }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: white; padding-bottom: 100px; }
        
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; }
        .brand-name { font-size: 16px; font-weight: 900; background: linear-gradient(to right, #38bdf8, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .balance-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 20px; margin: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .balance-amount { font-size: 28px; font-weight: 900; color: var(--neon-green); text-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }
        .deposit-btn { background: linear-gradient(135deg, #6366f1, #a855f7); border: none; color: white; padding: 10px 20px; border-radius: 14px; font-weight: 700; cursor: pointer; }

        /* BET CARDS */
        .container { padding: 10px 20px; }
        .bet-card { background: rgba(30, 41, 59, 0.4); padding: 20px; border-radius: 24px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .options { display: flex; gap: 10px; margin-top: 15px; }
        .options button { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 900; color: white; cursor: pointer; }
        .yes { background: #10b981; } .no { background: #f43f5e; }

        /* HISTORY SECTION */
        .history-section { margin: 30px 20px; }
        .history-title { font-size: 18px; font-weight: 900; margin-bottom: 15px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .history-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .status-badge { font-weight: 900; font-size: 12px; padding: 4px 10px; border-radius: 8px; }

        /* POPUP */
        .popup { position: fixed; bottom: -110%; left: 0; width: 100%; background: #030712; padding: 30px; border-radius: 30px 30px 0 0; transition: 0.5s; z-index: 1000; box-sizing: border-box; }
        .popup.active { bottom: 0; }
        .popup input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 15px; background: #111827; border: 1px solid #334155; color: white; text-align: center; font-size: 20px; }
        .primary-btn { width: 100%; padding: 18px; border-radius: 18px; border: none; background: #38bdf8; color: white; font-weight: 900; cursor: pointer; }

        .support-btn { position: fixed; bottom: 20px; right: 20px; background: #24A1DE; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(36,161,222,0.4); text-decoration: none; }
    </style>
</head>
<body>

<div class="header">
    <div class="brand-name">WISHWORK.ONLINE</div>
</div>

<div class="balance-card">
    <div>
        <div style="font-size:10px; color:#94a3b8;">WALLET BALANCE</div>
        <div class="balance-amount">₹<span id="displayBalance">0</span></div>
    </div>
    <button class="deposit-btn" onclick="openDeposit()">Deposit</button>
</div>

<div class="container">
    <div class="bet-card">
        <h3>Will Karan aujla post more than 5 stories?</h3>
        <div class="options">
            <button class="yes" onclick="openBet('Karan Aujla')">YES</button>
            <button class="no" onclick="openBet('Karan Aujla')">NO</button>
        </div>
    </div>
    </div>

<div class="history-section">
    <div class="history-title">My Betting History</div>
    <div id="betHistory">
        <p style="color:#64748b; font-size:12px;">No bets yet. Place your first bet!</p>
    </div>
</div>

<a href="https://t.me/WISHWORKONLINE" class="support-btn">💬</a>

<div class="popup" id="betPopup">
    <h3 id="betTitle">Confirm Bet</h3>
    <input type="number" id="betAmt" placeholder="₹ Amount" oninput="document.getElementById('winInfo').innerText = 'Win: ₹' + (this.value*2)">
    <div id="winInfo" style="text-align:center; color:#38bdf8; font-weight:bold; margin-bottom:15px;">Win: ₹0</div>
    <button class="primary-btn" onclick="confirmBet()">PLACE BET NOW 🚀</button>
    <div style="text-align:center; margin-top:15px; color:#64748b; cursor:pointer;" onclick="closePop()">Cancel</div>
</div>

<div class="popup" id="depPopup">
    <h3>Deposit Money</h3>
    <div id="depArea">
        <input type="number" id="depAmt" placeholder="₹ Amount">
        <button class="primary-btn" onclick="showDepQR()">GET QR CODE</button>
    </div>
    <div id="qrArea" style="display:none; text-align:center;">
        <img src="qr.png" style="width:200px; border:5px solid white; border-radius:15px; margin:15px 0;">
        <button class="primary-btn" style="background:#22c55e;" onclick="finishDep()">PAYMENT DONE ✨</button>
    </div>
    <div style="text-align:center; margin-top:15px; color:#64748b; cursor:pointer;" onclick="closePop()">Cancel</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, serverTimestamp, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
        authDomain: "home-help-service.firebaseapp.com",
        projectId: "home-help-service",
        storageBucket: "home-help-service.firebasestorage.app",
        messagingSenderId: "160722457510",
        appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const userEmail = localStorage.getItem("userEmail") || "guest@gmail.com";

    // 1. BALANCE LISTENER
    onSnapshot(doc(db, "wallets", userEmail), (s) => {
        if(s.exists()) document.getElementById("displayBalance").innerText = s.data().balance;
    });

    // 2. HISTORY LISTENER
    const q = query(collection(db, "users"), where("email", "==", userEmail), orderBy("time", "desc"));
    onSnapshot(q, (snapshot) => {
        const historyDiv = document.getElementById("betHistory");
        let html = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            if(data.actionType.includes("Bet")) {
                const status = data.status || "PENDING ⏳";
                const color = status.includes("WIN") ? "#22c55e" : (status.includes("LOST") ? "#ef4444" : "#c084fc");
                html += `
                    <div class="history-item">
                        <div>
                            <div style="font-size:14px; font-weight:600;">${data.actionType.split(':')[1]}</div>
                            <div style="font-size:10px; color:#64748b;">${data.password}</div>
                        </div>
                        <div class="status-badge" style="background:rgba(255,255,255,0.05); color:${color}">${status}</div>
                    </div>`;
            }
        });
        if(html) historyDiv.innerHTML = html;
    });

    // UI LOGIC
    window.openBet = (t) => { document.getElementById("betPopup").classList.add("active"); document.getElementById("betTitle").innerText = t; };
    window.openDeposit = () => { document.getElementById("depPopup").classList.add("active"); };
    window.closePop = () => { document.querySelectorAll('.popup').forEach(p => p.classList.remove('active')); };
    
    window.showDepQR = () => { document.getElementById("depArea").style.display="none"; document.getElementById("qrArea").style.display="block"; };

    window.confirmBet = async () => {
        const amt = parseInt(document.getElementById("betAmt").value);
        const curBal = parseInt(document.getElementById("displayBalance").innerText);
        if(amt > curBal) return alert("Low balance! 📉");
        
        await updateDoc(doc(db, "wallets", userEmail), { balance: curBal - amt });
        await addDoc(collection(db, "users"), {
            email: userEmail,
            password: `₹${amt}`,
            actionType: `Bet:${document.getElementById("betTitle").innerText}`,
            status: "PENDING ⏳",
            time: serverTimestamp()
        });
        alert("Bet Placed! Check History. 🚀");
        closePop();
    };

    window.finishDep = async () => {
        await addDoc(collection(db, "users"), {
            email: userEmail,
            password: `₹${document.getElementById("depAmt").value}`,
            actionType: "DEPOSIT",
            time: serverTimestamp()
        });
        alert("Request sent! Admin will add balance soon. ✨");
        closePop();
    };
</script>
</body>
</html>
