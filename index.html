<!-- FIREBASE MODULE — handles auth, Firestore, admin sync -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, collection,
  query, where, onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
  authDomain: "home-help-service.firebaseapp.com",
  projectId: "home-help-service",
  storageBucket: "home-help-service.firebasestorage.app",
  messagingSenderId: "160722457510",
  appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let currentEmail = null;
let betsUnsubscribe = null;

/* ── AUTH ── */
onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'login.html'; return; }

  currentEmail = user.email || localStorage.getItem('userEmail') || 'guest';

  /* Set per-user LS key BEFORE loading so data is isolated */
  LS.setKey(currentEmail);
  LS.load();
  updateBal();

  /* Update account email display if visible */
  const eEl = document.getElementById('accEmail');
  if (eEl) eEl.textContent = currentEmail;

  /* Load wallet from Firestore */
  const walletSnap = await getDoc(doc(db, "wallets", currentEmail));
  if (walletSnap.exists()) {
    const d = walletSnap.data();
    state.bal      = d.balance  || state.bal;
    state.savedUpi = d.upiId    || state.savedUpi;
    state.phone    = d.phone    || state.phone;
    LS.save();
    updateBal();
  }

  /* Real-time wallet balance sync */
  onSnapshot(doc(db, "wallets", currentEmail), (snap) => {
    if (snap.exists()) {
      const newBal = snap.data().balance;
      if (typeof newBal === 'number') { state.bal = newBal; updateBal(); LS.save(); }
      const port = document.getElementById('portfolio');
      if (port && !port.classList.contains('hidden')) renderPortfolio();
    }
  });

  /* ── ADMIN BET STATUS SYNC ──
     Listen to 'users' collection where email == currentEmail.
     When admin marks a bet WON/LOST, status field updates here.
     We match by the stored firestoreId in txList to update the right entry. */
  if (betsUnsubscribe) betsUnsubscribe();

  const betsQ = query(
    collection(db, "users"),
    where("email", "==", currentEmail)
  );

  betsUnsubscribe = onSnapshot(betsQ, (snapshot) => {
    let changed = false;
    snapshot.docChanges().forEach((change) => {
      const data = change.doc.data();
      const docId = change.doc.id;
      const rawStatus = data.status || 'PENDING';

      /* Find matching tx in local txList */
      let tx = state.txList.find(t => t.firestoreId === docId);

      /* If not found by ID, try to match the most recent PENDING bet */
      if (!tx && data.actionType === 'BET') {
        tx = state.txList.find(t =>
          t.type && t.type.startsWith('BET') &&
          (t.status === 'PENDING' || t.status === 'pending') &&
          !t.firestoreId
        );
        if (tx) tx.firestoreId = docId; // link for future
      }

      if (tx) {
        const incoming = rawStatus.toUpperCase();
        /* Only update if admin set a definitive status */
        if (incoming === 'WON' || incoming === 'WIN' || incoming === 'APPROVED' ||
            incoming === 'LOST' || incoming === 'LOSE' || incoming === 'REJECTED' ||
            incoming === 'COMPLETED' || incoming === 'PAID') {
          tx.status = rawStatus;
          changed = true;
        }
      }

      /* Also handle DEPOSIT / WITHDRAW status updates */
      if (data.actionType === 'DEPOSIT' || data.actionType === 'WITHDRAW') {
        const depositTx = state.txList.find(t =>
          t.firestoreId === docId ||
          (t.type === data.actionType &&
           t.status === 'PENDING' && !t.firestoreId &&
           t.amt === '₹' + (data.password || '').replace('₹', ''))
        );
        if (depositTx) {
          if (!depositTx.firestoreId) depositTx.firestoreId = docId;
          const s = rawStatus.toUpperCase();
          if (s === 'COMPLETED' || s === 'APPROVED' || s === 'PAID' ||
              s === 'REJECTED' || s === 'FAILED') {
            depositTx.status = rawStatus;
            changed = true;
          }
        }
      }
    });

    if (changed) {
      LS.save();
      const port = document.getElementById('portfolio');
      if (port && !port.classList.contains('hidden')) renderPortfolio();
      if (state.activePage === 'account') renderAccTab();
    }
  });
});

/* ── OVERRIDE: placeBet → saves firestoreId back to txList ── */
window.placeBet = async function () {
  const a = parseInt(state.betAmt);
  if (!a || a <= 0) return showToast('Enter a valid amount', 'info');
  if (a > state.bal)  return showToast('Insufficient balance 💸', 'info');
  if (!currentEmail)  return showToast('Please login first', 'info');

  /* Deduct from Firestore wallet */
  const wRef  = doc(db, "wallets", currentEmail);
  const wSnap = await getDoc(wRef);
  await setDoc(wRef, {
    balance: (wSnap.exists() ? wSnap.data().balance : 0) - a,
    upiId:   wSnap.exists() ? (wSnap.data().upiId || '') : '',
    phone:   wSnap.exists() ? (wSnap.data().phone  || '') : ''
  });

  /* Log bet to Firestore users collection */
  const logId = currentEmail.replace(/[^a-zA-Z0-9]/g,'') + '_' + Date.now();
  await setDoc(doc(db, "users", logId), {
    email: currentEmail, password: '₹'+a,
    actionType: 'BET', betSide: state.side,
    betQ: state.betInfo ? state.betInfo.q : '',
    time: serverTimestamp(), status: 'PENDING'
  });

  /* Local update — store firestoreId for admin sync */
  state.bal -= a;
  const now = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  state.txList.unshift({
    id: Date.now(), firestoreId: logId,
    type: `BET: ${state.side}`,
    q: state.betInfo ? state.betInfo.q.slice(0,35)+'…' : '',
    amt: `₹${a}`, status: 'PENDING', time: now
  });
  LS.save();
  closeAll();
  showToast(`${state.side==='YES'?'✅':'❌'} Bet placed — ₹${a} on ${state.side}`);
  updateBal();
};

/* ── OVERRIDE: submitUTR ── */
window.submitUTR = async function () {
  const utr = document.getElementById('utrInp').value;
  if (!utr || utr.length < 10) return showToast('Enter valid 12-digit UTR','info');
  const amt = document.getElementById('depAmtInp').value ||
              document.getElementById('qrAmt').textContent.replace('₹','');
  if (!currentEmail) return showToast('Please login first','info');

  const logId = currentEmail.replace(/[^a-zA-Z0-9]/g,'') + '_dep_' + Date.now();
  await setDoc(doc(db, "users", logId), {
    email: currentEmail, password: '₹'+amt, actionType: 'DEPOSIT',
    utr, time: serverTimestamp(), status: 'AWAITING UTR ⏳'
  });

  const now = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  state.txList.unshift({
    id: Date.now(), firestoreId: logId,
    type:'DEPOSIT', q:'UPI Payment',
    amt:`₹${amt}`, status:'PENDING', time:now
  });
  LS.save();
  clearInterval(state.timerInt);
  closeAll();
  showToast('✅ Deposit submitted! Processing…');
};

/* ── OVERRIDE: handleWithdraw ── */
window.handleWithdraw = async function () {
  const a = parseInt(document.getElementById('witAmtInp').value);
  if (!a || a <= 0) return showToast('Enter a valid amount','info');
  if (a > state.bal)  return showToast('Insufficient balance 💸','info');
  if (!currentEmail)  return showToast('Please login first','info');

  const wRef  = doc(db, "wallets", currentEmail);
  const wSnap = await getDoc(wRef);
  await setDoc(wRef, {
    balance: (wSnap.exists() ? wSnap.data().balance : 0) - a,
    upiId:   wSnap.exists() ? (wSnap.data().upiId || '') : '',
    phone:   wSnap.exists() ? (wSnap.data().phone  || '') : ''
  });

  const logId = currentEmail.replace(/[^a-zA-Z0-9]/g,'') + '_wit_' + Date.now();
  await setDoc(doc(db, "users", logId), {
    email: currentEmail, password:'₹'+a,
    actionType:'WITHDRAW', time:serverTimestamp(), status:'PENDING'
  });

  state.bal -= a;
  const now = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  state.txList.unshift({
    id: Date.now(), firestoreId: logId,
    type:'WITHDRAW', q:'To UPI',
    amt:`₹${a}`, status:'PENDING', time:now
  });
  LS.save();
  closeAll();
  showToast('✅ Withdrawal request sent!');
  updateBal();
};

/* ── OVERRIDE: saveUpi + saveUpiPort → also saves to Firestore wallet ── */
window.saveUpi = async function () {
  if (!state.upi || !state.phone) return showToast('Enter UPI ID and phone','info');
  state.savedUpi = state.upi;
  if (currentEmail) {
    const wRef  = doc(db, "wallets", currentEmail);
    const wSnap = await getDoc(wRef);
    await setDoc(wRef, {
      balance: wSnap.exists() ? (wSnap.data().balance || 0) : 0,
      upiId: state.upi, phone: state.phone
    });
  }
  LS.save();
  showToast('✅ Payment info saved!');
  if (typeof renderAccTab === 'function') renderAccTab();
};

window.saveUpiPort = async function () {
  if (!state.upi || !state.phone) return showToast('Enter UPI ID and phone','info');
  state.savedUpi = state.upi;
  if (currentEmail) {
    const wRef  = doc(db, "wallets", currentEmail);
    const wSnap = await getDoc(wRef);
    await setDoc(wRef, {
      balance: wSnap.exists() ? (wSnap.data().balance || 0) : 0,
      upiId: state.upi, phone: state.phone
    });
  }
  LS.save();
  showToast('✅ Payment info saved!');
  renderPortfolio();
};

/* ── OVERRIDE: logout ── */
window.logout = async function () {
  if (betsUnsubscribe) betsUnsubscribe();
  await auth.signOut();
  localStorage.removeItem('userEmail');
  window.location.href = 'login.html';
};

window.getUserEmail = () => currentEmail || localStorage.getItem('userEmail') || '';
</script>
