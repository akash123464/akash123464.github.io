<!-- FIREBASE MODULE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc, collection,
  query, where, onSnapshot, serverTimestamp, writeBatch,
  enableIndexedDbPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
  authDomain:"home-help-service.firebaseapp.com",
  projectId:"home-help-service",
  storageBucket:"home-help-service.firebasestorage.app",
  messagingSenderId:"160722457510",
  appId:"1:160722457510:web:f2c5fa0b922a0ccc58b567"
};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

/* ── Enable offline cache — UI feels instant, syncs in background ── */
enableIndexedDbPersistence(db).catch(()=>{});
let currentEmail=null,betsUnsub=null;

onAuthStateChanged(auth,async(user)=>{
  if(!user){window.location.href='login.html';return;}
  currentEmail=user.email||localStorage.getItem('userEmail')||'guest';
  LS.setKey(currentEmail);LS.load();
  state.userEmail=currentEmail;LS.save();updateBal();
  /* Reload per-user game data (betHistory + current round bets) for this email */
  if(typeof reloadUserForEmail==='function') reloadUserForEmail(currentEmail);
  const eEl=document.getElementById('accEmail');if(eEl)eEl.textContent=currentEmail;

  /* Helper: compute total of active game bets already deducted from localStorage
     but NOT yet reflected in Firestore (placed this round on this device) */
  function _activeBetDeduction(){
    if(typeof GAME==='undefined'||!Array.isArray(GAME.bets)) return 0;
    return GAME.bets.filter(b=>b.deducted).reduce((s,b)=>s+b.amt,0);
  }

  const wSnap=await getDoc(doc(db,"wallets",currentEmail));
  if(wSnap.exists()){
    const d=wSnap.data();
    if(typeof d.balance==='number'){
      /* Firestore balance may still include the amounts we already deducted locally
         for active game bets — subtract them to avoid inflating the display */
      const firestoreBal = d.balance;
      const localBal = state.bal; /* already has bets deducted via LS.load() */
      /* Use whichever is lower (most deducted) to be accurate */
      state.bal = Math.min(firestoreBal, localBal >= 0 ? localBal : firestoreBal);
    }
    state.savedUpi=d.upiId||state.savedUpi;state.phone=d.phone||state.phone;
    if(typeof d.totalDeposit==='number') state.totalDeposit=d.totalDeposit;
    if(typeof d.totalWithdraw==='number')state.totalWithdraw=d.totalWithdraw;
    LS.save();updateBal();
  }

  onSnapshot(doc(db,"wallets",currentEmail),(snap)=>{
    if(snap.exists()){
      const d=snap.data();
      if(typeof d.balance==='number'){
        /* Always subtract active game bet amounts from Firestore balance
           because those were deducted locally but Firestore may not reflect them yet */
        const deducted=_activeBetDeduction();
        const corrected=d.balance-deducted;
        /* Only apply if it makes balance go DOWN or bets have been cleared */
        if(deducted===0){
          state.bal=d.balance;
        } else {
          /* Use the minimum of local and Firestore-minus-deduction to avoid jumps */
          state.bal=Math.min(state.bal, Math.max(0, corrected));
        }
        updateBal();LS.save();
      }
      if(typeof d.totalDeposit==='number'){state.totalDeposit=d.totalDeposit;updateBal();}
      if(typeof d.totalWithdraw==='number'){state.totalWithdraw=d.totalWithdraw;updateBal();}
      const port=document.getElementById('portfolio');
      if(port&&!port.classList.contains('hidden'))renderPortfolio();
    }
  });

  if(betsUnsub)betsUnsub();
  betsUnsub=onSnapshot(query(collection(db,"users"),where("email","==",currentEmail)),(snapshot)=>{
    let changed=false;
    snapshot.docChanges().forEach((change)=>{
      if(change.type==='removed')return;
      const data=change.doc.data(),docId=change.doc.id,raw=data.status||'PENDING',actionType=data.actionType||'';
      /* Normalise — strip emojis and spaces for matching */
      const up=raw.toUpperCase().replace(/[^A-Z]/g,'');
      let tx=state.txList.find(t=>t.firestoreId===docId);
      if(!tx&&actionType==='BET'){tx=state.txList.find(t=>t.type&&t.type.startsWith('BET')&&t.status==='PENDING'&&!t.firestoreId);if(tx)tx.firestoreId=docId;}
      if(!tx&&actionType==='WITHDRAW'){tx=state.txList.find(t=>t.type==='WITHDRAW'&&t.status==='PENDING'&&!t.firestoreId);if(tx)tx.firestoreId=docId;}
      if(!tx&&actionType==='DEPOSIT'){tx=state.txList.find(t=>t.type==='DEPOSIT'&&t.status==='PENDING'&&!t.firestoreId);if(tx)tx.firestoreId=docId;}
      if(tx&&raw!=='PENDING'&&raw!=='AWAITING UTR ⏳'){
        const prevStatus=tx.status;
        tx.status=raw;
        /* Handle withdraw completion */
        if(actionType==='WITHDRAW'&&(up.includes('PAID')||up.includes('COMPLET')||up.includes('APPROV'))){
          const wasOK=prevStatus.toUpperCase().replace(/[^A-Z]/g,'');
          if(!wasOK.includes('PAID')&&!wasOK.includes('COMPLET')&&!wasOK.includes('APPROV')){
            const amt=tx.withdrawAmt||parseFloat((tx.amt||'').replace('₹',''))||0;
            state.totalWithdraw+=amt;
            setDoc(doc(db,"wallets",currentEmail),{totalWithdraw:state.totalWithdraw},{merge:true}).catch(()=>{});
          }
        }
        changed=true;
      }
    });
    if(changed){LS.save();updateBal();const port=document.getElementById('portfolio');if(port&&!port.classList.contains('hidden'))renderPortfolio();if(state.activePage==='account')renderAccTab();}
  });
});

/* Override placeBet for Firestore — batched single network call */
window.placeBet=async function(){
  const a=parseInt(state.betAmt);
  if(!a||a<=0)return showToast('Enter a valid amount','info');
  if(a>state.bal)return showToast('Insufficient balance 💸','info');
  if(!currentEmail)return showToast('Please login first','info');
  const wRef=doc(db,"wallets",currentEmail);
  const wSnap=await getDoc(wRef);
  const currentBal=(wSnap.exists()?wSnap.data().balance:0)-a;
  const logId=currentEmail.replace(/[^a-zA-Z0-9]/g,'')+'_'+Date.now();
  /* Single batched write — one network round trip instead of two */
  const batch=writeBatch(db);
  batch.set(wRef,{balance:currentBal,upiId:wSnap.exists()?wSnap.data().upiId||'':'',phone:wSnap.exists()?wSnap.data().phone||'':''},{merge:true});
  batch.set(doc(db,"users",logId),{email:currentEmail,password:'₹'+a,actionType:'BET',betSide:state.side,betQ:state.betInfo?state.betInfo.q:'',time:serverTimestamp(),status:'PENDING'});
  await batch.commit();
  state.bal-=a;
  const now=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  state.txList.unshift({id:Date.now(),firestoreId:logId,type:`BET: ${state.side}`,q:state.betInfo?state.betInfo.q.slice(0,35)+'…':'',amt:`₹${a}`,status:'PENDING',time:now});
  LS.save();closeAll();showToast(`${state.side==='YES'?'✅':'❌'} Bet placed — ₹${a} on ${state.side}`);updateBal();
};

window.submitUTR=async function(){
  const utr=document.getElementById('utrInp').value;
  if(!utr||utr.length<10)return showToast('Enter valid 12-digit UTR','info');
  const rawAmt=document.getElementById('depAmtInp').value||document.getElementById('qrAmt').textContent.replace('₹','');
  const a=parseFloat(rawAmt)||0;
  if(!currentEmail)return showToast('Please login first','info');
  const logId=currentEmail.replace(/[^a-zA-Z0-9]/g,'')+'_dep_'+Date.now();
  await setDoc(doc(db,"users",logId),{email:currentEmail,password:'₹'+a,actionType:'DEPOSIT',utr,time:serverTimestamp(),status:'AWAITING UTR ⏳'});
  state.totalDeposit+=a;
  await setDoc(doc(db,"wallets",currentEmail),{totalDeposit:state.totalDeposit},{merge:true});
  const now=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  state.txList.unshift({id:Date.now(),firestoreId:logId,type:'DEPOSIT',q:'UPI Payment',amt:`₹${a}`,status:'PENDING',time:now});
  LS.save();clearInterval(state.timerInt);closeAll();showToast('✅ Deposit submitted! Processing…');updateBal();
};

window.handleWithdraw=async function(){
  const a=parseInt(document.getElementById('witAmtInp').value);
  if(!a||a<=0)return showToast('Enter a valid amount','info');
  if(a>state.bal)return showToast('Insufficient balance 💸','info');
  if(!currentEmail)return showToast('Please login first','info');
  const wRef=doc(db,"wallets",currentEmail);
  const wSnap=await getDoc(wRef);
  const logId=currentEmail.replace(/[^a-zA-Z0-9]/g,'')+'_wit_'+Date.now();
  /* Batched — one network call */
  const batch=writeBatch(db);
  batch.set(wRef,{balance:(wSnap.exists()?wSnap.data().balance:0)-a,upiId:wSnap.exists()?wSnap.data().upiId||'':'',phone:wSnap.exists()?wSnap.data().phone||'':''},{merge:true});
  batch.set(doc(db,"users",logId),{email:currentEmail,password:'₹'+a,actionType:'WITHDRAW',time:serverTimestamp(),status:'PENDING'});
  await batch.commit();
  state.bal-=a;
  const now=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  state.txList.unshift({id:Date.now(),firestoreId:logId,type:'WITHDRAW',q:'To UPI',amt:`₹${a}`,status:'PENDING',time:now,withdrawAmt:a});
  LS.save();closeAll();showToast('✅ Withdrawal request sent!');updateBal();
};

window.saveUpi=async function(){
  if(!state.upi||!state.phone)return showToast('Enter UPI ID and phone','info');
  state.savedUpi=state.upi;
  if(currentEmail){const wRef=doc(db,"wallets",currentEmail);const wSnap=await getDoc(wRef);await setDoc(wRef,{balance:wSnap.exists()?wSnap.data().balance||0:0,upiId:state.upi,phone:state.phone},{merge:true});}
  LS.save();showToast('✅ Payment info saved!');if(typeof renderAccTab==='function')renderAccTab();
};
window.saveUpiPort=async function(){
  if(!state.upi||!state.phone)return showToast('Enter UPI ID and phone','info');
  state.savedUpi=state.upi;
  if(currentEmail){const wRef=doc(db,"wallets",currentEmail);const wSnap=await getDoc(wRef);await setDoc(wRef,{balance:wSnap.exists()?wSnap.data().balance||0:0,upiId:state.upi,phone:state.phone},{merge:true});}
  LS.save();showToast('✅ Payment info saved!');renderPortfolio();
};
window.logout=async function(){
  if(betsUnsub)betsUnsub();
  /* Save ledger bets under current user key before signing out */
  if(typeof saveUser==='function') saveUser();
  LS.save();
  await auth.signOut();localStorage.removeItem('userEmail');window.location.href='login.html';
};
window.getUserEmail=()=>currentEmail||localStorage.getItem('userEmail')||'';
</script>
