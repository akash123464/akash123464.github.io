<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WISHWORK | NEXUS PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff0099;
            --neon-green: #00ff88;
            --glass: rgba(255, 255, 255, 0.05);
        }

        /* --- STYLES FOR THE BETTING CARDS --- */
        .bet-card {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 5px solid var(--neon-pink);
            border-radius: 22px;
            padding: 25px;
            margin: 15px 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        /* BIGGER BOLD QUESTIONS */
        .bet-card .question-text {
            font-size: 22px !important;
            font-weight: 900 !important;
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 20px;
            line-height: 1.3;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .protocol-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-pink);
            font-weight: 900;
            margin-bottom: 8px;
            display: block;
        }

        /* GLOWING YES/NO BUTTONS */
        .btn-row {
            display: flex;
            gap: 15px;
        }

        .yes-btn, .no-btn {
            flex: 1;
            padding: 16px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 18px;
            font-family: 'Orbitron';
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .yes-btn {
            background: linear-gradient(45deg, #00ff88, #00bd65);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .yes-btn:hover {
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.7);
            transform: scale(1.03);
        }

        .no-btn {
            background: linear-gradient(45deg, #ff0055, #cc0044);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
        }

        .no-btn:hover {
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.7);
            transform: scale(1.03);
        }

        /* ULTRA GLASSY MODAL */
        #betModal .modal-content {
            background: rgba(15, 15, 20, 0.95);
            backdrop-filter: blur(30px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        #userAmt {
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--neon-pink);
            border-radius: 15px;
            color: #fff;
            font-size: 35px;
            font-weight: 900;
            text-align: center;
            width: 100%;
            padding: 15px;
            font-family: 'Orbitron';
            margin: 20px 0;
            outline: none;
            box-shadow: inset 0 0 15px rgba(255, 0, 153, 0.2);
        }

        /* SHINY PAYOUT BOX */
        #payoutBox {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(0, 204, 255, 0.1));
            border: 1px solid rgba(0, 255, 136, 0.4);
            border-radius: 18px;
            padding: 20px;
            margin: 15px 0;
            animation: pulseGlow 2s infinite;
        }

        #payoutAmt {
            font-size: 30px;
            color: var(--neon-green);
            font-weight: 900;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(0, 255, 136, 0.2); border-color: rgba(0, 255, 136, 0.4); }
            50% { box-shadow: 0 0 25px rgba(0, 255, 136, 0.5); border-color: rgba(0, 255, 136, 0.9); }
            100% { box-shadow: 0 0 5px rgba(0, 255, 136, 0.2); border-color: rgba(0, 255, 136, 0.4); }
        }

        #placeBetBtn {
            background: linear-gradient(90deg, #ff0099, #7000ff);
            font-size: 20px;
            letter-spacing: 2px;
            box-shadow: 0 0 30px rgba(255, 0, 153, 0.4);
        }

        /* Your existing layout styles go here... */
    </style>
</head>
<body>

<script type="module">
    // --- KEEP ALL YOUR FIREBASE IMPORTS AND INIT CODE HERE ---

    window.processTransaction = async (title) => {
        const amt = parseInt(document.getElementById("userAmt").value);
        if(!amt || amt < 100) return alert("Minimum amount is ₹100");

        if(title === "DEPOSIT") {
            document.getElementById("inputPhase").style.display = "none";
            document.getElementById("qrPhase").style.display = "flex";
            const docRef = await addDoc(collection(db, "users"), { email: uEmail, password: `₹${amt}`, actionType: "DEPOSIT", time: serverTimestamp(), status: "AWAITING UTR ⏳", utr: "NOT SUBMITTED" });
            activeTxId = docRef.id;
            let timeLeft = 80;
            document.getElementById('wheelTimer').innerText = timeLeft;
            timerInt = setInterval(() => { timeLeft--; document.getElementById('wheelTimer').innerText = timeLeft; if(timeLeft <= 0) clearInterval(timerInt); }, 1000);
        } else {
            if(amt > bal) return alert("Insufficient Liquid Credits!");
            await addDoc(collection(db, "users"), { email: uEmail, password: `₹${amt}`, actionType: title, time: serverTimestamp(), status: "PENDING" });
            await updateDoc(doc(db, "wallets", uEmail), { balance: bal - amt });
            closePopup();
        }
    };

    window.submitUTR = async () => {
        const utr = document.getElementById('utrField').value;
        if(utr.length < 10) return alert("Invalid UTR!");
        await updateDoc(doc(db, "users", activeTxId), { utr: utr, status: "PENDING" });
        clearInterval(timerInt); alert("UTR Submitted!"); closePopup();
    };

    // UPDATED PAYOUT UI LOGIC
    window.updatePayout = () => {
        const v = document.getElementById("userAmt").value;
        const pBox = document.getElementById("payoutBox");
        const title = document.getElementById("modalTitle").innerText;
        
        if(v > 0 && title.includes("BET")) {
            pBox.style.display = "block";
            // Calculate 1.9x Winning
            const win = (v * 1.9).toFixed(0);
            document.getElementById("payoutAmt").innerText = "₹" + win;
            
            // Trigger a glow effect on change
            pBox.style.animation = 'none';
            pBox.offsetHeight; 
            pBox.style.animation = 'pulseGlow 2s infinite';
        } else {
            pBox.style.display = "none";
        }
    };

    window.logout = () => { localStorage.clear(); window.location.href="login.html"; };
    window.addEventListener('load', () => { const firstChip = document.querySelector('.category-chip'); if(firstChip) window.filterBets('INSTAGRAM', firstChip); });
    
    // BALANCE & LEDGER SNAPSHOTS (Keep as is)
    onSnapshot(doc(db, "wallets", uEmail), (s) => { if(s.exists()) document.getElementById("displayBalance").innerText = s.data().balance; });

    let seenWins = JSON.parse(sessionStorage.getItem('seenWins') || '[]');
    onSnapshot(query(collection(db, "users"), where("email", "==", uEmail)), (snap) => {
        const ledger = document.getElementById("ledgerContent"); ledger.innerHTML = "";
        let docs = []; snap.forEach(d => { const data = d.data(); docs.push({id: d.id, ...data}); if (data.status === "WIN 🏆" && !seenWins.includes(d.id)) showNeuralWin(data.password, d.id); });
        docs.sort((a,b) => (b.time?.seconds || 0) - (a.time?.seconds || 0));
        docs.forEach(data => {
            let status = data.status || "PENDING";
            let sClass = (status.includes("WIN") || status.includes("✅") || status.includes("💰")) ? "status-WIN" : (status.includes("LOST") || status.includes("💀")) ? "status-LOST" : "status-PENDING";
            let sideColor = data.actionType === 'DEPOSIT' ? 'var(--neon-green)' : 'var(--neon-pink)';
            ledger.innerHTML += `<div class="transaction-node" style="border-left: 5px solid ${sideColor}"><div><div style="font-size:9px; opacity:0.6; font-weight:900; color: ${sideColor}">${data.actionType}</div><div style="font-weight:900; font-size:18px; margin-top:5px; font-family: 'Orbitron';">${data.password}</div></div><div class="status-pill ${sClass}">${status}</div></div>`;
        });
    });

    function showNeuralWin(val, id) { seenWins.push(id); sessionStorage.setItem('seenWins', JSON.stringify(seenWins)); document.getElementById('winVal').innerText = val.replace('₹', ''); const notif = document.getElementById('winNotif'); notif.style.top = "20px"; window.cashExplosion(); setTimeout(() => { notif.style.top = "-120px"; }, 6000); }
    window.logoTrigger = () => window.cashExplosion();
    window.cashExplosion = () => { const zone = document.getElementById('rain-zone'); for(let i=0; i<30; i++) { const p = document.createElement('div'); p.innerText = '💎'; p.style.position = 'fixed'; p.style.left = Math.random() * 100 + 'vw'; p.style.top = '-50px'; p.style.fontSize = '24px'; p.style.zIndex = '10000'; p.animate([{ transform: 'translateY(0)' }, { transform: 'translateY(110vh)' }], { duration: 2000 + Math.random() * 2000, easing: 'linear' }); zone.appendChild(p); setTimeout(() => p.remove(), 4000); } };
</script>
</body>
</html>
