<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WISHWORK | NEXUS PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Syncopate:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon-pink: #ff007a; --neon-blue: #00f2ff; --neon-purple: #7000ff; --neon-green: #38ef7d; --neon-gold: #f1c40f;
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); 
            --active-theme: var(--neon-blue); 
            --orb-color-1: var(--neon-purple);
            --orb-color-2: var(--neon-blue);
            --orb-color-3: var(--neon-pink);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body { 
            margin: 0; font-family: 'Outfit', sans-serif; background: #020205; 
            color: #fff; min-height: 100vh; padding-bottom: 120px; overflow-x: hidden;
            position: relative;
        }

        .plasma-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .light-orb { position: absolute; width: 450px; height: 450px; border-radius: 50%; filter: blur(130px); opacity: 0.45; animation: float-orb 12s infinite alternate ease-in-out; transition: background 1.5s ease; }
        .orb-1 { background: var(--orb-color-1); top: -10%; left: -10%; }
        .orb-2 { background: var(--orb-color-2); bottom: 10%; right: -5%; }
        .orb-3 { background: var(--orb-color-3); top: 30%; left: 30%; }
        @keyframes float-orb { from { transform: translate(0, 0); } to { transform: translate(120px, 90px); } }

        .loader-container { position: relative; width: 100px; height: 100px; margin: 15px auto; }
        .glass-wheel {
            width: 100%; height: 100%; border: 4px solid rgba(255,255,255,0.05);
            border-top: 4px solid var(--neon-blue); border-radius: 50%;
            animation: spin 2s linear infinite;
            box-shadow: 0 0 15px var(--neon-blue);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .timer-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 900; color: var(--neon-blue); font-size: 18px; font-family: 'Orbitron'; }

        .utr-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--neon-blue); padding: 12px; border-radius: 12px; color: #fff; margin-top: 15px; text-align: center; font-family: 'Orbitron'; letter-spacing: 2px; }

        #winNotif { 
            position: fixed; top: -120px; left: 50%; transform: translateX(-50%); 
            background: rgba(56, 239, 125, 0.15); backdrop-filter: blur(20px); 
            border: 2px solid var(--neon-green); color: #fff; 
            padding: 20px 45px; border-radius: 50px; font-weight: 900; 
            z-index: 9999; transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(56, 239, 125, 0.4);
            display: flex; align-items: center; gap: 15px; font-family: 'Orbitron';
        }

        #toastNotif { 
            position: fixed; top: -120px; left: 50%; transform: translateX(-50%); 
            background: rgba(0, 242, 255, 0.15); backdrop-filter: blur(20px); 
            border: 2px solid var(--neon-blue); color: #fff; 
            padding: 15px 35px; border-radius: 50px; font-weight: 900; 
            z-index: 9999; transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
            display: flex; align-items: center; gap: 15px; font-family: 'Orbitron'; font-size: 12px; letter-spacing: 1px;
        }

        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(30px); background: rgba(0, 0, 0, 0.6); position: sticky; top: 0; z-index: 2000; border-bottom: 1px solid var(--glass-border); }
        .brand-logo { 
            font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; 
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }

        .balance-card { background: var(--glass); backdrop-filter: blur(40px); border: 1px solid var(--glass-border); border-radius: 35px; padding: 25px; margin: 20px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); position: relative; }
        .balance-amount { font-size: 42px; font-weight: 900; color: var(--neon-green); text-shadow: 0 0 20px rgba(56, 239, 125, 0.4); }

        .ledger-trigger { 
            position: absolute; top: 20px; right: 20px; background: rgba(0, 242, 255, 0.1); 
            border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 8px 15px; 
            border-radius: 12px; font-size: 10px; font-weight: 900; cursor: pointer; 
            animation: pulse-blue 2s infinite; font-family: 'Orbitron';
        }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-main { background: linear-gradient(135deg, var(--neon-purple), #4158D0); color: #fff; border: none; padding: 15px; border-radius: 18px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }

        .ledger-overlay { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: rgba(2, 2, 5, 0.9); backdrop-filter: blur(60px); z-index: 7000; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); padding: 30px 20px; }
        .ledger-overlay.active { right: 0; }
        .ledger-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .ledger-scroll { height: calc(100% - 240px); overflow-y: auto; padding-right: 5px; } 

        .transaction-node { 
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 22px; padding: 20px; margin-bottom: 15px; display: flex; 
            justify-content: space-between; align-items: center; backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            gap: 15px;
        }

        .status-pill { padding: 6px 14px; border-radius: 12px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; white-space: nowrap; }
        .status-PENDING { color: var(--neon-gold); background: rgba(241, 196, 15, 0.1); border: 1px solid rgba(241, 196, 15, 0.3); }
        .status-WIN { color: var(--neon-green); background: rgba(56, 239, 125, 0.1); border: 1px solid rgba(56, 239, 125, 0.3); }
        .status-LOST { color: var(--neon-pink); background: rgba(255, 0, 122, 0.1); border: 1px solid rgba(255, 0, 122, 0.3); }

        .protocol-selector { display: flex; overflow-x: auto; gap: 12px; padding: 15px 20px; scrollbar-width: none; }
        .category-chip { display: flex; align-items: center; gap: 8px; padding: 12px 22px; border-radius: 15px; background: var(--glass); border: 1px solid var(--glass-border); white-space: nowrap; font-weight: 900; font-size: 11px; color: rgba(255,255,255,0.5); cursor: pointer; transition: 0.3s; }
        .category-chip.active { color: #fff; border-color: #fff; box-shadow: 0 0 20px var(--active-theme); background: var(--active-theme); }

        .bet-grid { display: grid; gap: 15px; padding: 0 20px; min-height: 100px;}
        .bet-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 30px; padding: 22px; border-left: 4px solid var(--active-theme); }

        .popup { position: fixed; bottom: -110%; left: 0; width: 100%; background: #050508; padding: 40px 30px; border-radius: 45px 45px 0 0; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); z-index: 6000; border-top: 4px solid var(--active-theme); }
        .popup.active { bottom: 0; }
        .input-nexus { width: 100%; background: rgba(255,255,255,0.03); border: 2px solid var(--glass-border); padding: 20px; border-radius: 20px; color: #fff; font-size: 32px; text-align: center; font-weight: 900; margin-bottom: 20px; }

        .qr-area { display: none; flex-direction: column; align-items: center; }
        .qr-box { background: #fff; padding: 10px; border-radius: 25px; width: 180px; height: 180px; border: 4px solid var(--neon-blue); }
        .qr-box img { width: 100%; height: 100%; }

        .support-fab { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: #0088cc; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 5000; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(0, 242, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); } }

    .payment-info-box { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--neon-blue); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0, 242, 255, 0.1); }
        .payment-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); padding: 12px; border-radius: 12px; color: #fff; margin-bottom: 12px; font-family: 'Outfit'; font-size: 12px; outline: none; }
        .payment-input:focus { border-color: var(--neon-blue); }
    </style>
</head>
<body>

<div class="plasma-bg">
    <div class="light-orb orb-1" id="orb1"></div>
    <div class="light-orb orb-2" id="orb2"></div>
    <div class="light-orb orb-3" id="orb3"></div>
</div>

<div id="rain-zone"></div>
<div id="winNotif"><i class="fa-solid fa-crown" style="color:var(--neon-gold)"></i> YOU WIN! ₹<span id="winVal">0</span></div>
<div id="toastNotif"><i class="fa-solid fa-circle-check" style="color:var(--neon-blue); font-size: 18px;"></i> <span id="toastMsg">ACTION SUCCESSFUL</span></div>

<div class="header">
    <div class="brand-logo" onclick="logoTrigger()">WISHWORK</div>
    <div onclick="logout()" style="color: var(--neon-pink); font-weight: 900; font-size: 11px; cursor:pointer; letter-spacing:1px;">LOGOUT</div>
</div>

<div class="balance-card">
    <div class="ledger-trigger" onclick="toggleLedger()">TRANSACTIONS</div>
    <div>
        <div style="font-size:10px; opacity:0.5; font-weight:900; letter-spacing:2px;">LIQUID CREDITS</div>
        <div class="balance-amount">₹<span id="displayBalance">0</span></div>
    </div>
    <div class="action-btns">
        <button class="btn-main" onclick="openPopup('DEPOSIT')">Deposit</button>
        <button class="btn-main" style="background:rgba(255,255,255,0.05); border:1px solid var(--glass-border);" onclick="openPopup('WITHDRAW')">Withdraw</button>
    </div>
</div>

<div class="ledger-overlay" id="ledgerOverlay">
    <div class="ledger-header">
        <h2 style="font-family:'Orbitron'; font-size:18px; color:var(--neon-blue); letter-spacing: 1px;">TRANSACTION LOG</h2>
        <div onclick="toggleLedger()" style="font-size:24px; cursor:pointer; color:var(--neon-pink);"><i class="fa-solid fa-xmark"></i></div>
    </div>

    <div class="payment-info-box">
        <h3 style="font-size: 11px; color: var(--neon-blue); margin-bottom: 15px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase;"><i class="fa-solid fa-building-columns"></i> Withdrawal Method</h3>

        <div id="upiInputState">
            <input type="text" id="upiField" class="payment-input" placeholder="ENTER UPI ID (e.g. name@bank)">
            <input type="number" id="phoneField" class="payment-input" placeholder="ENTER PHONE NUMBER">
            <button class="btn-main" style="width: 100%; padding: 12px; font-size: 11px; background: linear-gradient(135deg, var(--neon-blue), #0077ff);" onclick="savePaymentInfo()">SAVE DETAILS</button>
        </div>

        <div id="upiDisplayState" style="display: none;">
            <div style="font-size: 12px; opacity: 0.8; margin-bottom: 8px;">Linked UPI: <span id="displayUpi" style="color: #fff; font-weight: 900; letter-spacing: 1px;"></span></div>
            <div style="font-size: 12px; opacity: 0.8; margin-bottom: 15px;">Linked Phone: <span id="displayPhone" style="color: #fff; font-weight: 900; letter-spacing: 1px;"></span></div>
            <button class="btn-main" style="width: 100%; padding: 10px; font-size: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);" onclick="editPaymentInfo()">EDIT DETAILS</button>
        </div>
    </div>
    <div class="ledger-scroll" id="ledgerContent"></div>
</div>

<div class="protocol-selector" id="catSelector">
    <div class="category-chip" data-color="#E1306C" onclick="filterBets('INSTAGRAM', this)"><i class="fa-brands fa-instagram"></i> INSTAGRAM</div>
    <div class="category-chip" data-color="#FFD700" onclick="filterBets('OIL', this)"><i class="fa-solid fa-droplet"></i> OIL</div>
    <div class="category-chip" data-color="#FF4500" onclick="filterBets('POLITICS', this)"><i class="fa-solid fa-landmark"></i> POLITICS</div>
    <div class="category-chip" data-color="#FF0000" onclick="filterBets('YOUTUBE', this)"><i class="fa-brands fa-youtube"></i> YOUTUBE</div>
    <div class="category-chip" data-color="#00f2ff" onclick="filterBets('RANDOM', this)"><i class="fa-solid fa-shuffle"></i> RANDOM</div>
    <div class="category-chip" data-color="#ff007a" onclick="filterBets('NAUGHTY', this)"><i class="fa-solid fa-fire"></i> NAUGHTY</div>
</div>

<div class="bet-grid" id="betGrid"></div>

<div class="popup" id="masterPopup">
    <h2 id="modalTitle" style="text-align:center; font-weight:900; letter-spacing: 1px;">NODE SYNC</h2>
    <div id="inputPhase">
        <input type="number" id="userAmt" class="input-nexus" placeholder="₹ 0.00" oninput="updatePayout()">
        <div id="payoutBox" style="display:none; text-align:center; color:var(--neon-green); font-weight:900; margin-bottom:20px;">EST. WINNING: ₹<span id="payoutAmt">0</span></div>
        <button class="btn-main" id="primaryActionBtn" style="width:100%; padding:20px;" onclick="handleAction()">SYNC</button>
    </div>

    <div id="qrPhase" class="qr-area">
        <div class="qr-box"><img src="https://raw.githubusercontent.com/akash123464/akash123464.github.io/main/qr.png"></div>
        <div class="loader-container">
            <div class="glass-wheel"></div>
            <div class="timer-val" id="wheelTimer">80</div>
        </div>
        <input type="text" id="utrField" class="utr-input" placeholder="ENTER 12-DIGIT UTR" maxlength="12">
        <button class="btn-main" style="width:100%; margin-top:10px; background:var(--neon-green); color:#000;" onclick="submitUTR()">SUBMIT UTR</button>
        <p style="font-size:10px; margin-top:15px; opacity:0.6; font-weight: 800; color: var(--neon-blue);">Agents are authorizing payment...</p>
    </div>
    <div onclick="closePopup()" style="text-align:center; margin-top:20px; opacity:0.3; cursor:pointer; font-weight:800;">CANCEL</div>
</div>

<div class="support-fab"><a href="https://t.me/WISHWORKONLINE" target="_blank"><i class="fa-brands fa-telegram" style="font-size: 30px; color: white;"></i></a></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, serverTimestamp, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8", authDomain: "home-help-service.firebaseapp.com", projectId: "home-help-service", storageBucket: "home-help-service.firebasestorage.app", messagingSenderId: "160722457510", appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const uEmail = localStorage.getItem("userEmail")?.toLowerCase();
    if(!uEmail) window.location.href = "login.html";

    let activeTxId = null;
    let timerInt = null;

    window.allBets = {
        INSTAGRAM: [{q: "Will karan aujla post more than 5 stories on instagram till 8 pm today?", id: "INSTA-1"}, {q: "Will Salman Khan post more than 2 stories on instagram?", id: "INSTA-2"}, {q: "Virat Kohli posts a gym reel?", id: "INSTA-3"}, {q: "Elvish yadav will post a story about rajat dalal on Instagram till 8pm?", id: "INSTA-4"}, {q: "deepaliarora10 will post with pink bra till8pm?", id: "INSTA-5"}, {q: "Will Narendra Modi post a story about lockdown till 8pm?", id: "INSTA-6"}],
        OIL: [{q: "Petrol ⛽ price will go up by 1 rupees in MP tomorrow goal 109rs by 6am?", id: "OIL-1"}, {q: "Petrol prices drop by midnight goal 106 by tomorrow 6am?", id: "OIL-2"}, {q: "Diesel price will go up in MP by 2rs by tomorrow 6am goal 94?", id: "OIL-3"}, {q: "Diesel price fall by 2 rs goal 90 by 6am?", id: "OIL-4"}, {q: "Will Petrol price reach 112 t till 5 april?", id: "OIL-5"}, {q: "Gasoline tax increases today?", id: "OIL-6"}],        
        POLITICS: [{q: "Tv show Halla bol on ajtak news at debate 5pm-7pm will anyone say the word pakistan 5 times?", id: "POL-1"}, {q: " will modi ji post more than 3 video on YouTube today?", id: "POL-2"}, {q: "Will Rahul Gandhi post a story about modi ji on Instagram till6pm?", id: "POL-3"}, {q: "Modi ji announce lockdown by date 28april?", id: "POL-4"}, {q: "Will Rahul gandhi post more than 2 video about bjp today?", id: "POL-5"}, {q: "Will bjp leader Sjaishankar post about congress today?", id: "POL-6"}],
        YOUTUBE: [{q: "sorav joshi post a video today on YouTube?", id: "YT-1"}, {q: " will lallantop post a video about gas cylinder pricing today?", id: "YT-2"}, {q: "passanger paramveer will hit 2.69m subscribers?", id: "YT-3"}, {q: "Raj shamani will post more than 5 videos till 6am 27april?", id: "YT-4"}, {q: "Will premanand mhraj post a video by 9pm?", id: "YT-5"}, {q: "?", id: "YT-6"}],
        RANDOM: [{q: "Will it rain in Mumbai today?", id: "RND-1"}, {q: "BTC hits new ATH today?", id: "RND-2"}, {q: "SpaceX launch successful?", id: "RND-3"}, {q: "Gold price drops ₹1000?", id: "RND-4"}, {q: "AI robot passes Turing test?", id: "RND-5"}, {q: "Mars mission signal received?", id: "RND-6"}],
        NAUGHTY: [{q: "Secret party leak tonight?", id: "NGH-1"}, {q: "Late night spicy vlog up?", id: "NGH-2"}, {q: "Model A joins OnlyFans?", id: "NGH-3"}, {q: "Club X raided in Mumbai?", id: "NGH-4"}, {q: "Viral clip hits 50M views?", id: "NGH-5"}, {q: "Banned App back on Store?", id: "NGH-6"}]
    };

    window.toggleLedger = () => document.getElementById('ledgerOverlay').classList.toggle('active');

    window.filterBets = (cat, el) => {
        if(!el) return;
        const themeColor = el.getAttribute('data-color');
        document.documentElement.style.setProperty('--active-theme', themeColor);
        const o1 = document.getElementById('orb1'), o2 = document.getElementById('orb2'), o3 = document.getElementById('orb3');
        if(o1) o1.style.background = themeColor;
        if(o2) o2.style.background = "var(--neon-purple)";
        if(o3) o3.style.background = themeColor;
        document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        const grid = document.getElementById('betGrid');
        grid.innerHTML = "";
        window.allBets[cat].forEach(n => {
            grid.innerHTML += `<div class="bet-card">
                <div style="font-size:9px; color:var(--active-theme); font-weight:900; letter-spacing: 1px;">${cat} PROTOCOL</div>
                <div style="margin:12px 0; font-weight:600; font-size:15px;">${n.q}</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <button class="btn-main" style="background:#22c55e" onclick="openPopup('BET: YES - ${n.q.replace(/'/g, "\\'")}')">YES</button>
                    <button class="btn-main" style="background:#ef4444" onclick="openPopup('BET: NO - ${n.q.replace(/'/g, "\\'")}')">NO</button>
                </div>
            </div>`;
        });
    };

    window.openPopup = (t) => {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('inputPhase').style.display = "block";
        document.getElementById('qrPhase').style.display = "none";
        const btn = document.getElementById('primaryActionBtn');
        btn.innerText = t === 'DEPOSIT' ? "GENERATE QR" : (t === 'WITHDRAW' ? "CONFIRM WITHDRAWAL" : "PLACE BET");
        document.getElementById('masterPopup').classList.add('active');
    };

    window.closePopup = () => { clearInterval(timerInt); document.getElementById('masterPopup').classList.remove('active'); };

    // TOAST NOTIFICATION FUNCTION
    window.showToast = (msg) => {
        document.getElementById('toastMsg').innerText = msg;
        const toast = document.getElementById('toastNotif');
        toast.style.top = "20px";
        setTimeout(() => { toast.style.top = "-120px"; }, 4000);
    };

    window.handleAction = async () => {
        const amt = parseInt(document.getElementById("userAmt").value);
        const bal = parseInt(document.getElementById("displayBalance").innerText);
        const title = document.getElementById("modalTitle").innerText;
        if(!amt || amt <= 0) return alert("Enter valid amount!");

        try {
            if(title === "DEPOSIT") {
                document.getElementById("inputPhase").style.display = "none";
                document.getElementById("qrPhase").style.display = "flex";
                const docRef = await addDoc(collection(db, "users"), { email: uEmail, password: `₹${amt}`, actionType: "DEPOSIT", time: serverTimestamp(), status: "AWAITING UTR ⏳", utr: "NOT SUBMITTED" });
                activeTxId = docRef.id;
                let timeLeft = 80;
                document.getElementById('wheelTimer').innerText = timeLeft;
                timerInt = setInterval(() => { timeLeft--; document.getElementById('wheelTimer').innerText = timeLeft; if(timeLeft <= 0) clearInterval(timerInt); }, 1000);
            } else {
                if(amt > bal) return alert("Insufficient Liquid Credits!");
                await addDoc(collection(db, "users"), { email: uEmail, password: `₹${amt}`, actionType: title, time: serverTimestamp(), status: "PENDING" });
                await updateDoc(doc(db, "wallets", uEmail), { balance: bal - amt });
                closePopup();
                
                // TRIGGERING THE TOAST
                if(title.includes("BET")) window.showToast("BET PLACED SUCCESSFULLY!");
                if(title === "WITHDRAW") window.showToast("WITHDRAWAL REQUESTED!");
            }
        } catch(err) {
            alert("Protocol Error: " + err.message);
        }
    };

    window.submitUTR = async () => {
        const utr = document.getElementById('utrField').value;
        if(utr.length < 10) return alert("Invalid UTR!");

        try {
            await updateDoc(doc(db, "users", activeTxId), { utr: utr, status: "PENDING" });
            clearInterval(timerInt); 
            alert("UTR Submitted!"); 
            closePopup();
            window.showToast("DEPOSIT PENDING APPROVAL!");
        } catch(err) {
            alert("Protocol Error: " + err.message);
        }
    };

    window.updatePayout = () => {
        const v = document.getElementById("userAmt").value;
        if(v > 0 && document.getElementById("modalTitle").innerText.includes("BET")) {
            document.getElementById("payoutBox").style.display = "block";
            document.getElementById("payoutAmt").innerText = (v * 1.9).toFixed(0);
        } else document.getElementById("payoutBox").style.display = "none";
    };

    window.savePaymentInfo = async () => {
        const upi = document.getElementById('upiField').value.trim();
        const phone = document.getElementById('phoneField').value.trim();
        if(!upi || !phone) return alert("Please enter both UPI ID and Phone Number!");

        try {
            await updateDoc(doc(db, "wallets", uEmail), { upiId: upi, phone: phone });
            alert("Payment info saved securely!");
        } catch (err) {
            alert("Error saving info: " + err.message);
        }
    };

    window.editPaymentInfo = () => {
        document.getElementById('upiInputState').style.display = 'block';
        document.getElementById('upiDisplayState').style.display = 'none';
    };

    window.logout = () => { localStorage.clear(); window.location.href="login.html"; };
    window.addEventListener('load', () => { const firstChip = document.querySelector('.category-chip'); if(firstChip) window.filterBets('INSTAGRAM', firstChip); });

    onSnapshot(doc(db, "wallets", uEmail), (s) => { 
        if(s.exists()) {
            const data = s.data();
            document.getElementById("displayBalance").innerText = data.balance; 

            if(data.upiId && data.phone) {
                document.getElementById('upiInputState').style.display = 'none';
                document.getElementById('upiDisplayState').style.display = 'block';
                document.getElementById('displayUpi').innerText = data.upiId;
                document.getElementById('displayPhone').innerText = data.phone;
                document.getElementById('upiField').value = data.upiId; 
                document.getElementById('phoneField').value = data.phone;
            } else {
                document.getElementById('upiInputState').style.display = 'block';
                document.getElementById('upiDisplayState').style.display = 'none';
            }
        } 
    });

    let seenWins = JSON.parse(sessionStorage.getItem('seenWins') || '[]');
    
    onSnapshot(query(collection(db, "users"), where("email", "==", uEmail)), (snap) => {
        const ledger = document.getElementById("ledgerContent"); 
        ledger.innerHTML = "";
        let docs = []; 
        
        snap.forEach(d => { 
            const data = d.data(); 
            docs.push({id: d.id, ...data}); 
            if (data.status === "WIN 🏆" && !seenWins.includes(d.id)) {
                showNeuralWin(data.password, d.id); 
            }
        });

        if (docs.length === 0) {
            ledger.innerHTML = `
                <div style="text-align: center; margin-top: 40px; padding: 20px; opacity: 0.6;">
                    <i class="fa-solid fa-folder-open" style="font-size: 45px; color: var(--neon-blue); margin-bottom: 15px; text-shadow: 0 0 15px var(--neon-blue);"></i>
                    <div style="font-family: 'Orbitron'; font-weight: 900; letter-spacing: 2px; font-size: 14px;">NO TRANSACTIONS YET</div>
                    <div style="font-size: 11px; margin-top: 8px; color: #fff;">Your bets, deposits, and withdrawals will sync here.</div>
                </div>
            `;
            return;
        }

        docs.sort((a,b) => (b.time?.seconds || 0) - (a.time?.seconds || 0));
        
        docs.forEach(data => {
            let status = data.status || "PENDING";
            let sClass = (status.includes("WIN") || status.includes("✅") || status.includes("💰")) ? "status-WIN" : (status.includes("LOST") || status.includes("💀")) ? "status-LOST" : "status-PENDING";
            let sideColor = data.actionType === 'DEPOSIT' ? 'var(--neon-green)' : (data.actionType === 'WITHDRAW' ? 'var(--neon-pink)' : 'var(--neon-blue)');
            
            ledger.innerHTML += `
            <div class="transaction-node" style="border-left: 5px solid ${sideColor}">
                <div style="width: 70%;">
                    <div style="font-size:10px; opacity:0.8; font-weight:900; color: ${sideColor}; line-height: 1.3; word-wrap: break-word;">${data.actionType}</div>
                    <div style="font-weight:900; font-size:18px; margin-top:5px; font-family: 'Orbitron';">${data.password}</div>
                </div>
                <div class="status-pill ${sClass}">${status}</div>
            </div>`;
        });
    });
