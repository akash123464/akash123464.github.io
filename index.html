<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bets | Wishwork</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --card-bg: rgba(30, 41, 59, 0.5);
            --accent-blue: #38bdf8;
            --accent-purple: #c084fc;
            --neon-pink: #f472b6;
            --neon-green: #22c55e;
            --neon-red: #ef4444;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            padding-bottom: 80px; /* Space for support bubble */
        }

        /* HEADER */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-name {
            font-size: 16px;
            font-weight: 900;
            font-style: italic;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple), var(--neon-pink));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--neon-red);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
            border: 1px solid rgba(239, 68, 68, 0.3);
            text-transform: uppercase;
        }
        .live-badge span {
            width: 7px; height: 7px; background: var(--neon-red);
            border-radius: 50%; box-shadow: 0 0 10px var(--neon-red);
        }

        /* WALLET CARD */
        .balance-container { padding: 0 20px; margin-bottom: 20px; }
        .balance-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .balance-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; }
        .balance-amount { font-size: 28px; font-weight: 900; color: var(--neon-green); text-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }

        .deposit-btn {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
        }

        /* CATEGORIES */
        .categories { display: flex; overflow-x: auto; padding: 10px 20px; gap: 12px; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn {
            padding: 10px 22px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.05); color: #e2e8f0; font-weight: 600; font-size: 14px;
            white-space: nowrap; transition: 0.3s; backdrop-filter: blur(5px); cursor: pointer;
        }
        .cat-btn.active { background: white; color: black; box-shadow: 0 0 20px rgba(255,255,255,0.4); }

        /* BET CARDS */
        .container { padding: 15px 20px; }
        .bet-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.8));
            padding: 24px; border-radius: 28px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .bet-card h3 { margin: 0; font-size: 17px; font-weight: 600; line-height: 1.5; color: #f1f5f9; }
        .options { display: flex; margin-top: 20px; gap: 15px; }
        .options button {
            flex: 1; padding: 16px; border-radius: 18px; border: none;
            font-weight: 900; color: white; font-size: 14px; text-transform: uppercase; cursor: pointer;
        }
        .yes { background: #10b981; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }
        .no { background: #f43f5e; box-shadow: 0 8px 20px rgba(244, 63, 94, 0.3); }

        /* UNIVERSAL POPUP */
        .popup {
            position: fixed; bottom: -110%; left: 0; width: 100%;
            background: #030712; padding: 30px; border-radius: 40px 40px 0 0;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            box-sizing: border-box; z-index: 1000;
            border-top: 2px solid rgba(56, 189, 248, 0.3);
        }
        .popup.active { bottom: 0; }
        
        .popup input {
            width: 100%; padding: 18px; margin-top: 20px; border-radius: 20px;
            border: 1px solid #334155; background: #111827; color: white;
            font-size: 20px; text-align: center; outline: none;
        }

        .primary-btn {
            width: 100%; margin-top: 25px; padding: 18px; border: none;
            border-radius: 20px; background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: white; font-weight: 900; font-size: 16px; cursor: pointer;
        }

        .close-btn { margin-top: 20px; text-align: center; color: #64748b; font-size: 14px; cursor: pointer; }

        /* TELEGRAM SUPPORT BUBBLE */
        .support-bubble {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: #24A1DE;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(36, 161, 222, 0.4);
            z-index: 999;
            text-decoration: none;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .support-bubble:active { transform: scale(0.9); }
        .support-bubble i { font-size: 28px; }
        
        .support-bubble::after {
            content: "";
            position: absolute;
            top: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: var(--neon-green);
            border-radius: 50%;
            border: 2px solid #030712;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        /* GEN Z VALIDATION SCREEN */
        #validationScreen { display: none; text-align: center; padding: 10px; }
        .status-pill {
            display: inline-block; background: rgba(56, 189, 248, 0.1);
            color: var(--accent-blue); padding: 6px 15px; border-radius: 50px;
            font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px;
        }
        .timer-container {
            position: relative; width: 120px; height: 120px; margin: 25px auto;
            display: flex; align-items: center; justify-content: center;
        }
        .timer-circle-svg { position: absolute; top: 0; left: 0; width: 120px; height: 120px; transform: rotate(-90deg); }
        .timer-circle-svg circle { fill: none; stroke-width: 8; stroke: rgba(255,255,255,0.05); }
        #timerPath { stroke: var(--accent-blue); stroke-linecap: round; stroke-dasharray: 339; stroke-dashoffset: 0; transition: 0.5s; }
        #timerText { font-size: 32px; font-weight: 900; color: #fff; }
        .qr-img { margin-top: 20px; width: 220px; border-radius: 24px; border: 6px solid white; }
    </style>
</head>
<body>

<div class="header">
    <div class="live-badge"><span></span> LIVE</div>
    <div class="brand-name">wishwork.online</div>
</div>

<div class="balance-container">
    <div class="balance-card">
        <div>
            <div class="balance-label">WALLET BALANCE</div>
            <div class="balance-amount">₹<span id="displayBalance">0</span></div>
        </div>
        <button class="deposit-btn" onclick="openDeposit()">Deposit</button>
    </div>
</div>

<div class="categories">
    <button class="cat-btn all active" onclick="filterBets('all', this)">All</button>
    <button class="cat-btn insta" onclick="filterBets('instagram', this)">Instagram</button>
    <button class="cat-btn gold" onclick="filterBets('gold', this)">Gold</button>
    <button class="cat-btn oil" onclick="filterBets('oil', this)">Oil</button>
    <button class="cat-btn politics" onclick="filterBets('politics', this)">Politics</button>
</div>

<div class="container" id="betsContainer">
    <div class="bet-card instagram">
        <h3>Will Karan aujla post more than 5 stories on Instagram?</h3>
        <div class="options">
            <button class="yes" onclick="openPopup('Karan Aujla Stories')">YES</button>
            <button class="no" onclick="openPopup('Karan Aujla Stories')">NO</button>
        </div>
    </div>
    <div class="bet-card gold">
        <h3>Will 🪙 price increase tomorrow?</h3>
        <div class="options">
            <button class="yes" onclick="openPopup('Gold Price')">YES</button>
            <button class="no" onclick="openPopup('Gold Price')">NO</button>
        </div>
    </div>
    <div class="bet-card oil">
        <h3>Will ⛽ petrol price fall from 107.83 in MP?</h3>
        <div class="options">
            <button class="yes" onclick="openPopup('Petrol Price')">YES</button>
            <button class="no" onclick="openPopup('Petrol Price')">NO</button>
        </div>
    </div>
</div>

<a href="https://t.me/WISHWORKONLINE" target="_blank" class="support-bubble">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="white">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.11.02-1.93 1.23-5.46 3.62-.51.35-.98.52-1.4.51-.46-.01-1.35-.26-2.01-.48-.81-.27-1.45-.42-1.39-.88.03-.24.36-.49.99-.75 3.88-1.69 6.46-2.8 7.76-3.33 3.69-1.5 4.45-1.76 4.95-1.77.11 0 .36.03.52.16.14.11.18.25.19.35.01.07.01.21 0 .33z"/>
    </svg>
</a>

<div class="popup" id="universalPopup">
    <div id="popupContent">
        <h3 id="popupTitle" style="margin:0; text-align:center; font-weight: 900;">Place your bet</h3>
        <input type="number" id="amount" placeholder="₹ Enter Amount" oninput="calculate()">
        <div id="result" style="text-align: center; margin-top: 15px; color: var(--accent-blue); font-weight: 800;">Possible Winning: ₹0</div>
        
        <button class="primary-btn" id="mainActionBtn" onclick="showQR()">Place Bet 🚀</button>

        <div id="qrSection" style="display:none; text-align:center;">
            <img src="qr.png" class="qr-img">
            <button onclick="startValidation()" class="primary-btn" style="background: var(--neon-green);">
                Payment Done ✨
            </button>
        </div>
    </div>

    <div id="validationScreen">
        <div class="status-pill" id="statusPill">Verifying the bag...</div>
        <h3 style="color: #fff; font-weight: 900;">Hold tight!</h3>
        <div class="timer-container">
            <svg class="timer-circle-svg"><circle cx="60" cy="60" r="54"></circle><circle cx="60" cy="60" r="54" id="timerPath"></circle></svg>
            <div id="timerText">60</div>
        </div>
        <p style="color: var(--neon-red); font-weight: 800; font-size: 11px;">DO NOT CLOSE THIS PAGE</p>
    </div>

    <div class="close-btn" id="cancelBtn" onclick="closePopup()">CANCEL</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
        authDomain: "home-help-service.firebaseapp.com",
        projectId: "home-help-service",
        storageBucket: "home-help-service.firebasestorage.app",
        messagingSenderId: "160722457510",
        appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    if (!localStorage.getItem("userLoggedIn")) window.location.href = "login.html";
    const userEmail = localStorage.getItem("userEmail") || "guest@gmail.com";

    onSnapshot(doc(db, "wallets", userEmail), (snapshot) => {
        if (snapshot.exists()) {
            document.getElementById("displayBalance").innerText = snapshot.data().balance;
        }
    });

    let validationTimer;
    let isDeposit = false;
    const statusPhrases = ["Securing the vault...", "Checking the vibes...", "Validating authority...", "Finalizing bag...", "Almost there..."];

    window.openPopup = function(title) {
        isDeposit = false;
        document.getElementById("universalPopup").classList.add("active");
        document.getElementById("popupTitle").innerText = title;
        document.getElementById("mainActionBtn").innerText = "Place Bet 🚀";
    };

    window.openDeposit = function() {
        isDeposit = true;
        document.getElementById("universalPopup").classList.add("active");
        document.getElementById("popupTitle").innerText = "Add Funds 💸";
        document.getElementById("mainActionBtn").innerText = "Generate QR Code";
    };

    window.closePopup = function() {
        document.getElementById("universalPopup").classList.remove("active");
        clearInterval(validationTimer);
        setTimeout(() => {
            document.getElementById("popupContent").style.display = "block";
            document.getElementById("validationScreen").style.display = "none";
            document.getElementById("qrSection").style.display = "none";
            document.getElementById("mainActionBtn").style.display = "block";
            document.getElementById("amount").style.display = "block";
            document.getElementById("amount").value = "";
            document.getElementById("timerPath").style.strokeDashoffset = 0;
            document.getElementById("timerPath").style.stroke = "var(--accent-blue)";
        }, 500);
    };

    window.calculate = function() {
        let amount = document.getElementById("amount").value;
        document.getElementById("result").innerText = amount > 0 ? "Possible Winning: ₹" + (amount * 2) : "Possible Winning: ₹0";
    };

    window.showQR = function() {
        let amount = parseInt(document.getElementById("amount").value);
        let currentBal = parseInt(document.getElementById("displayBalance").innerText);
        if (!amount || amount <= 0) return alert("Enter the amount first!");
        if (!isDeposit && amount > currentBal) return alert("Insufficient Balance!");
        document.getElementById("qrSection").style.display = "block";
        document.getElementById("mainActionBtn").style.display = "none";
        document.getElementById("amount").style.display = "none";
    };

    window.startValidation = function() {
        document.getElementById("popupContent").style.display = "none";
        document.getElementById("validationScreen").style.display = "block";
        let timeLeft = 60;
        const totalTime = 60;
        const timerText = document.getElementById("timerText");
        const timerPath = document.getElementById("timerPath");
        const statusPill = document.getElementById("statusPill");
        const dashArray = 339;

        validationTimer = setInterval(async () => {
            timeLeft--;
            timerText.innerText = timeLeft;
            const offset = dashArray - (timeLeft / totalTime) * dashArray;
            timerPath.style.strokeDashoffset = offset;
            if (timeLeft <= 30 && timeLeft > 10) timerPath.style.stroke = "var(--accent-purple)";
            if (timeLeft <= 10) timerPath.style.stroke = "var(--neon-green)";
            if (timeLeft % 12 === 0) statusPill.innerText = statusPhrases[Math.floor(Math.random() * statusPhrases.length)];

            if (timeLeft <= 0) {
                clearInterval(validationTimer);
                const type = isDeposit ? "DEPOSIT REQUEST" : "BET PLACED";
                const amt = document.getElementById("amount").value;
                await addDoc(collection(db, "users"), {
                    email: userEmail,
                    password: `AMT: ₹${amt}`,
                    actionType: type,
                    time: serverTimestamp()
                });
                alert("Request sent to authority! Admin will verify in 5 mins. ✨");
                closePopup();
            }
        }, 1000);
    };

    window.filterBets = function(category, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll(".bet-card").forEach(bet => {
            bet.style.display = (category === "all" || bet.classList.contains(category)) ? "block" : "none";
        });
    };
</script>
</body>
</html>
