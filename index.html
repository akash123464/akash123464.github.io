<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bets | Wishwork</title>
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
            padding-bottom: 30px;
        }

        /* HEADER */
        .header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-name {
            font-size: 14px;
            font-style: italic;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(to right, #38bdf8, #c084fc, #38bdf8);
            background-size: 200% auto;
            color: #fff;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 0px 8px rgba(56, 189, 248, 0.6));
            animation: shineText 3s linear infinite;
        }

        @keyframes shineText { to { background-position: 200% center; } }

        .title { display: flex; align-items: center; gap: 8px; }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(239, 68, 68, 0.15); 
            color: #ff4b4b; 
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .live-badge .dot {
            width: 8px;
            height: 8px;
            background-color: #ff4b4b;
            border-radius: 50%;
            animation: pulseDot 0.8s infinite alternate;
        }

        @keyframes pulseDot {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.3); }
        }

        /* BALANCE SECTION */
        .balance-container {
            padding: 10px 15px;
        }

        .balance-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(51, 65, 85, 0.7));
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .balance-label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-amount {
            font-size: 24px;
            font-weight: 900;
            color: #22c55e;
            margin-top: 2px;
        }

        .add-btn {
            background: #6366f1;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
        }

        /* CATEGORY BAR */
        .categories {
            display: flex;
            overflow-x: auto;
            padding: 10px 15px;
            gap: 10px;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar { display: none; }

        .categories button {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 8px 18px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            white-space: nowrap;
        }

        /* BET CARDS */
        .container { padding: 10px 15px; }

        .bet-card {
            background: #1e293b;
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .bet-card h3 { margin: 0; font-size: 16px; line-height: 1.4; }

        .options { display: flex; margin-top: 15px; gap: 10px; }

        .options button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 900;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
        }

        .yes { background: #22c55e; box-shadow: 0 4px 10px rgba(34, 197, 94, 0.2); }
        .no { background: #ef4444; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2); }

        /* POPUP */
        .popup {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: #020617;
            padding: 25px;
            border-radius: 30px 30px 0 0;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
            z-index: 1000;
        }

        .popup.active { bottom: 0; }

        .popup input {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 18px;
        }

        .result { margin-top: 15px; font-weight: bold; color: #38bdf8; text-align: center; }

        .place-btn {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            color: white;
            font-weight: 900;
        }

        .close-btn { margin-top: 15px; text-align: center; color: #64748b; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div class="title">
        <div class="live-badge"><span class="dot"></span>LIVE</div>
    </div>
    <div class="brand-name">wishwork.online</div>
</div>

<div class="balance-container">
    <div class="balance-card">
        <div>
            <div class="balance-label">Your Wallet Balance</div>
            <div class="balance-amount">₹<span id="displayBalance">0</span></div>
        </div>
        <button class="add-btn" onclick="alert('Recharge feature coming soon!')">Deposit</button>
    </div>
</div>

<div class="categories">
    <button onclick="filterBets('all')">All</button>
    <button onclick="filterBets('instagram')">Instagram</button>
    <button onclick="filterBets('gold')">Gold</button>
    <button onclick="filterBets('oil')">Oil</button>
    <button onclick="filterBets('politics')">Politics</button>
</div>

<div class="container" id="betsContainer">
    <div class="bet-card instagram">
        <h3>Will Karan aujla post more than 5 stories on Instagram?</h3>
        <div class="options">
            <button class="yes" onclick="openPopup('Karan Aujla Stories')">Yes</button>
            <button class="no" onclick="openPopup('Karan Aujla Stories')">No</button>
        </div>
    </div>

    <div class="bet-card gold">
        <h3>Will 🪙 price increase tomorrow?</h3>
        <div class="options">
            <button class="yes" onclick="openPopup('Gold Price')">Yes</button>
            <button class="no" onclick="openPopup('Gold Price')">No</button>
        </div>
    </div>

    <div class="bet-card oil">
        <h3>Will ⛽ petrol price fall from 107.83 in MP?</h3>
        <div class="options">
            <button class="yes" onclick="openPopup('Petrol Price')">Yes</button>
            <button class="no" onclick="openPopup('Petrol Price')">No</button>
        </div>
    </div>

    <div class="bet-card politics">
        <h3>Will 🧓 Modi ji say Pakistan today?</h3>
        <div class="options">
            <button class="yes" onclick="openPopup('Modi Ji Speech')">Yes</button>
            <button class="no" onclick="openPopup('Modi Ji Speech')">No</button>
        </div>
    </div>
</div>

<div class="popup" id="popup">
    <h3 id="betTitle" style="margin:0; text-align:center;">Place your bet</h3>
    <input type="number" id="amount" placeholder="Enter amount ₹" oninput="calculate()">
    <div class="result" id="result">Possible Winning: ₹0</div>
    
    <button class="place-btn" onclick="showQR()">Place Bet Now</button>

    <div id="qrSection" style="display:none; text-align:center; margin-top:15px;">
        <p style="color:#94a3b8; font-size:12px;">Scan to Pay & Confirm Bet</p>
        <img src="qr.png" style="width:180px; border-radius:15px; border: 5px solid white;">
        <button onclick="confirmPayment()" 
            style="margin-top:15px; padding:12px; width:100%; border:none; border-radius:12px; background:#22c55e; color:white; font-weight:bold;">
            Payment Done
        </button>
    </div>

    <div class="close-btn" onclick="closePopup()">Cancel</div>
</div>

<script>
// Check login
if (!localStorage.getItem("userLoggedIn")) {
    window.location.href = "login.html";
}

// Balance Initialization
let walletBalance = localStorage.getItem("userBalance");
if (walletBalance === null) {
    walletBalance = 1000; // Starting balance for testing
    localStorage.setItem("userBalance", walletBalance);
}
document.getElementById("displayBalance").innerText = walletBalance;

function openPopup(title) {
    document.getElementById("popup").classList.add("active");
    document.getElementById("betTitle").innerText = "Bet on: " + title;
}

function closePopup() {
    document.getElementById("popup").classList.remove("active");
    document.getElementById("qrSection").style.display = "none";
    document.getElementById("amount").value = "";
    document.getElementById("result").innerText = "Possible Winning: ₹0";
}

function calculate() {
    let amount = document.getElementById("amount").value;
    let win = amount * 2;
    document.getElementById("result").innerText = amount > 0 ? "Possible Winning: ₹" + win : "Possible Winning: ₹0";
}

function showQR() {
    let amount = parseInt(document.getElementById("amount").value);
    let currentBal = parseInt(localStorage.getItem("userBalance"));

    if (!amount || amount <= 0) {
        alert("Please enter a valid amount!");
        return;
    }
    
    if (amount > currentBal) {
        alert("Insufficient Balance in Wallet!");
        return;
    }

    document.getElementById("qrSection").style.display = "block";
}

function confirmPayment() {
    let amount = parseInt(document.getElementById("amount").value);
    let currentBal = parseInt(localStorage.getItem("userBalance"));

    // Deduct Balance
    let newBal = currentBal - amount;
    localStorage.setItem("userBalance", newBal);
    document.getElementById("displayBalance").innerText = newBal;

    alert("Bet Placed! ₹" + amount + " deducted from wallet.");
    closePopup();
}

function filterBets(category) {
    let bets = document.querySelectorAll(".bet-card");
    bets.forEach(bet => {
        if (category === "all") {
            bet.style.display = "block";
        } else {
            bet.style.display = bet.classList.contains(category) ? "block" : "none";
        }
    });
}
</script>

</body>
</html>
