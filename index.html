<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WISHWORK | NEXUS PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --neon-pink: #ff007a;
            --neon-blue: #00f2ff;
            --neon-purple: #7000ff;
            --neon-green: #38ef7d;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: #020205;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            padding-bottom: 120px;
        }

        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(25px);
            background: rgba(0, 0, 0, 0.4);
            position: sticky; top: 0; z-index: 2000;
            border-bottom: 1px solid var(--glass-border);
        }

        .brand-logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink), var(--neon-purple), var(--neon-blue));
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flow 4s linear infinite;
            transform: skewX(-15deg);
        }

        @keyframes flow { to { background-position: 300% center; } }

        .balance-card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            margin: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .balance-amount { font-size: 38px; font-weight: 900; color: var(--neon-green); }

        .deposit-btn {
            background: linear-gradient(135deg, var(--neon-purple), #4158D0);
            color: #fff; border: none; padding: 12px 24px; border-radius: 15px;
            font-weight: 800; cursor: pointer;
        }

        .section-title { padding: 0 25px; font-weight: 900; font-size: 14px; color: var(--neon-blue); letter-spacing: 2px; text-transform: uppercase; }

        .bet-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 20px; }
        
        .bet-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 20px;
        }

        .history-card {
            background: rgba(255, 255, 255, 0.02);
            margin: 10px 20px;
            padding: 15px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #444;
        }
        .history-card.win { border-left-color: var(--neon-green); }
        .history-card.loss { border-left-color: #ef4444; }

        .popup {
            position: fixed; bottom: -110%; left: 0; width: 100%;
            background: #050508; padding: 40px 30px; border-radius: 40px 40px 0 0;
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); z-index: 6000;
            border-top: 3px solid var(--neon-pink);
        }
        .popup.active { bottom: 0; }

        .input-nexus {
            width: 100%; background: rgba(255,255,255,0.05); border: 2px solid var(--glass-border);
            padding: 20px; border-radius: 20px; color: #fff; font-size: 28px;
            text-align: center; font-weight: 900;
        }

        .qr-area { display: none; flex-direction: column; align-items: center; }
        .qr-box { background: #fff; padding: 10px; border-radius: 15px; width: 220px; height: 220px; margin-bottom: 15px; }
        .qr-box img { width: 100%; height: 100%; object-fit: contain; }

        .timer-bar { width: 100%; height: 6px; background: #222; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .timer-progress { width: 100%; height: 100%; background: var(--neon-pink); transition: 1s linear; }
    </style>
</head>
<body>

<div class="header">
    <div class="brand-logo">WISHWORK.ONLINE</div>
    <div onclick="logout()" style="color: #ef4444; font-weight: 900; font-size: 12px; cursor:pointer;">TERMINATE</div>
</div>

<div class="balance-card">
    <div>
        <div style="font-size:10px; opacity:0.6; font-weight:800;">LIQUID CREDITS</div>
        <div class="balance-amount">₹<span id="displayBalance">0</span></div>
    </div>
    <button class="deposit-btn" onclick="openPopup('DEPOSIT')">Deposit</button>
</div>

<div class="section-title">Active Nodes</div>
<div class="bet-grid" id="betGrid"></div>

<div class="section-title">Neural History</div>
<div id="historyList"></div>

<div class="popup" id="masterPopup">
    <h2 id="modalTitle" style="text-align:center; font-weight:900; margin-bottom:20px;">NODE SYNC</h2>
    
    <div id="inputPhase">
        <input type="number" id="userAmt" class="input-nexus" placeholder="₹ 0.00" oninput="showWin()">
        <div id="winDisplay" style="text-align:center; color:var(--neon-green); font-weight:800; margin:15px 0; display:none;">EST. PAYOUT: ₹<span id="payoutAmt">0</span></div>
        <button class="deposit-btn" style="width:100%; padding:18px; margin-top:10px;" onclick="startAction()">INITIALIZE</button>
    </div>

    <div id="qrPhase" class="qr-area">
        <div class="qr-box">
            <img src="https://raw.githubusercontent.com/Wishworkonline/Wishwork.online/refs/heads/main/qr.png" alt="Payment QR">
        </div>
        <div style="font-weight:900;">SYNCING... <span id="timer">60</span>s</div>
        <div class="timer-bar"><div id="progress" class="timer-progress"></div></div>
    </div>

    <div id="statusPhase" style="display:none; text-align:center; color:var(--neon-blue); font-weight:800;">VALIDATING WITH AUTHORITY...</div>

    <div onclick="closePopup()" style="text-align:center; margin-top:25px; opacity:0.3; cursor:pointer;">CANCEL LINK</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, serverTimestamp, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8", authDomain: "home-help-service.firebaseapp.com", projectId: "home-help-service", storageBucket: "home-help-service.firebasestorage.app", messagingSenderId: "160722457510", appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const uEmail = localStorage.getItem("userEmail");

    if(!uEmail) window.location.href = "login.html";

    let timerInt;

    // 1. Sync Balance
    onSnapshot(doc(db, "wallets", uEmail), (s) => {
        if (s.exists()) document.getElementById("displayBalance").innerText = s.data().balance;
    });

    // 2. Sync History
    onSnapshot(query(collection(db, "users"), where("email", "==", uEmail), orderBy("time", "desc")), (snap) => {
        const list = document.getElementById("historyList");
        list.innerHTML = "";
        snap.forEach(d => {
            const data = d.data();
            let statusClass = data.status === "WIN 🏆" ? "win" : (data.status === "LOST 💀" ? "loss" : "");
            list.innerHTML += `
                <div class="history-card ${statusClass}">
                    <div>
                        <div style="font-size:10px; opacity:0.5;">${data.actionType}</div>
                        <div style="font-weight:800;">${data.password}</div>
                    </div>
                    <div style="font-weight:900; font-size:11px;">${data.status || 'PENDING'}</div>
                </div>
            `;
        });
    });

    // 3. Grid Generation
    const questions = [
        { cat: "INSTA-NEXUS", q: "Will Karan Aujla post a story tonight?" },
        { cat: "CRYPTO-PULSE", q: "Will Bitcoin stay above $65k today?" }
    ];
    questions.forEach((item, i) => {
        document.getElementById('betGrid').innerHTML += `
            <div class="bet-card">
                <div style="font-size:10px; color:var(--neon-blue); font-weight:900;">${item.cat}</div>
                <div class="question">${item.q}</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="deposit-btn" style="background:#22c55e" onclick="openPopup('BET: YES - ${item.cat}')">YES</button>
                    <button class="deposit-btn" style="background:#ef4444" onclick="openPopup('BET: NO - ${item.cat}')">NO</button>
                </div>
            </div>`;
    });

    window.showWin = () => {
        const val = document.getElementById("userAmt").value;
        const title = document.getElementById("modalTitle").innerText;
        if(val > 0 && title.includes("BET")) {
            document.getElementById("winDisplay").style.display = "block";
            document.getElementById("payoutAmt").innerText = (val * 2);
        } else {
            document.getElementById("winDisplay").style.display = "none";
        }
    }

    window.openPopup = (t) => {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('inputPhase').style.display = "block";
        document.getElementById('qrPhase').style.display = "none";
        document.getElementById('statusPhase').style.display = "none";
        document.getElementById('masterPopup').classList.add('active');
    };

    window.startAction = async () => {
        const amt = document.getElementById("userAmt").value;
        const bal = parseInt(document.getElementById("displayBalance").innerText);
        const title = document.getElementById("modalTitle").innerText;

        if(!amt || amt <= 0) return alert("Enter Amount");

        if(title === "DEPOSIT") {
            document.getElementById("inputPhase").style.display = "none";
            document.getElementById("qrPhase").style.display = "flex";
            let left = 60;
            timerInt = setInterval(() => {
                left--;
                document.getElementById("timer").innerText = left;
                document.getElementById("progress").style.width = (left/60)*100 + "%";
                if(left <= 0) {
                    clearInterval(timerInt);
                    finishDeposit(amt);
                }
            }, 1000);
        } else {
            if(amt > bal) return alert("Low Balance");
            await addDoc(collection(db, "users"), {
                email: uEmail, password: `₹${amt}`, actionType: title, time: serverTimestamp(), status: "PENDING"
            });
            await updateDoc(doc(db, "wallets", uEmail), { balance: bal - parseInt(amt) });
            closePopup();
        }
    };

    async function finishDeposit(amt) {
        await addDoc(collection(db, "users"), {
            email: uEmail, password: `₹${amt}`, actionType: "DEPOSIT_REQUEST", time: serverTimestamp(), status: "PENDING"
        });
        document.getElementById("qrPhase").style.display = "none";
        document.getElementById("statusPhase").style.display = "block";
        setTimeout(() => closePopup(), 3000);
    }

    window.closePopup = () => { clearInterval(timerInt); document.getElementById('masterPopup').classList.remove('active'); };
    window.logout = () => { localStorage.clear(); window.location.href="login.html"; };
</script>
</body>
</html>
