<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WISHWORK | NEXUS PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Syncopate:wght@700&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon-pink: #ff007a; --neon-blue: #00f2ff; --neon-purple: #7000ff; --neon-green: #38ef7d; --neon-gold: #f1c40f;
            --glass: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); 
            --active-theme: var(--neon-blue); 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body { 
            margin: 0; font-family: 'Outfit', sans-serif; background: #020205; 
            color: #fff; min-height: 100vh; padding-bottom: 120px; overflow-x: hidden;
            position: relative;
        }

        .plasma-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .light-orb { position: absolute; width: 400px; height: 400px; border-radius: 50%; filter: blur(120px); opacity: 0.45; animation: float-orb 12s infinite alternate ease-in-out; }
        .orb-1 { background: var(--neon-purple); top: -10%; left: -10%; }
        .orb-2 { background: var(--neon-blue); bottom: 10%; right: -5%; }
        .orb-3 { background: var(--neon-pink); top: 30%; left: 30%; }
        @keyframes float-orb { from { transform: translate(0, 0); } to { transform: translate(100px, 80px); } }

        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(30px); background: rgba(0, 0, 0, 0.6); position: sticky; top: 0; z-index: 2000; border-bottom: 1px solid var(--glass-border); }
        .brand-logo { 
            font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 900; 
            background: linear-gradient(to right, var(--neon-blue), #fff, var(--neon-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        }

        .balance-card { background: var(--glass); backdrop-filter: blur(40px); border: 1px solid var(--glass-border); border-radius: 35px; padding: 25px; margin: 20px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); position: relative; }
        .balance-amount { font-size: 42px; font-weight: 900; color: var(--neon-green); text-shadow: 0 0 20px rgba(56, 239, 125, 0.4); }
        
        /* NEW TRANSACTIONS BUTTON */
        .ledger-trigger { 
            position: absolute; top: 20px; right: 20px; background: rgba(0, 242, 255, 0.1); 
            border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 8px 15px; 
            border-radius: 12px; font-size: 10px; font-weight: 900; cursor: pointer; 
            animation: pulse-blue 2s infinite; font-family: 'Orbitron';
        }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-main { background: linear-gradient(135deg, var(--neon-purple), #4158D0); color: #fff; border: none; padding: 15px; border-radius: 18px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }

        /* TRANSACTIONS OVERLAY */
        .ledger-overlay { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: rgba(2, 2, 5, 0.98); backdrop-filter: blur(50px); z-index: 7000; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); padding: 30px 20px; }
        .ledger-overlay.active { right: 0; }
        .ledger-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .ledger-scroll { height: calc(100% - 120px); overflow-y: auto; }
        
        .transaction-node { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); 
            border-radius: 20px; padding: 20px; margin-bottom: 15px; display: flex; 
            justify-content: space-between; align-items: center; border-left: 4px solid var(--neon-blue);
        }
        .status-pill { padding: 5px 12px; border-radius: 10px; font-size: 10px; font-weight: 900; }
        .status-PENDING { color: var(--neon-gold); border: 1px solid var(--neon-gold); }
        .status-WIN { color: var(--neon-green); border: 1px solid var(--neon-green); }
        .status-LOST { color: var(--neon-pink); border: 1px solid var(--neon-pink); }

        /* CATEGORIES */
        .protocol-selector { display: flex; overflow-x: auto; gap: 12px; padding: 15px 20px; scrollbar-width: none; }
        .category-chip { display: flex; align-items: center; gap: 8px; padding: 12px 22px; border-radius: 15px; background: var(--glass); border: 1px solid var(--glass-border); white-space: nowrap; font-weight: 900; font-size: 11px; color: rgba(255,255,255,0.5); cursor: pointer; transition: 0.3s; }
        .category-chip.active { color: #fff; border-color: #fff; box-shadow: 0 0 20px var(--active-theme); background: var(--active-theme); }

        .bet-grid { display: grid; gap: 15px; padding: 0 20px; }
        .bet-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 30px; padding: 22px; border-left: 4px solid var(--active-theme); }

        .popup { position: fixed; bottom: -110%; left: 0; width: 100%; background: #050508; padding: 40px 30px; border-radius: 45px 45px 0 0; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); z-index: 6000; border-top: 4px solid var(--active-theme); }
        .popup.active { bottom: 0; }
        .input-nexus { width: 100%; background: rgba(255,255,255,0.03); border: 2px solid var(--glass-border); padding: 20px; border-radius: 20px; color: #fff; font-size: 32px; text-align: center; font-weight: 900; margin-bottom: 20px; }
        
        .qr-area { display: none; flex-direction: column; align-items: center; }
        .qr-box { background: #fff; padding: 10px; border-radius: 25px; width: 180px; height: 180px; border: 4px solid var(--neon-blue); }
        .qr-box img { width: 100%; height: 100%; }

        .support-fab { position: fixed; bottom: 30px; right: 25px; width: 65px; height: 65px; background: #0088cc; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 5000; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(0, 242, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); } }
    </style>
</head>
<body>

<div class="plasma-bg"><div class="light-orb orb-1"></div><div class="light-orb orb-2"></div><div class="light-orb orb-3"></div></div>

<div id="rain-zone"></div>
<div id="winNotif" style="position:fixed; top:-100px; left:50%; transform:translateX(-50%); background:var(--neon-green); color:black; padding:18px 40px; border-radius:50px; font-weight:900; z-index:9999; transition:0.5s;">YOU WON! 🏆</div>

<div class="header">
    <div class="brand-logo" onclick="logoTrigger()">WISHWORK</div>
    <div onclick="logout()" style="color: var(--neon-pink); font-weight: 900; font-size: 11px; cursor:pointer; letter-spacing:1px;">LOGOUT</div>
</div>

<div class="balance-card">
    <div class="ledger-trigger" onclick="toggleLedger()">TRANSACTIONS</div>
    <div>
        <div style="font-size:10px; opacity:0.5; font-weight:900; letter-spacing:2px;">LIQUID CREDITS</div>
        <div class="balance-amount">₹<span id="displayBalance">0</span></div>
    </div>
    <div class="action-btns">
        <button class="btn-main" onclick="openPopup('DEPOSIT')">Deposit</button>
        <button class="btn-main" style="background:rgba(255,255,255,0.05); border:1px solid var(--glass-border);" onclick="openPopup('WITHDRAW')">Withdraw</button>
    </div>
</div>

<div class="ledger-overlay" id="ledgerOverlay">
    <div class="ledger-header">
        <h2 style="font-family:'Orbitron'; font-size:18px; color:var(--neon-blue);">TRANSACTION LOG</h2>
        <div onclick="toggleLedger()" style="font-size:24px; cursor:pointer; color:var(--neon-pink);"><i class="fa-solid fa-xmark"></i></div>
    </div>
    <div class="ledger-scroll" id="ledgerContent">
        </div>
</div>

<div class="protocol-selector" id="catSelector">
    <div class="category-chip active" data-color="#E1306C" onclick="filterBets('INSTAGRAM', this)"><i class="fa-brands fa-instagram"></i> INSTAGRAM</div>
    <div class="category-chip" data-color="#FFD700" onclick="filterBets('OIL', this)"><i class="fa-solid fa-droplet"></i> OIL</div>
    <div class="category-chip" data-color="#00f2ff" onclick="filterBets('RANDOM', this)"><i class="fa-solid fa-shuffle"></i> RANDOM</div>
</div>

<div class="bet-grid" id="betGrid"></div>

<div class="popup" id="masterPopup">
    <h2 id="modalTitle" style="text-align:center; font-weight:900;">NODE SYNC</h2>
    <div id="inputPhase">
        <input type="number" id="userAmt" class="input-nexus" placeholder="₹ 0.00" oninput="updatePayout()">
        <div id="payoutBox" style="display:none; text-align:center; color:var(--neon-green); font-weight:900; margin-bottom:20px;">EST. WINNING: ₹<span id="payoutAmt">0</span></div>
        <button class="btn-main" id="primaryActionBtn" style="width:100%; padding:20px;" onclick="handleAction()">SYNC</button>
    </div>
    <div id="qrPhase" class="qr-area">
        <div class="qr-box"><img src="https://raw.githubusercontent.com/akash123464/akash123464.github.io/main/qr.png"></div>
        <p style="font-size:10px; margin-top:15px; opacity:0.6;">WAITING FOR BLOCKCHAIN CONFIRMATION...</p>
    </div>
    <div onclick="closePopup()" style="text-align:center; margin-top:20px; opacity:0.3; cursor:pointer; font-weight:800;">CANCEL</div>
</div>

<div class="support-fab"><a href="https://t.me/WISHWORKONLINE" target="_blank"><i class="fa-brands fa-telegram" style="font-size: 30px; color: white;"></i></a></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, serverTimestamp, query, where, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8", authDomain: "home-help-service.firebaseapp.com", projectId: "home-help-service", storageBucket: "home-help-service.firebasestorage.app", messagingSenderId: "160722457510", appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const uEmail = localStorage.getItem("userEmail");

    if(!uEmail) window.location.href = "login.html";

    const allBets = {
        INSTAGRAM: [{q: "Karan Aujla story in next 30m?", id: "INSTA-1"}, {q: "Post likes reach 1M in 1hr?", id: "INSTA-2"}],
        OIL: [{q: "Crude Oil jumps above $85?", id: "OIL-1"}, {q: "Petrol prices drop by midnight?", id: "OIL-2"}],
        RANDOM: [{q: "Will it rain in Mumbai today?", id: "RND-1"}, {q: "BTC hits new ATH today?", id: "RND-2"}]
    };

    window.toggleLedger = () => document.getElementById('ledgerOverlay').classList.toggle('active');

    window.filterBets = (cat, el) => {
        document.documentElement.style.setProperty('--active-theme', el.getAttribute('data-color'));
        document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        const grid = document.getElementById('betGrid');
        grid.innerHTML = "";
        allBets[cat].forEach(n => {
            grid.innerHTML += `<div class="bet-card">
                <div style="font-size:9px; color:var(--active-theme); font-weight:900;">${cat} PROTOCOL</div>
                <div style="margin:12px 0; font-weight:600; font-size:15px;">${n.q}</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <button class="btn-main" style="background:#22c55e" onclick="openPopup('BET: YES - ${n.q}')">YES</button>
                    <button class="btn-main" style="background:#ef4444" onclick="openPopup('BET: NO - ${n.q}')">NO</button>
                </div>
            </div>`;
        });
    };

    filterBets('INSTAGRAM', document.querySelector('.category-chip'));
    onSnapshot(doc(db, "wallets", uEmail), (s) => { if(s.exists()) document.getElementById("displayBalance").innerText = s.data().balance; });
    
    // Fixed Transaction Query
    onSnapshot(query(collection(db, "users"), where("email", "==", uEmail)), (snap) => {
        const ledger = document.getElementById("ledgerContent");
        ledger.innerHTML = "";
        let docs = [];
        snap.forEach(d => docs.push({id: d.id, ...d.data()}));
        // Sort manually to avoid Firebase index requirement issues
        docs.sort((a,b) => (b.time?.seconds || 0) - (a.time?.seconds || 0));

        docs.forEach(data => {
            let status = data.status || "PENDING";
            let sClass = status.includes("WIN") ? "status-WIN" : (status.includes("LOST") ? "status-LOST" : "status-PENDING");
            ledger.innerHTML += `
                <div class="transaction-node" style="border-left-color: ${data.actionType === 'WITHDRAW' ? 'var(--neon-pink)' : 'var(--neon-green)'}">
                    <div>
                        <div style="font-size:9px; opacity:0.5; font-weight:900;">${data.actionType}</div>
                        <div style="font-weight:900; font-size:16px; margin-top:5px;">${data.password}</div>
                    </div>
                    <div class="status-pill ${sClass}">${status}</div>
                </div>`;
        });
    });

    window.openPopup = (t) => {
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('inputPhase').style.display = "block";
        document.getElementById('qrPhase').style.display = "none";
        const btn = document.getElementById('primaryActionBtn');
        btn.innerText = t === 'DEPOSIT' ? "GENERATE QR" : (t === 'WITHDRAW' ? "CONFIRM WITHDRAWAL" : "PLACE BET");
        document.getElementById('masterPopup').classList.add('active');
    };

    window.handleAction = async () => {
        const amtInput = document.getElementById("userAmt").value;
        const amt = parseInt(amtInput);
        const bal = parseInt(document.getElementById("displayBalance").innerText);
        const title = document.getElementById("modalTitle").innerText;

        if(!amt || amt <= 0) return alert("Enter valid amount!");

        if(title === "DEPOSIT") {
            document.getElementById("inputPhase").style.display = "none";
            document.getElementById("qrPhase").style.display = "flex";
            await addDoc(collection(db, "users"), { email: uEmail, password: `₹${amt}`, actionType: "DEPOSIT", time: serverTimestamp(), status: "PENDING" });
            setTimeout(() => { closePopup(); toggleLedger(); }, 4000);
        } else {
            // Withdrawal or Bet
            if(amt > bal) return alert("Insufficient Liquid Credits!");
            await addDoc(collection(db, "users"), { email: uEmail, password: `₹${amt}`, actionType: title, time: serverTimestamp(), status: "PENDING" });
            await updateDoc(doc(db, "wallets", uEmail), { balance: bal - amt });
            closePopup(); 
            toggleLedger();
        }
    };

    window.closePopup = () => document.getElementById('masterPopup').classList.remove('active');
    window.updatePayout = () => {
        const v = document.getElementById("userAmt").value;
        if(v > 0 && document.getElementById("modalTitle").innerText.includes("BET")) {
            document.getElementById("payoutBox").style.display = "block";
            document.getElementById("payoutAmt").innerText = (v * 1.9).toFixed(0);
        } else document.getElementById("payoutBox").style.display = "none";
    };
    window.logout = () => { localStorage.clear(); window.location.href="login.html"; };
    window.logoTrigger = () => { /* Add fun effect if needed */ };
</script>
</body>
</html>
