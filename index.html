<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Bets</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f172a;
    color: white;
}

/* TOP CATEGORY BAR */
.categories {
    display: flex;
    overflow-x: auto;
    padding: 10px;
    background: #020617;
    gap: 10px;
}

.categories button {
    background: linear-gradient(135deg, #6366f1, #ec4899);
    border: none;
    color: white;
    padding: 10px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    white-space: nowrap;
    transition: 0.3s;
}

.categories button:hover {
    transform: scale(1.1);
}

/* SECTION */
#live-bets {
    padding: 20px;
}

h2 {
    font-size: 28px;
    margin-bottom: 10px;
}

/* BET CARDS */
.bets-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.bet-card {
    background: linear-gradient(135deg, #1e293b, #334155);
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.bet-card:hover {
    transform: translateY(-5px);
}

/* BUTTONS */
.bet-options {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

.bet-options button {
    flex: 1;
    margin: 5px;
    padding: 8px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

.yes {
    background: #22c55e;
    color: white;
}

.no {
    background: #ef4444;
    color: white;
}
</style>

</head>

<body>

<!-- TOP CATEGORY -->
<div class="categories">
    <button>Instagram</button>
    <button>Gold</button>
    <button>Oil</button>
    <button>Politics</button>
    <button>Random</button>
</div>

<!-- LIVE BETS -->
<section id="live-bets">
    <h2>🔥 Live Bets</h2>
    <p>Predict and earn from real-world events.</p>

    <div class="bets-container">

        <div class="bet-card">
            <h3>Will Karan aujla post more than 6 stories today?</h3>
            <div class="bet-options">
                <button class="yes">Yes</button>
                <button class="no">No</button>
            </div>
        </div>

        <div class="bet-card">
            <h3>Will Gold price increase tomorrow?</h3>
            <div class="bet-options">
                <button class="yes">Yes</button>
                <button class="no">No</button>
            </div>
        </div>

        <div class="bet-card">
            <h3>Will Oil price drop tomorrow?</h3>
            <div class="bet-options">
                <button class="yes">Yes</button>
                <button class="no">No</button>
            </div>
        </div>

        <div class="bet-card">
            <h3>Will modi ji say Pakistan today?</h3>
            <div class="bet-options">
                <button class="yes">Yes</button>
                <button class="no">No</button>
            </div>
        </div>

        <div class="bet-card">
            <h3>Will ssc gd exam held in April</h3>
            <div class="bet-options">
                <button class="yes">Yes</button>
                <button class="no">No</button>
            </div>
        </div>

    </div>
</section>

</body>
</html>
