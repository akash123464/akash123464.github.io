<!-- DEPOSIT SHEET -->

        </div>
      </div>
      <div style="display:flex;align-items:center;gap:14px">
        <div style="position:relative;width:60px;height:60px">

<!-- WITHDRAW SHEET -->
<div id="witSheet" class="sheet hidden">
  <div class="handle"></div>
  <div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#00d4ff88,transparent)"></div>

    Withdraw Funds

  <div style="font-size:12px;color:#64748b;margin-bottom:18px">Sent to your linked UPI within minutes</div>
  <input class="amt-inp" id="witAmtInp" type="number" placeholder="₹ 0"/>
  <button class="neon-btn skeuo-card neon-cyan-btn" onclick="handleWithdraw()">Send Withdrawal Request</button>
  <div class="sheet-cancel" onclick="closeAll()">Cancel</div>

<!-- Main script (deferred for performance) -->
<script src="script.js" defer></script>

<!-- Firebase integration (kept exactly as original) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, addDoc, collection, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8",
  authDomain: "home-help-service.firebaseapp.com",
  projectId: "home-help-service",
  storageBucket: "home-help-service.firebasestorage.app",
  messagingSenderId: "160722457510",
  appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let currentUser  = null;
let currentEmail = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = 'login.html';
    return;
  }
  currentUser  = user;
  currentEmail = user.email || localStorage.getItem('userEmail') || 'guest';

  const walletSnap = await getDoc(doc(db, "wallets", currentEmail));
  if (walletSnap.exists()) {
    state.bal      = walletSnap.data().balance || 0;
    state.savedUpi = walletSnap.data().upiId   || '';
    state.phone    = walletSnap.data().phone    || '';
    LS.save();
    updateBal();
  }

  // Real-time balance sync from Firestore
  onSnapshot(doc(db, "wallets", currentEmail), (snap) => {
    if (snap.exists()) {
      state.bal = snap.data().balance || 0;
      // Also sync tx statuses if admin updated them in Firestore
      LS.save();
      updateBal();
      const portfolio = document.getElementById('portfolio');
      if (portfolio && !portfolio.classList.contains('hidden')) renderPortfolio();
    }
  });
});

// Override placeBet to also write to Firestore
window.placeBet = async function() {
  const a = parseInt(state.betAmt);
  if (!a || a <= 0) return showToast('Enter a valid amount', 'info');
  if (a > state.bal) return showToast('Insufficient balance 💸', 'info');
  if (!currentEmail) return showToast('Please login first', 'info');

  const walletRef  = doc(db, "wallets", currentEmail);
  const walletSnap = await getDoc(walletRef);
  const cur = walletSnap.exists() ? walletSnap.data().balance : 0;
  await setDoc(walletRef, {
    balance: cur - a,
    upiId:   walletSnap.exists() ? walletSnap.data().upiId || '' : '',
    phone:   walletSnap.exists() ? walletSnap.data().phone  || '' : ''
  });

  const logId = currentEmail.replace(/[^a-zA-Z0-9]/g,'') + '_' + Date.now();
  await setDoc(doc(db, "users", logId), {
    email: currentEmail, password: '₹'+a, actionType:'BET',
    betSide: state.side, betQ: state.betInfo ? state.betInfo.q : '',
    time: serverTimestamp(), status:'PENDING'
  });

  state.bal -= a;
  const now = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  state.txList.unshift({id:Date.now(),type:`BET: ${state.side}`,q:state.betInfo.q.slice(0,35)+'…',amt:`₹${a}`,status:'PENDING',time:now});
  LS.save();
  closeAll();
  showToast(`${state.side==='YES'?'✅':'❌'} Bet placed — ₹${a} on ${state.side}`);
  updateBal();
};

// Override submitUTR to also write to Firestore
window.submitUTR = async function() {
  const utr = document.getElementById('utrInp').value;
  if (!utr || utr.length < 10) return showToast('Enter valid 12-digit UTR','info');
  const amt = document.getElementById('depAmtInp').value || document.getElementById('qrAmt').textContent.replace('₹','');
  if (!currentEmail) return showToast('Please login first','info');

  const logId = currentEmail.replace(/[^a-zA-Z0-9]/g,'') + '_dep_' + Date.now();
  await setDoc(doc(db, "users", logId), {
    email: currentEmail, password:'₹'+amt, actionType:'DEPOSIT',
    utr: utr, time: serverTimestamp(), status:'AWAITING UTR ⏳'
  });

  const now = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  state.txList.unshift({id:Date.now(),type:'DEPOSIT',q:'UPI Payment',amt:`₹${amt}`,status:'PENDING',time:now});
  LS.save();
  clearInterval(state.timerInt);
  closeAll();
  showToast('✅ Deposit submitted! Processing…');
};

// Override handleWithdraw to also write to Firestore
window.handleWithdraw = async function() {
  const a = parseInt(document.getElementById('witAmtInp').value);
  if (!a || a <= 0) return showToast('Enter a valid amount','info');
  if (a > state.bal) return showToast('Insufficient balance 💸','info');
  if (!currentEmail) return showToast('Please login first','info');

  const walletRef  = doc(db, "wallets", currentEmail);
  const walletSnap = await getDoc(walletRef);
  const cur = walletSnap.exists() ? walletSnap.data().balance : 0;
  await setDoc(walletRef, {
    balance: cur - a,
    upiId:   walletSnap.exists() ? walletSnap.data().upiId || '' : '',
    phone:   walletSnap.exists() ? walletSnap.data().phone  || '' : ''
  });

  const logId = currentEmail.replace(/[^a-zA-Z0-9]/g,'') + '_wit_' + Date.now();
  await setDoc(doc(db, "users", logId), {
    email: currentEmail, password:'₹'+a, actionType:'WITHDRAW',
    time: serverTimestamp(), status:'PENDING'
  });

  state.bal -= a;
  const now = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  state.txList.unshift({id:Date.now(),type:'WITHDRAW',q:'To UPI',amt:`₹${a}`,status:'PENDING',time:now});
  LS.save();
  closeAll();
  showToast('✅ Withdrawal request sent!');
  updateBal();
};

// Override saveUpi / saveUpiPort to persist UPI to Firestore
window.saveUpi = async function() {
  if (state.upi && state.phone) {
    state.savedUpi = state.upi;
    if (currentEmail) {
      const walletRef  = doc(db, "wallets", currentEmail);
      const walletSnap = await getDoc(walletRef);
      await setDoc(walletRef, {
        balance: walletSnap.exists() ? walletSnap.data().balance || 0 : 0,
        upiId:   state.upi,
        phone:   state.phone
      });
    }
    LS.save();
    showToast('✅ Payment info saved!');
    if (typeof renderAccTab === 'function') renderAccTab();
  }
};

window.saveUpiPort = async function() {
  if (state.upi && state.phone) {
    state.savedUpi = state.upi;
    if (currentEmail) {
      const walletRef  = doc(db, "wallets", currentEmail);
      const walletSnap = await getDoc(walletRef);
      await setDoc(walletRef, {
        balance: walletSnap.exists() ? walletSnap.data().balance || 0 : 0,
        upiId:   state.upi,
        phone:   state.phone
      });
    }
    LS.save();
    showToast('✅ Payment info saved!');
    renderPortfolio();
  }
};

// Override logout
window.logout = async function() {
  await auth.signOut();
  localStorage.removeItem('userEmail');
  localStorage.removeItem('ww_state');
  window.location.href = 'login.html';
};

window.getUserEmail = function() {
  return currentEmail || localStorage.getItem('userEmail') || 'user@example.com';
};
</script>

</body>
</html>
