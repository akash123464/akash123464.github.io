<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bets | Wishwork</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030712; --card-bg: rgba(30, 41, 59, 0.5); --accent-blue: #38bdf8; --neon-green: #22c55e; --neon-red: #ef4444; }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: white; padding-bottom: 120px; }
        
        /* BROADCAST NOTIFICATION */
        #broadcastNotify { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: linear-gradient(90deg, #38bdf8, #c084fc); padding: 15px; border-radius: 15px; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; }
        #broadcastNotify.active { top: 20px; }

        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; }
        .brand-name { font-size: 16px; font-weight: 900; background: linear-gradient(to right, var(--accent-blue), #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .balance-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 20px; margin: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .balance-amount { font-size: 28px; font-weight: 900; color: var(--neon-green); }
        .deposit-btn { background: linear-gradient(135deg, #6366f1, #a855f7); border: none; color: white; padding: 10px 20px; border-radius: 14px; font-weight: 700; cursor: pointer; }

        /* BET CARDS */
        .container { padding: 15px 20px; }
        .bet-card { background: rgba(30, 41, 59, 0.4); padding: 24px; border-radius: 28px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .options { display: flex; margin-top: 20px; gap: 15px; }
        .options button { flex: 1; padding: 16px; border-radius: 18px; border: none; font-weight: 900; color: white; cursor: pointer; }
        .yes { background: #10b981; } .no { background: #f43f5e; }

        /* HISTORY */
        .history-section { margin: 30px 20px; }
        .history-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .status-badge { font-weight: 900; font-size: 11px; padding: 5px 10px; border-radius: 8px; }

        /* POPUPS */
        .popup { position: fixed; bottom: -110%; left: 0; width: 100%; background: #030712; padding: 30px; border-radius: 40px 40px 0 0; transition: 0.5s; z-index: 1000; border-top: 2px solid var(--accent-blue); box-sizing: border-box; }
        .popup.active { bottom: 0; }
        .popup input { width: 100%; padding: 18px; margin-top: 20px; border-radius: 20px; border: 1px solid #334155; background: #111827; color: white; text-align: center; font-size: 20px; }
        .primary-btn { width: 100%; margin-top: 25px; padding: 18px; border-radius: 20px; border: none; background: var(--accent-blue); color: white; font-weight: 900; cursor: pointer; }

        .support-bubble { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: #24A1DE; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(36,161,222,0.4); z-index: 999; }
    </style>
</head>
<body>

<div id="broadcastNotify">
    <div style="font-size: 10px; font-weight: 900; color: rgba(255,255,255,0.7); text-transform: uppercase;">System Announcement 📡</div>
    <div id="broadcastMsgText" style="color: white; font-weight: 800; margin: 5px 0;">Welcome to Wishwork!</div>
    <div onclick="this.parentElement.classList.remove('active')" style="font-size: 10px; color: white; cursor: pointer; font-weight: bold; margin-top: 5px;">CLOSE [X]</div>
</div>

<div class="header">
    <div class="brand-name">WISHWORK.ONLINE</div>
    <div onclick="localStorage.clear(); location.reload();" style="font-size: 10px; color: var(--neon-red); font-weight: 800; cursor: pointer;">LOGOUT</div>
</div>

<div class="balance-card">
    <div><div style="font-size:10px; color:#94a3b8;">WALLET BALANCE</div><div class="balance-amount">₹<span id="displayBalance">0</span></div></div>
    <button class="deposit-btn" onclick="openDeposit()">Deposit</button>
</div>

<div class="container">
    <div class="bet-card">
        <h3>Will Karan aujla post more than 5 stories?</h3>
        <div class="options">
            <button class="yes" onclick="openBet('Karan Aujla')">YES</button>
            <button class="no" onclick="openBet('Karan Aujla')">NO</button>
        </div>
    </div>
</div>

<div class="history-section">
    <div style="font-size: 18px; font-weight: 900; color: #94a3b8; margin-bottom: 15px;">HISTORY</div>
    <div id="betHistory"></div>
</div>

<a href="https://t.me/WISHWORKONLINE" target="_blank" class="support-bubble">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.11.02-1.93 1.23-5.46 3.62-.51.35-.98.52-1.4.51-.46-.01-1.35-.26-2.01-.48-.81-.27-1.45-.42-1.39-.88.03-.24.36-.49.99-.75 3.88-1.69 6.46-2.8 7.76-3.33 3.69-1.5 4.45-1.76 4.95-1.77.11 0 .36.03.52.16.14.11.18.25.19.35.01.07.01.21 0 .33z"/></svg>
</a>

<div class="popup" id="uPopup">
    <div id="pContent">
        <h3 id="pTitle" style="text-align:center;">Confirm</h3>
        <input type="number" id="amt" placeholder="₹ Amount">
        <button class="primary-btn" id="pBtn" onclick="handleAction()">Confirm</button>
        <div id="qrSec" style="display:none; text-align:center;">
            <img src="qr.png" style="width:200px; border-radius:24px; border:5px solid white; margin:20px 0;">
            <button class="primary-btn" style="background:var(--neon-green);" onclick="startV()">Payment Done ✨</button>
        </div>
    </div>
    <div id="vScreen" style="display:none; text-align:center;">
        <h2 id="timerText">60</h2>
        <p>Validating...</p>
    </div>
    <div style="text-align:center; margin-top:20px; color:#64748b; cursor:pointer;" onclick="closeP()">CANCEL</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, serverTimestamp, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDVku-LXDpxjm_8mwsUJr5nUtwhsA3MSf8", authDomain: "home-help-service.firebaseapp.com", projectId: "home-help-service", storageBucket: "home-help-service.firebasestorage.app", messagingSenderId: "160722457510", appId: "1:160722457510:web:f2c5fa0b922a0ccc58b567" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    if (localStorage.getItem("userLoggedIn") !== "true") window.location.href = "login.html";
    const userEmail = localStorage.getItem("userEmail") || "guest@gmail.com";

    // 1. LISTEN FOR BROADCASTS
    onSnapshot(doc(db, "settings", "broadcast"), (s) => {
        if (s.exists()) {
            document.getElementById("broadcastMsgText").innerText = s.data().message;
            document.getElementById("broadcastNotify").classList.add("active");
            setTimeout(() => document.getElementById("broadcastNotify").classList.remove("active"), 10000);
        }
    });

    onSnapshot(doc(db, "wallets", userEmail), (s) => { if (s.exists()) document.getElementById("displayBalance").innerText = s.data().balance; });

    const qH = query(collection(db, "users"), where("email", "==", userEmail), orderBy("time", "desc"));
    onSnapshot(qH, (snap) => {
        const div = document.getElementById("betHistory");
        let html = "";
        snap.forEach(d => {
            const data = d.data();
            if(data.actionType.includes("Bet")) {
                const status = data.status || "PENDING ⏳";
                const color = status.includes("WIN") ? "#22c55e" : (status.includes("LOST") ? "#ef4444" : "#c084fc");
                html += `<div class="history-item"><div><b>${data.actionType}</b><br><small>${data.password}</small></div><div class="status-badge" style="color:${color}">${status}</div></div>`;
            }
        });
        div.innerHTML = html;
    });

    let isDep = false;
    window.openBet = (t) => { isDep=false; document.getElementById("uPopup").classList.add("active"); document.getElementById("pTitle").innerText = t; };
    window.openDeposit = () => { isDep=true; document.getElementById("uPopup").classList.add("active"); document.getElementById("pTitle").innerText = "Deposit Funds"; };
    window.closeP = () => { document.getElementById("uPopup").classList.remove("active"); resetP(); };

    window.handleAction = async () => {
        let a = parseInt(document.getElementById("amt").value);
        let b = parseInt(document.getElementById("displayBalance").innerText);
        if(!a) return alert("Enter amount!");
        if(isDep) { document.getElementById("qrSec").style.display="block"; document.getElementById("pBtn").style.display="none"; }
        else {
            if(a > b) return alert("Low balance!");
            await updateDoc(doc(db, "wallets", userEmail), { balance: b - a });
            await addDoc(collection(db, "users"), { email: userEmail, password: `₹${a}`, actionType: `Bet:${document.getElementById("pTitle").innerText}`, status: "PENDING ⏳", time: serverTimestamp() });
            alert("Bet Placed! 🚀"); closeP();
        }
    };

    window.startV = () => {
        document.getElementById("pContent").style.display="none"; document.getElementById("vScreen").style.display="block";
        let t = 60;
        let int = setInterval(async () => {
            t--; document.getElementById("timerText").innerText = t;
            if(t <= 0) { clearInterval(int); await addDoc(collection(db, "users"), { email: userEmail, password: `₹${document.getElementById("amt").value}`, actionType: "DEPOSIT", time: serverTimestamp() }); alert("Sent!"); closeP(); }
        }, 1000);
    };

    function resetP() { document.getElementById("pContent").style.display="block"; document.getElementById("vScreen").style.display="none"; document.getElementById("qrSec").style.display="none"; document.getElementById("pBtn").style.display="block"; document.getElementById("amt").value=""; }
</script>
</body>
</html>
