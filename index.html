<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bets | Wishwork</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --card-bg: rgba(30, 41, 59, 0.5);
            --accent-blue: #38bdf8;
            --accent-purple: #c084fc;
            --neon-pink: #f472b6;
            --neon-green: #22c55e;
            --neon-red: #ef4444;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: white;
            padding-bottom: 50px;
        }

        /* HEADER & BRANDING */
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-name {
            font-size: 16px;
            font-weight: 900;
            font-style: italic;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple), var(--neon-pink));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--neon-red);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
            border: 1px solid rgba(239, 68, 68, 0.3);
            text-transform: uppercase;
        }

        .live-badge span {
            width: 7px;
            height: 7px;
            background: var(--neon-red);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-red);
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse { from { opacity: 0.3; } to { opacity: 1; } }

        /* NEON WALLET SECTION */
        .balance-container { padding: 0 20px; margin-bottom: 20px; }

        .balance-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .balance-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; }
        .balance-amount { font-size: 28px; font-weight: 900; color: var(--neon-green); text-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }

        .deposit-btn {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 13px;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }

        /* GEnZ CATEGORY BAR */
        .categories {
            display: flex;
            overflow-x: auto;
            padding: 10px 20px;
            gap: 12px;
            scrollbar-width: none;
        }
        .categories::-webkit-scrollbar { display: none; }

        .cat-btn {
            padding: 10px 22px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #1f2937;
            color: #94a3b8;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        /* Unique Neon Styles for Categories */
        .cat-btn.active-all { background: white; color: black; border-color: white; }
        .cat-btn.insta:hover, .cat-btn.insta.active { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: white; border: none; box-shadow: 0 0 15px rgba(220, 39, 67, 0.5); }
        .cat-btn.gold:hover, .cat-btn.gold.active { background: linear-gradient(45deg, #f59e0b, #fbbf24); color: black; border: none; box-shadow: 0 0 15px rgba(245, 158, 11, 0.5); }
        .cat-btn.oil:hover, .cat-btn.oil.active { background: linear-gradient(45deg, #334155, #000000); color: white; border: none; box-shadow: 0 0 15px rgba(0,0,0,0.8); }
        .cat-btn.politics:hover, .cat-btn.politics.active { background: linear-gradient(45deg, #3b82f6, #ef4444); color: white; border: none; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }

        /* BET CARDS */
        .container { padding: 15px 20px; }
        .bet-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.8));
            padding: 24px;
            border-radius: 28px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .bet-card h3 { margin: 0; font-size: 17px; font-weight: 600; line-height: 1.5; color: #f1f5f9; }

        .options { display: flex; margin-top: 20px; gap: 15px; }
        .options button {
            flex: 1;
            padding: 16px;
            border-radius: 18px;
            border: none;
            font-weight: 900;
            color: white;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, filter 0.2s;
        }

        .options button:active { transform: scale(0.95); }

        .yes { background: #10b981; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }
        .no { background: #f43f5e; box-shadow: 0 8px 20px rgba(244, 63, 94, 0.3); }

        /* POPUP DESIGN */
        .popup {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: #030712;
            padding: 30px;
            border-radius: 40px 40px 0 0;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            box-sizing: border-box;
            z-index: 1000;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .popup.active { bottom: 0; }
        .popup input {
            width: 100%;
            padding: 18px;
            margin-top: 20px;
            border-radius: 20px;
            border: 1px solid #334155;
            background: #111827;
            color: white;
            font-size: 20px;
            text-align: center;
            font-family: inherit;
        }

        .result { margin-top: 20px; font-weight: 600; color: var(--accent-blue); font-size: 18px; text-align: center; }

        .place-btn {
            width: 100%;
            margin-top: 25px;
            padding: 18px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: white;
            font-weight: 900;
            font-size: 16px;
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.3);
        }

        .close-btn { margin-top: 20px; text-align: center; color: #64748b; font-size: 14px; font-weight: 600; }
        
        #qrSection img { margin-top: 20px; width: 200px; border-radius: 20px; border: 4px solid white; }
    </style>
</head>
<body>

<div class="header">
    <div class="live-badge"><span></span> LIVE</div>
    <div class="brand-name">wishwork.online</div>
</div>

<div class="balance-container">
    <div class="balance-card">
        <div>
            <div class="balance-label">WALLET BALANCE</div>
            <div class="balance-amount">₹<span id="displayBalance">0</span></div>
        </div>
        <button class="deposit-btn">Deposit</button>
    </div>
</div>

<div class="categories">
    <button class="cat-btn active-all" onclick="filterBets('all', this)">All</button>
    <button class="cat-btn insta" onclick="filterBets('instagram', this)">Instagram</button>
    <button class="cat-btn gold" onclick="filterBets('gold', this)">Gold</button>
    <button class="cat-btn oil" onclick="filterBets('oil', this)">Oil</button>
    <button class="cat-btn politics" onclick="filterBets('politics', this)">Politics</button>
</div>

<div class="container" id="betsContainer">
    <div class="bet-card instagram">
        <h3>Will Karan aujla post more than 5 stories on Instagram?</h3>
        <div class="options">
            <button class="yes" onclick="openPopup('Karan Aujla Stories')">YES</button>
            <button class="no" onclick="openPopup('Karan Aujla Stories')">NO</button>
        </div>
    </div>

    <div class="bet-card gold">
        <h3>Will 🪙 price increase tomorrow?</h3>
        <div class="options">
            <button class="yes" onclick="openPopup('Gold Price')">YES</button>
            <button class="no" onclick="openPopup('Gold Price')">NO</button>
        </div>
    </div>

    <div class="bet-card oil">
        <h3>Will ⛽ petrol price fall from 107.83 in MP?</h3>
        <div class="options">
            <button class="yes" onclick="openPopup('Petrol Price')">YES</button>
            <button class="no" onclick="openPopup('Petrol Price')">NO</button>
        </div>
    </div>

    <div class="bet-card politics">
        <h3>Will 🧓 Modi ji say Pakistan today?</h3>
        <div class="options">
            <button class="yes" onclick="openPopup('Modi Ji Speech')">YES</button>
            <button class="no" onclick="openPopup('Modi Ji Speech')">NO</button>
        </div>
    </div>
</div>

<div class="popup" id="popup">
    <h3 id="betTitle" style="margin:0; text-align:center; font-size: 22px;">Place your bet</h3>
    <input type="number" id="amount" placeholder="₹ Enter Amount" oninput="calculate()">
    <div class="result" id="result">Possible Winning: ₹0</div>
    
    <button class="place-btn" onclick="showQR()">Place Bet</button>

    <div id="qrSection" style="display:none; text-align:center;">
        <img src="qr.png">
        <button onclick="confirmPayment()" 
            style="margin-top:20px; padding:15px; width:100%; border:none; border-radius:15px; background:var(--neon-green); color:white; font-weight:bold;">
            Payment Done
        </button>
    </div>
    <div class="close-btn" onclick="closePopup()">CANCEL</div>
</div>

<script>
    if (!localStorage.getItem("userLoggedIn")) window.location.href = "login.html";

    let walletBalance = localStorage.getItem("userBalance") || 1000;
    localStorage.setItem("userBalance", walletBalance);
    document.getElementById("displayBalance").innerText = walletBalance;

    function openPopup(title) {
        document.getElementById("popup").classList.add("active");
        document.getElementById("betTitle").innerText = title;
    }

    function closePopup() {
        document.getElementById("popup").classList.remove("active");
        document.getElementById("qrSection").style.display = "none";
        document.getElementById("amount").value = "";
    }

    function calculate() {
        let amount = document.getElementById("amount").value;
        document.getElementById("result").innerText = amount > 0 ? "Possible Winning: ₹" + (amount * 2) : "Possible Winning: ₹0";
    }

    function showQR() {
        let amount = parseInt(document.getElementById("amount").value);
        if (amount > localStorage.getItem("userBalance")) return alert("Insufficient Balance!");
        if (amount > 0) document.getElementById("qrSection").style.display = "block";
    }

    function confirmPayment() {
        let amount = parseInt(document.getElementById("amount").value);
        let newBal = localStorage.getItem("userBalance") - amount;
        localStorage.setItem("userBalance", newBal);
        document.getElementById("displayBalance").innerText = newBal;
        alert("Bet Confirmed!");
        closePopup();
    }

    function filterBets(category, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll(".bet-card").forEach(bet => {
            bet.style.display = (category === "all" || bet.classList.contains(category)) ? "block" : "none";
        });
    }
</script>
</body>
</html>
